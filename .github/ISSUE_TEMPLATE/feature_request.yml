name: Feature request
description: Propose a developer-safety, journey, source-data, or accessibility improvement
title: "[Feature]: "
labels: [enhancement, triage]
body:
  - type: textarea
    id: problem
    attributes:
      label: Developer problem
      description: Describe the user and the blocker before proposing a solution.
    validations:
      required: true
  - type: textarea
    id: outcome
    attributes:
      label: Desired outcome
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Dusk sources or supporting evidence
      description: Link current canonical sources for protocol-specific claims.
  - type: textarea
    id: risks
    attributes:
      label: Security, UX, compatibility, or maintenance risks
    validations:
      required: true
