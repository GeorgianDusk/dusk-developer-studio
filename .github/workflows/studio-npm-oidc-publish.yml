name: Publish subsequent Studio npm package

"on":
  push:
    tags:
      - "v*"

permissions:
  contents: read
  id-token: write

concurrency:
  group: studio-npm-oidc-publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  assurance:
    if: github.ref_name != 'v1.0.0'
    name: Re-run cross-platform npm assurance
    uses: ./.github/workflows/studio-npm-package-assurance.yml
    permissions:
      contents: read

  publish:
    if: github.ref_name != 'v1.0.0'
    name: Publish exact subsequent npm tag through OIDC
    needs: assurance
    runs-on: ubuntu-24.04
    environment: npm-trusted-publication
    timeout-minutes: 20
    env:
      ASSURED_NPM_INTEGRITY: ${{ needs.assurance.outputs.integrity }}
      ASSURED_CANDIDATE_COMMIT: ${{ needs.assurance.outputs.candidate_commit }}
      ASSURED_CANDIDATE_ARTIFACT: ${{ needs.assurance.outputs.candidate_artifact_name }}
    steps:
      - name: Check out the exact tagged source and current main
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: "false"
      - name: Enforce exact subsequent tag, current main, and clean source
        run: |
          test "$GITHUB_REF_TYPE" = "tag"
          test "$(git rev-parse HEAD)" = "$GITHUB_SHA"
          test "$(git rev-parse "refs/tags/$GITHUB_REF_NAME^{commit}")" = "$GITHUB_SHA"
          git fetch --no-tags origin '+refs/heads/main:refs/remotes/origin/main'
          test "$(git rev-parse refs/remotes/origin/main)" = "$GITHUB_SHA"
          test -z "$(git status --short)"
          node --input-type=module <<'NODE'
          import fs from "node:fs";
          const policy = JSON.parse(fs.readFileSync("config/companion-release-policy.json", "utf8"));
          const manifest = JSON.parse(fs.readFileSync("packages/cli/package.json", "utf8"));
          const expectedMaintainer = policy.publication.expected_npm_maintainer;
          if (policy.distribution !== "npm"
              || policy.publication.subsequent_registry_authentication !== "github-oidc"
              || policy.publication.subsequent_workflow_path !== ".github/workflows/studio-npm-oidc-publish.yml"
              || policy.publication.expected_oidc_publisher !== "GitHub Actions"
              || policy.publication.expected_oidc_trusted_publisher_id !== "github"
              || manifest.name !== policy.package.name
              || manifest.version !== policy.package.version
              || manifest.engines?.node !== policy.package.node_engine
              || process.env.GITHUB_REF_NAME !== `v${manifest.version}`
              || process.env.GITHUB_REF_NAME !== policy.package.tag
              || process.env.GITHUB_REF_NAME === "v1.0.0"
              || !/^[a-z0-9][a-z0-9._-]{0,63}$/u.test(expectedMaintainer ?? "")
              || /^(?:replace|pending|todo)/iu.test(expectedMaintainer)) {
            throw new Error("Subsequent npm tag does not match the reviewed OIDC publication policy.");
          }
          NODE
      - name: Use the verified Node.js line and npm registry mapping
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24.18.0
          registry-url: https://registry.npmjs.org
          package-manager-cache: "false"
      - name: Download the exact candidate exercised by all platform lanes
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ${{ env.ASSURED_CANDIDATE_ARTIFACT }}
          path: output/npm
      - name: Bind the direct tarball to assurance
        run: |
          node --input-type=module <<'NODE'
          import { createHash } from "node:crypto";
          import fs from "node:fs";
          const candidates = fs.readdirSync("output/npm").filter((file) => file.endsWith(".tgz"));
          if (candidates.length !== 1 || process.env.ASSURED_CANDIDATE_COMMIT !== process.env.GITHUB_SHA) {
            throw new Error("OIDC publication did not receive one exact assured candidate.");
          }
          const tarball = `output/npm/${candidates[0]}`;
          const integrity = `sha512-${createHash("sha512").update(fs.readFileSync(tarball)).digest("base64")}`;
          if (integrity !== process.env.ASSURED_NPM_INTEGRITY) {
            throw new Error("OIDC publication tarball differs from cross-platform assurance.");
          }
          fs.appendFileSync(process.env.GITHUB_ENV, `TARBALL=${tarball}\nLOCAL_NPM_INTEGRITY=${integrity}\n`);
          NODE
      - name: Determine whether exact package bytes already exist
        id: registry
        run: |
          node --input-type=module <<'NODE'
          import fs from "node:fs";
          const policy = JSON.parse(fs.readFileSync("config/companion-release-policy.json", "utf8"));
          const response = await fetch(`${policy.package.registry}/${policy.package.name}/${policy.package.version}`, {
            redirect: "error",
            signal: AbortSignal.timeout(15000)
          });
          let outcome;
          if (response.status === 404) outcome = "needs-publication";
          else if (response.status === 200) {
            const published = await response.json();
            const maintainerName = (record) => typeof record === "string"
              ? record.replace(/\s+<[^>]+>$/u, "").trim()
              : record?.name;
            const publisher = published._npmUser;
            const maintainers = (published.maintainers ?? []).map(maintainerName);
            if (published.name !== policy.package.name
                || published.version !== policy.package.version
                || published.dist?.integrity !== process.env.LOCAL_NPM_INTEGRITY
                || publisher?.name !== policy.publication.expected_oidc_publisher
                || publisher?.trustedPublisher?.id !== policy.publication.expected_oidc_trusted_publisher_id
                || !maintainers.includes(policy.publication.expected_npm_maintainer)) {
              throw new Error("The registry already contains different bytes or unexpected ownership for this immutable version.");
            }
            outcome = "verified-existing";
          } else throw new Error(`Registry preflight returned ${response.status}.`);
          fs.appendFileSync(process.env.GITHUB_ENV, `REGISTRY_OUTCOME=${outcome}\n`);
          fs.appendFileSync(process.env.GITHUB_OUTPUT, `outcome=${outcome}\n`);
          NODE
      - name: Publish through npm trusted publishing
        if: steps.registry.outputs.outcome == 'needs-publication'
        run: |
          test -z "${NODE_AUTH_TOKEN:-}"
          NPM_VERSION="$(npm --version)"
          node -e 'const [major, minor] = process.argv[1].split(".").map(Number); if (major < 11 || (major === 11 && minor < 5)) process.exit(1)' "$NPM_VERSION"
          npm publish "$TARBALL" --access public --provenance
          printf '%s\n' 'PUBLICATION_OUTCOME=published' >> "$GITHUB_ENV"
      - name: Record idempotent exact-byte recovery
        if: steps.registry.outputs.outcome == 'verified-existing'
        run: printf '%s\n' 'PUBLICATION_OUTCOME=verified-existing' >> "$GITHUB_ENV"
      - name: Verify registry integrity and provenance
        run: |
          PACKAGE_VERSION="${GITHUB_REF_NAME#v}"
          verified=false
          for attempt in $(seq 1 20); do
            if npm view "dusk-developer-studio@$PACKAGE_VERSION" --registry=https://registry.npmjs.org --json > "$RUNNER_TEMP/npm-view.json" \
              && node --input-type=module <<'NODE'
          import fs from "node:fs";
          const policy = JSON.parse(fs.readFileSync("config/companion-release-policy.json", "utf8"));
          const published = JSON.parse(fs.readFileSync(`${process.env.RUNNER_TEMP}/npm-view.json`, "utf8"));
          const registryResponse = await fetch(`${policy.package.registry}/${policy.package.name}/${policy.package.version}`, {
            redirect: "error",
            signal: AbortSignal.timeout(15000)
          });
          if (registryResponse.status !== 200) process.exit(1);
          const registryPublished = await registryResponse.json();
          const npmDisplayName = (record) => typeof record === "string"
            ? record.replace(/\s+<[^>]+>$/u, "").trim()
            : record?.name;
          const npmPublisher = npmDisplayName(published._npmUser);
          const maintainers = (published.maintainers ?? []).map(npmDisplayName);
          const registryMaintainers = (registryPublished.maintainers ?? []).map(npmDisplayName);
          const registryPublisher = registryPublished._npmUser;
          if (published.name !== policy.package.name
              || published.version !== policy.package.version
              || published.dist?.integrity !== process.env.LOCAL_NPM_INTEGRITY
              || registryPublished.name !== policy.package.name
              || registryPublished.version !== policy.package.version
              || registryPublished.dist?.integrity !== process.env.LOCAL_NPM_INTEGRITY
              || npmPublisher !== policy.publication.expected_oidc_publisher
              || registryPublisher?.name !== policy.publication.expected_oidc_publisher
              || registryPublisher?.trustedPublisher?.id !== policy.publication.expected_oidc_trusted_publisher_id
              || !maintainers.includes(policy.publication.expected_npm_maintainer)
              || !registryMaintainers.includes(policy.publication.expected_npm_maintainer)
              || published.dist?.attestations?.provenance?.predicateType !== "https://slsa.dev/provenance/v1") process.exit(1);
          NODE
            then
              verified=true
              break
            fi
            sleep 3
          done
          test "$verified" = true
          VERIFY_ROOT="$RUNNER_TEMP/npm-signature-verification"
          mkdir -p "$VERIFY_ROOT"
          cd "$VERIFY_ROOT"
          npm init --yes >/dev/null
          npm install --ignore-scripts --no-audit --no-fund --save-exact --registry=https://registry.npmjs.org "dusk-developer-studio@$PACKAGE_VERSION"
          node --input-type=module <<'NODE'
          import fs from "node:fs";
          const lock = JSON.parse(fs.readFileSync("package-lock.json", "utf8"));
          const record = lock.packages?.["node_modules/dusk-developer-studio"];
          if (record?.version !== process.env.GITHUB_REF_NAME.slice(1) || record.integrity !== process.env.LOCAL_NPM_INTEGRITY) {
            throw new Error("Signature verification lockfile is not bound to the exact published tarball.");
          }
          NODE
          npm audit signatures --registry=https://registry.npmjs.org
          node "$GITHUB_WORKSPACE/scripts/verify-npm-provenance.mjs" \
            "--metadata=$RUNNER_TEMP/npm-view.json" \
            "--output=$RUNNER_TEMP/npm-provenance-binding.json" \
            --publication=subsequent
      - name: Write and upload the direct OIDC receipt
        run: |
          node --input-type=module <<'NODE'
          import fs from "node:fs";
          const policy = JSON.parse(fs.readFileSync("config/companion-release-policy.json", "utf8"));
          const provenance = JSON.parse(fs.readFileSync(`${process.env.RUNNER_TEMP}/npm-provenance-binding.json`, "utf8"));
          const receipt = {
            schema_version: 1,
            status: process.env.PUBLICATION_OUTCOME,
            package_name: policy.package.name,
            package_version: policy.package.version,
            candidate_commit: process.env.GITHUB_SHA,
            integrity: process.env.LOCAL_NPM_INTEGRITY,
            npm_maintainer: policy.publication.expected_npm_maintainer,
            npm_publisher: policy.publication.expected_oidc_publisher,
            trusted_publisher_id: policy.publication.expected_oidc_trusted_publisher_id,
            registry_authentication: "github-oidc",
            provenance_verification: "npm-audit-signatures-and-slsa-source-bound",
            ...provenance,
            observed_at: new Date().toISOString()
          };
          fs.writeFileSync(`output/npm/studio-npm-oidc-publication-receipt-${process.env.GITHUB_RUN_ID}.json`, `${JSON.stringify(receipt, null, 2)}\n`);
          NODE
      - name: Upload the direct OIDC publication receipt
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: studio-npm-oidc-publication-receipt-${{ github.run_id }}.json
          path: output/npm/studio-npm-oidc-publication-receipt-${{ github.run_id }}.json
          archive: false
          if-no-files-found: error
          retention-days: 90
