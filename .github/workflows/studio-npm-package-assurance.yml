name: Studio npm package assurance

"on":
  workflow_call:
    outputs:
      integrity:
        description: SHA-512 integrity of the exact three-platform tarball
        value: ${{ jobs.aggregate-assurance.outputs.integrity }}
      package_inventory_sha256:
        description: SHA-256 of the exact three-platform package inventory
        value: ${{ jobs.aggregate-assurance.outputs.package_inventory_sha256 }}
      candidate_commit:
        description: Exact commit exercised by all three platform lanes
        value: ${{ jobs.aggregate-assurance.outputs.candidate_commit }}
      candidate_artifact_name:
        description: Run-scoped direct artifact containing the assured tarball
        value: ${{ jobs.aggregate-assurance.outputs.candidate_artifact_name }}
  workflow_dispatch:
    inputs:
      candidate_artifact_fingerprint_sha256:
        description: Exact Phase 5 candidate artifact fingerprint (lowercase SHA-256)
        required: true
        type: string
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: studio-npm-assurance-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CI: "true"
  NODE_VERSION: 24.18.0
  PNPM_VERSION: 11.7.0
  TARBALL: output/npm/dusk-developer-studio-1.0.1.tgz
  PRIMARY_ENTRY: node_modules/dusk-developer-studio/bin/dusk-developer-studio.mjs
  CANDIDATE_ARTIFACT: dusk-developer-studio-1.0.1.tgz

jobs:
  build-package:
    name: Build the exact npm candidate once
    runs-on: ubuntu-24.04
    timeout-minutes: 25
    outputs:
      integrity: ${{ steps.candidate.outputs.integrity }}
      package_inventory_sha256: ${{ steps.candidate.outputs.package_inventory_sha256 }}
      candidate_commit: ${{ steps.candidate.outputs.candidate_commit }}
      candidate_artifact_name: ${{ steps.candidate.outputs.candidate_artifact_name }}
      tarball_sha256: ${{ steps.candidate.outputs.tarball_sha256 }}
      package_name: ${{ steps.candidate.outputs.package_name }}
      package_version: ${{ steps.candidate.outputs.package_version }}
      browser_smoke: ${{ steps.browser.outputs.status }}
      exact_tarball_local_actions_scaffold_smoke: ${{ steps.browser.outputs.local_actions_scaffold_smoke }}
      exact_tarball_scaffold_preservation_smoke: ${{ steps.browser.outputs.scaffold_preservation_smoke }}
      exact_tarball_shutdown_smoke: ${{ steps.browser.outputs.shutdown_smoke }}
    steps:
      - name: Check out reviewed source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 1
          persist-credentials: "false"
      - name: Bind assurance to the exact checkout
        run: |
          test "$(git rev-parse HEAD)" = "$GITHUB_SHA"
          test -z "$(git status --short)"
      - name: Use the verified Node.js line
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24.18.0
          package-manager-cache: "false"
      - name: Enable repository-pinned pnpm
        run: |
          corepack enable
          corepack install --global pnpm@$PNPM_VERSION
      - name: Restore frozen dependencies
        run: pnpm install --frozen-lockfile
      - name: Build, test, and pack the exact npm candidate
        run: |
          pnpm build:npm
          pnpm test:npm
          node scripts/npm-package-pack.mjs
          test -f "$TARBALL"
      - name: Validate identity, allowlist, unpacked size, and candidate bindings
        id: candidate
        run: |
          node --input-type=module <<'NODE'
          import { execFileSync } from "node:child_process";
          import { createHash } from "node:crypto";
          import fs from "node:fs";
          import os from "node:os";
          import path from "node:path";
          const policy = JSON.parse(fs.readFileSync("config/companion-release-policy.json", "utf8"));
          const manifest = JSON.parse(fs.readFileSync("packages/cli/package.json", "utf8"));
          const tarball = process.env.TARBALL;
          if (policy.distribution !== "npm"
              || manifest.name !== policy.package.name
              || manifest.version !== policy.package.version
              || manifest.engines?.node !== policy.package.node_engine
              || manifest.private === true
              || Object.keys(manifest.dependencies ?? {}).length
              || ["preinstall", "install", "postinstall"].some((name) => manifest.scripts?.[name])) {
            throw new Error("npm package identity, engine, dependency, or lifecycle-script policy failed.");
          }
          const archiveEntries = execFileSync("tar", ["-tzf", tarball], { encoding: "utf8" })
            .split(/\r?\n/u).filter(Boolean);
          if (archiveEntries.some((entry) => {
            const normalized = entry.replace(/\/$/u, "");
            return !normalized.startsWith("package/")
              || normalized.includes("\\")
              || normalized.split("/").some((segment) => segment === "." || segment === "..");
          })) {
            throw new Error("npm package contains an unsafe archive path.");
          }
          const files = archiveEntries
            .filter((entry) => !entry.endsWith("/"))
            .map((entry) => entry.slice("package/".length))
            .sort();
          const inventory = policy.package_inventory;
          if (files.length > inventory.maximum_files
              || new Set(files).size !== files.length
              || inventory.required_paths.some((required) => !files.includes(required))
              || files.some((file) => {
                const root = file.split("/", 1)[0];
                return !inventory.allowed_root_files.includes(file) && !inventory.allowed_roots.includes(root);
              })
              || files.some((file) => /\.(?:exe|dll|dylib|so|node)$/iu.test(file))) {
            throw new Error("npm package inventory is outside the exact reviewed allowlist.");
          }
          const extractionRoot = fs.mkdtempSync(path.join(os.tmpdir(), "dusk-studio-npm-"));
          let unpackedBytes = 0;
          const extractedFiles = [];
          try {
            execFileSync("tar", ["-xzf", tarball, "-C", extractionRoot]);
            const walk = (directory, prefix = "") => {
              for (const name of fs.readdirSync(directory).sort()) {
                const absolute = path.join(directory, name);
                const relative = prefix ? `${prefix}/${name}` : name;
                const stats = fs.lstatSync(absolute);
                if (stats.isSymbolicLink() || (!stats.isDirectory() && !stats.isFile())) {
                  throw new Error(`npm package contains a non-regular entry: ${relative}`);
                }
                if (stats.isDirectory()) walk(absolute, relative);
                else {
                  unpackedBytes += stats.size;
                  extractedFiles.push(relative);
                }
              }
            };
            walk(path.join(extractionRoot, "package"));
          } finally {
            fs.rmSync(extractionRoot, { recursive: true, force: true });
          }
          if (unpackedBytes <= 0
              || unpackedBytes > inventory.maximum_unpacked_bytes
              || JSON.stringify(extractedFiles.sort()) !== JSON.stringify(files)) {
            throw new Error("npm package unpacked inventory or size is outside policy.");
          }
          const bytes = fs.readFileSync(tarball);
          const integrity = `sha512-${createHash("sha512").update(bytes).digest("base64")}`;
          const tarballSha256 = createHash("sha256").update(bytes).digest("hex");
          const inventorySha256 = createHash("sha256").update(`${files.join("\n")}\n`, "utf8").digest("hex");
          fs.appendFileSync(process.env.GITHUB_OUTPUT, [
            `integrity=${integrity}`,
            `tarball_sha256=${tarballSha256}`,
            `package_inventory_sha256=${inventorySha256}`,
            `candidate_commit=${process.env.GITHUB_SHA}`,
            `candidate_artifact_name=${process.env.CANDIDATE_ARTIFACT}`,
            `package_name=${manifest.name}`,
            `package_version=${manifest.version}`,
            ""
          ].join("\n"));
          NODE
      - name: Confirm hosted Chrome is available
        run: |
          command -v google-chrome-stable
          google-chrome-stable --version
      - name: Render, pair, scaffold, preserve, and verify shutdown from the exact tarball
        id: browser
        run: |
          node scripts/npm-package-browser-smoke.mjs \
            --tarball="$TARBALL" \
            --receipt=output/npm/npm-browser-ubuntu.json
          node --input-type=module <<'NODE'
          import fs from "node:fs";
          const receipt = JSON.parse(fs.readFileSync("output/npm/npm-browser-ubuntu.json", "utf8"));
          if (receipt.status !== "passed"
              || receipt.local_actions_scaffold_verified !== true
              || receipt.scaffold_preserved_after_shutdown !== true
              || receipt.studio_shutdown_verified !== true) {
            throw new Error("Exact-tarball Local Actions scaffold, preservation, or shutdown proof is incomplete.");
          }
          fs.appendFileSync(process.env.GITHUB_OUTPUT, [
            "status=passed",
            "local_actions_scaffold_smoke=passed",
            "scaffold_preservation_smoke=passed",
            "shutdown_smoke=passed",
            ""
          ].join("\n"));
          NODE
      - name: Upload the bounded browser assurance receipt
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: npm-browser-ubuntu
          path: output/npm/npm-browser-ubuntu.json
          archive: false
          if-no-files-found: error
          retention-days: 90
      - name: Upload the direct assured npm candidate
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ env.CANDIDATE_ARTIFACT }}
          path: ${{ env.TARBALL }}
          archive: false
          if-no-files-found: error
          retention-days: 30

  package-assurance:
    name: npm package assurance (${{ matrix.runner }})
    needs: build-package
    strategy:
      fail-fast: false
      matrix:
        runner: [ubuntu-24.04, windows-2025, macos-15]
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 20
    env:
      EXPECTED_NPM_INTEGRITY: ${{ needs.build-package.outputs.integrity }}
      EXPECTED_PACKAGE_INVENTORY_SHA256: ${{ needs.build-package.outputs.package_inventory_sha256 }}
      EXPECTED_CANDIDATE_COMMIT: ${{ needs.build-package.outputs.candidate_commit }}
    steps:
      - name: Check out the exact candidate policy
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 1
          persist-credentials: "false"
      - name: Use the verified Node.js line
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24.18.0
          package-manager-cache: "false"
      - name: Download the exact once-built npm candidate
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ${{ env.CANDIDATE_ARTIFACT }}
          path: output/npm
      - name: Verify the downloaded candidate bytes and inventory
        shell: bash
        run: |
          test "$EXPECTED_CANDIDATE_COMMIT" = "$GITHUB_SHA"
          node --input-type=module <<'NODE'
          import { execFileSync } from "node:child_process";
          import { createHash } from "node:crypto";
          import fs from "node:fs";
          const bytes = fs.readFileSync(process.env.TARBALL);
          const integrity = `sha512-${createHash("sha512").update(bytes).digest("base64")}`;
          const files = execFileSync("tar", ["-tzf", process.env.TARBALL], { encoding: "utf8" })
            .split(/\r?\n/u).filter((entry) => entry && !entry.endsWith("/"))
            .map((entry) => entry.replace(/^package\//u, "")).sort();
          const inventorySha256 = createHash("sha256").update(`${files.join("\n")}\n`, "utf8").digest("hex");
          if (integrity !== process.env.EXPECTED_NPM_INTEGRITY
              || inventorySha256 !== process.env.EXPECTED_PACKAGE_INVENTORY_SHA256) {
            throw new Error("Downloaded npm candidate differs from the once-built assured bytes.");
          }
          fs.appendFileSync(process.env.GITHUB_ENV, `NPM_INTEGRITY=${integrity}\nPACKAGE_INVENTORY_SHA256=${inventorySha256}\n`);
          NODE
      - name: Install and exercise npm package on POSIX
        if: runner.os != 'Windows'
        shell: bash
        run: |
          INSTALL_ROOT="$RUNNER_TEMP/npm-install"
          npm install --ignore-scripts --prefix "$INSTALL_ROOT" "$TARBALL"
          PRIMARY="$INSTALL_ROOT/$PRIMARY_ENTRY"
          NODE_BIN="$(command -v node)"
          test -f "$PRIMARY"
          test -x "$NODE_BIN"
          DIRECT_PARENT="$RUNNER_TEMP/npm-direct-cli"
          mkdir -p "$DIRECT_PARENT"
          (
            cd "$DIRECT_PARENT"
            "$NODE_BIN" "$PRIMARY" create-duskds platform-direct-counter
          )
          test -f "$DIRECT_PARENT/platform-direct-counter/Cargo.lock"
          test -f "$DIRECT_PARENT/platform-direct-counter/src/lib.rs"
          grep -F "d1e39a16ad5e2cd0675c7aafa6e2c459310bcb1a" \
            "$DIRECT_PARENT/platform-direct-counter/PROVENANCE.md"
          set +e
          DIRECT_RETRY="$(
            cd "$DIRECT_PARENT"
            "$NODE_BIN" "$PRIMARY" create-duskds platform-direct-counter 2>&1
          )"
          DIRECT_RETRY_STATUS=$?
          set -e
          test "$DIRECT_RETRY_STATUS" -ne 0
          printf '%s' "$DIRECT_RETRY" | grep -Ei "existing target|already exists"
          "$NODE_BIN" "$PRIMARY" --lifecycle-self-test --no-open
          LOCAL_ACTIONS_ROOT="$RUNNER_TEMP/npm-local-actions-$GITHUB_RUN_ID"
          LOCAL_ACTIONS_OUTPUT="$(
            DUSK_STUDIO_DUSKDS_PROJECT_ROOT="$LOCAL_ACTIONS_ROOT" \
              "$NODE_BIN" "$PRIMARY" local-actions --lifecycle-self-test --no-open
          )"
          printf '%s\n' "$LOCAL_ACTIONS_OUTPUT"
          export LOCAL_ACTIONS_OUTPUT LOCAL_ACTIONS_ROOT
          node --input-type=module <<'NODE'
          import fs from "node:fs";
          import path from "node:path";
          const lines = process.env.LOCAL_ACTIONS_OUTPUT.split(/\r?\n/u)
            .filter((line) => line.startsWith("DUSK_STUDIO_LIFECYCLE="));
          if (lines.length !== 1) throw new Error("Local Actions lifecycle receipt is missing or duplicated.");
          const receipt = JSON.parse(lines[0].slice("DUSK_STUDIO_LIFECYCLE=".length));
          if (receipt.schema_version !== 2
              || receipt.mode !== "local-actions"
              || receipt.local_actions_scaffold_smoke !== "passed"
              || receipt.scaffold_preservation_smoke !== "passed"
              || receipt.shutdown_smoke !== "passed"
              || receipt.studio_loopback_services_stopped !== true) {
            throw new Error("Local Actions lifecycle did not prove scaffold, preservation, and shutdown.");
          }
          const root = fs.realpathSync(process.env.LOCAL_ACTIONS_ROOT);
          const entries = fs.readdirSync(root, { withFileTypes: true });
          if (entries.length !== 1 || !entries[0].isDirectory() || entries[0].isSymbolicLink()) {
            throw new Error("Local Actions lifecycle did not retain exactly one regular project.");
          }
          const project = path.join(root, entries[0].name);
          for (const required of [
            "Cargo.lock", "Cargo.toml", "PROVENANCE.md", "rust-toolchain.toml",
            "src/lib.rs", "tests/contract.rs"
          ]) {
            const stat = fs.lstatSync(path.join(project, required));
            if (!stat.isFile() || stat.isSymbolicLink()) {
              throw new Error(`Local Actions retained an unsafe required file: ${required}.`);
            }
          }
          const rejectLinks = (directory) => {
            for (const entry of fs.readdirSync(directory, { withFileTypes: true })) {
              const absolute = path.join(directory, entry.name);
              const stat = fs.lstatSync(absolute);
              if (entry.isSymbolicLink() || stat.isSymbolicLink()) {
                throw new Error("Local Actions retained a link.");
              }
              if (entry.isDirectory() && stat.isDirectory()) rejectLinks(absolute);
              else if (!entry.isFile() || !stat.isFile()) throw new Error("Local Actions retained a non-regular entry.");
            }
          };
          rejectLinks(project);
          NODE
          set +e
          ELEVATED_OUTPUT="$(sudo -n "$NODE_BIN" "$PRIMARY" --lifecycle-self-test --no-open 2>&1)"
          ELEVATED_STATUS=$?
          set -e
          test "$ELEVATED_STATUS" -ne 0
          printf '%s' "$ELEVATED_OUTPUT" | grep -F "Dusk Developer Studio refuses elevated or root execution."
          printf '%s\n' \
            'NPM_SAFE_SMOKE=passed' \
            'NPM_LOCAL_ACTIONS_CAPABILITY_CONTRACT_SMOKE=passed' \
            'NPM_DIRECT_CLI_SCAFFOLD_SMOKE=passed' \
            'NPM_LOCAL_ACTIONS_SCAFFOLD_SMOKE=passed' \
            'NPM_SCAFFOLD_PRESERVATION_SMOKE=passed' \
            'NPM_SHUTDOWN_SMOKE=passed' \
            'NPM_ELEVATED_REFUSAL=passed' >> "$GITHUB_ENV"
      - name: Install and exercise npm package on Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $isAdmin = ([Security.Principal.WindowsPrincipal] [Security.Principal.WindowsIdentity]::GetCurrent()).IsInRole([Security.Principal.WindowsBuiltInRole]::Administrator)
          if (-not $isAdmin) { throw 'Windows assurance runner must provide the separate elevated-refusal lane.' }
          $publicRoot = Join-Path $env:PUBLIC "dusk-studio-npm-$env:GITHUB_RUN_ID"
          $dataRoot = Join-Path $env:PUBLIC "dusk-studio-npm-data-$env:GITHUB_RUN_ID"
          $userName = "dsn$env:GITHUB_RUN_ID"
          $passwordPlain = "$([Guid]::NewGuid().ToString('N'))Aa1!"
          $password = ConvertTo-SecureString $passwordPlain -AsPlainText -Force
          $credential = [PSCredential]::new("$env:COMPUTERNAME\$userName", $password)
          $userCreated = $false
          try {
            if ((Test-Path -LiteralPath $publicRoot) -or (Test-Path -LiteralPath $dataRoot)) {
              throw 'Windows npm assurance roots must not already exist.'
            }
            New-Item -ItemType Directory -Path $publicRoot | Out-Null
            $profileRoot = Join-Path $dataRoot 'Profile'
            $localAppData = Join-Path $profileRoot 'AppData\Local'
            $roamingAppData = Join-Path $profileRoot 'AppData\Roaming'
            $tempRoot = Join-Path $dataRoot 'Temp'
            $directCliRoot = Join-Path $dataRoot 'DirectCli'
            $localActionsRoot = Join-Path $dataRoot 'LocalActions'
            New-Item -ItemType Directory -Path $localAppData, $roamingAppData, $tempRoot, $directCliRoot -Force | Out-Null
            $tarball = (Resolve-Path -LiteralPath $env:TARBALL).Path
            npm install --ignore-scripts --prefix $publicRoot $tarball
            if ($LASTEXITCODE -ne 0) { throw 'npm package installation failed.' }
            $publicNode = Join-Path $publicRoot 'node.exe'
            Copy-Item -LiteralPath (Get-Command node.exe).Source -Destination $publicNode
            $publicPrimary = Join-Path $publicRoot $env:PRIMARY_ENTRY
            if (-not (Test-Path -LiteralPath $publicPrimary -PathType Leaf)) { throw 'Installed primary entrypoint is missing.' }
            New-LocalUser -Name $userName -Password $password -AccountNeverExpires -PasswordNeverExpires | Out-Null
            $userCreated = $true
            $userSid = (Get-LocalUser -Name $userName).SID.Value
            & "$env:SystemRoot\System32\icacls.exe" $publicRoot '/inheritance:r' '/grant:r' `
              '*S-1-5-18:(OI)(CI)F' '*S-1-5-32-544:(OI)(CI)F' "*${userSid}:(OI)(CI)RX" | Out-Null
            if ($LASTEXITCODE -ne 0) { throw 'Could not bound the public npm assurance root ACL.' }
            & "$env:SystemRoot\System32\icacls.exe" $dataRoot '/inheritance:r' '/grant:r' `
              '*S-1-5-18:(OI)(CI)F' '*S-1-5-32-544:(OI)(CI)F' "*${userSid}:(OI)(CI)M" | Out-Null
            if ($LASTEXITCODE -ne 0) { throw 'Could not bound the npm assurance data root ACL.' }
            $childEnvironment = @{
              APPDATA = $roamingAppData
              HOME = $profileRoot
              LOCALAPPDATA = $localAppData
              TEMP = $tempRoot
              TMP = $tempRoot
              USERPROFILE = $profileRoot
              DUSK_STUDIO_DUSKDS_PROJECT_ROOT = $localActionsRoot
            }
            function Invoke-StandardUserSmoke {
              param(
                [string[]] $Arguments,
                [string] $Label,
                [string] $WorkingDirectory = $publicRoot,
                [switch] $ExpectFailure
              )
              $stdout = Join-Path $env:RUNNER_TEMP "$Label.stdout.txt"
              $stderr = Join-Path $env:RUNNER_TEMP "$Label.stderr.txt"
              $process = Start-Process -FilePath $publicNode `
                -ArgumentList (@($publicPrimary) + $Arguments) `
                -WorkingDirectory $WorkingDirectory `
                -Credential $credential `
                -Environment $childEnvironment `
                -LoadUserProfile `
                -WindowStyle Hidden `
                -RedirectStandardOutput $stdout `
                -RedirectStandardError $stderr `
                -Wait `
                -PassThru
              $detail = @(
                Get-Content -Raw -ErrorAction SilentlyContinue $stderr
                Get-Content -Raw -ErrorAction SilentlyContinue $stdout
              ) -join "`n"
              if ($ExpectFailure) {
                if ($process.ExitCode -eq 0) { throw "$Label unexpectedly succeeded." }
              } elseif ($process.ExitCode -ne 0) {
                throw "$Label failed as the temporary standard user: $($detail.Trim())"
              }
              return [PSCustomObject]@{
                ExitCode = $process.ExitCode
                Output = $detail
              }
            }
            $directCreate = Invoke-StandardUserSmoke `
              -Arguments @('create-duskds', 'platform-direct-counter') `
              -Label 'direct-cli-scaffold' `
              -WorkingDirectory $directCliRoot
            $directProject = Join-Path $directCliRoot 'platform-direct-counter'
            foreach ($required in @('Cargo.lock', 'Cargo.toml', 'PROVENANCE.md', 'rust-toolchain.toml', 'src\lib.rs', 'tests\contract.rs')) {
              $requiredPath = Join-Path $directProject $required
              if (-not (Test-Path -LiteralPath $requiredPath -PathType Leaf)
                  -or ((Get-Item -LiteralPath $requiredPath -Force).Attributes -band [IO.FileAttributes]::ReparsePoint)) {
                throw "Direct CLI scaffold retained an unsafe required file: $required"
              }
            }
            $directRetry = Invoke-StandardUserSmoke `
              -Arguments @('create-duskds', 'platform-direct-counter') `
              -Label 'direct-cli-overwrite-refusal' `
              -WorkingDirectory $directCliRoot `
              -ExpectFailure
            if ($directRetry.Output -notmatch 'existing target|already exists') {
              throw 'Direct CLI retry did not report overwrite refusal.'
            }
            $safeResult = Invoke-StandardUserSmoke -Arguments @('--lifecycle-self-test', '--no-open') -Label 'safe-smoke'
            $localActionsResult = Invoke-StandardUserSmoke -Arguments @('local-actions', '--lifecycle-self-test', '--no-open') -Label 'local-actions-capability-contract-smoke'
            $lifecycleLines = @($localActionsResult.Output -split "`r?`n" | Where-Object { $_.StartsWith('DUSK_STUDIO_LIFECYCLE=') })
            if ($lifecycleLines.Count -ne 1) { throw 'Local Actions lifecycle receipt is missing or duplicated.' }
            $lifecycle = $lifecycleLines[0].Substring('DUSK_STUDIO_LIFECYCLE='.Length) | ConvertFrom-Json
            if ($lifecycle.schema_version -ne 2
                -or $lifecycle.mode -ne 'local-actions'
                -or $lifecycle.local_actions_scaffold_smoke -ne 'passed'
                -or $lifecycle.scaffold_preservation_smoke -ne 'passed'
                -or $lifecycle.shutdown_smoke -ne 'passed'
                -or $lifecycle.studio_loopback_services_stopped -ne $true) {
              throw 'Local Actions lifecycle did not prove scaffold, preservation, and shutdown.'
            }
            $localProjects = @(Get-ChildItem -LiteralPath $localActionsRoot -Force)
            if ($localProjects.Count -ne 1
                -or -not $localProjects[0].PSIsContainer
                -or ($localProjects[0].Attributes -band [IO.FileAttributes]::ReparsePoint)) {
              throw 'Local Actions lifecycle did not retain exactly one regular project.'
            }
            foreach ($required in @('Cargo.lock', 'Cargo.toml', 'PROVENANCE.md', 'rust-toolchain.toml', 'src\lib.rs', 'tests\contract.rs')) {
              $requiredPath = Join-Path $localProjects[0].FullName $required
              if (-not (Test-Path -LiteralPath $requiredPath -PathType Leaf)
                  -or ((Get-Item -LiteralPath $requiredPath -Force).Attributes -band [IO.FileAttributes]::ReparsePoint)) {
                throw "Local Actions lifecycle retained an unsafe required file: $required"
              }
            }
            if (Get-ChildItem -LiteralPath $localProjects[0].FullName -Force -Recurse |
                Where-Object { $_.Attributes -band [IO.FileAttributes]::ReparsePoint } |
                Select-Object -First 1) {
              throw 'Local Actions lifecycle retained a reparse-point entry.'
            }
            $elevatedOutput = & $publicNode $publicPrimary --lifecycle-self-test --no-open 2>&1
            $elevatedStatus = $LASTEXITCODE
            if ($elevatedStatus -eq 0 -or -not (($elevatedOutput | Out-String).Contains('Dusk Developer Studio refuses elevated or root execution.'))) {
              throw 'Elevated Windows launch was not refused.'
            }
            @(
              'NPM_SAFE_SMOKE=passed'
              'NPM_LOCAL_ACTIONS_CAPABILITY_CONTRACT_SMOKE=passed'
              'NPM_DIRECT_CLI_SCAFFOLD_SMOKE=passed'
              'NPM_LOCAL_ACTIONS_SCAFFOLD_SMOKE=passed'
              'NPM_SCAFFOLD_PRESERVATION_SMOKE=passed'
              'NPM_SHUTDOWN_SMOKE=passed'
              'NPM_ELEVATED_REFUSAL=passed'
            ) | Add-Content -LiteralPath $env:GITHUB_ENV
          } finally {
            $passwordPlain = $null
            if ($userCreated) { Remove-LocalUser -Name $userName -ErrorAction SilentlyContinue }
            if (Test-Path -LiteralPath $publicRoot) { Remove-Item -LiteralPath $publicRoot -Recurse -Force }
            if (Test-Path -LiteralPath $dataRoot) { Remove-Item -LiteralPath $dataRoot -Recurse -Force }
          }
          # GitHub's pwsh wrapper exits with the last native process status.
          # The non-zero status above is expected and has already been verified.
          $global:LASTEXITCODE = 0
      - name: Record the platform package result
        shell: bash
        env:
          RUNNER_LABEL: ${{ matrix.runner }}
        run: |
          mkdir -p output/npm/platform
          node --input-type=module <<'NODE'
          import fs from "node:fs";
          const runner = process.env.RUNNER_LABEL;
          if (process.env.NPM_SAFE_SMOKE !== "passed"
              || process.env.NPM_LOCAL_ACTIONS_CAPABILITY_CONTRACT_SMOKE !== "passed"
              || process.env.NPM_DIRECT_CLI_SCAFFOLD_SMOKE !== "passed"
              || process.env.NPM_LOCAL_ACTIONS_SCAFFOLD_SMOKE !== "passed"
              || process.env.NPM_SCAFFOLD_PRESERVATION_SMOKE !== "passed"
              || process.env.NPM_SHUTDOWN_SMOKE !== "passed"
              || process.env.NPM_ELEVATED_REFUSAL !== "passed") {
            throw new Error("Platform receipt cannot be written before all exact-tarball lifecycle and scaffold smokes execute successfully.");
          }
          const receipt = {
            schema_version: 2,
            status: "passed",
            runner,
            node_version: process.env.NODE_VERSION,
            safe_smoke: "passed",
            local_actions_capability_contract_smoke: "passed",
            direct_cli_scaffold_smoke: "passed",
            local_actions_scaffold_smoke: "passed",
            scaffold_preservation_smoke: "passed",
            shutdown_smoke: "passed",
            elevated_refusal: "passed",
            candidate_commit: process.env.GITHUB_SHA,
            integrity: process.env.NPM_INTEGRITY,
            package_inventory_sha256: process.env.PACKAGE_INVENTORY_SHA256,
            observed_at: new Date().toISOString()
          };
          fs.writeFileSync(`output/npm/platform/npm-platform-${runner}.json`, `${JSON.stringify(receipt, null, 2)}\n`);
          NODE
      - name: Upload the bounded platform receipt
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: npm-platform-${{ matrix.runner }}
          path: output/npm/platform/npm-platform-${{ matrix.runner }}.json
          archive: false
          if-no-files-found: error
          retention-days: 90

  agent-pilot:
    name: Agent pilot (${{ matrix.scenario }})
    if: github.event_name == 'workflow_dispatch'
    needs: build-package
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-24.04
            scenario: linux-port-conflict-recovery
          - runner: macos-15
            scenario: macos-privilege-recovery
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 15
    env:
      PILOT_SCENARIO: ${{ matrix.scenario }}
      PILOT_ARTIFACT: studio-agent-pilot-${{ matrix.scenario }}-${{ github.run_id }}.json
      PILOT_PLAN: output/pilots/plans/${{ matrix.scenario }}.json
      PILOT_RECEIPT: output/pilots/studio-agent-pilot-${{ matrix.scenario }}-${{ github.run_id }}.json
      PILOT_WRAPPER: output/pilots/studio-agent-pilot-wrapper-${{ matrix.scenario }}-${{ github.run_id }}.json
      PILOT_WRAPPER_ARTIFACT: studio-agent-pilot-wrapper-${{ matrix.scenario }}-${{ github.run_id }}.json
      PILOT_PROVENANCE: output/pilots/provenance-${{ matrix.scenario }}.json
      PILOT_WORKFLOW_PATH: .github/workflows/studio-npm-package-assurance.yml
      EXPECTED_NPM_INTEGRITY: ${{ needs.build-package.outputs.integrity }}
      EXPECTED_PACKAGE_INVENTORY_SHA256: ${{ needs.build-package.outputs.package_inventory_sha256 }}
      EXPECTED_CANDIDATE_COMMIT: ${{ needs.build-package.outputs.candidate_commit }}
      EXPECTED_TARBALL_SHA256: ${{ needs.build-package.outputs.tarball_sha256 }}
      EXPECTED_PACKAGE_NAME: ${{ needs.build-package.outputs.package_name }}
      EXPECTED_PACKAGE_VERSION: ${{ needs.build-package.outputs.package_version }}
      EXPECTED_CANDIDATE_ARTIFACT: ${{ needs.build-package.outputs.candidate_artifact_name }}
      CANDIDATE_ARTIFACT_FINGERPRINT_SHA256: ${{ inputs.candidate_artifact_fingerprint_sha256 }}
    steps:
      - name: Check out the exact pilot candidate
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 1
          persist-credentials: "false"
      - name: Bind the pilot to a fresh first-attempt dispatch
        shell: bash
        run: |
          test "$GITHUB_EVENT_NAME" = "workflow_dispatch"
          test "$GITHUB_RUN_ATTEMPT" = "1"
          test "$GITHUB_REF" = "refs/heads/main"
          test "$EXPECTED_CANDIDATE_COMMIT" = "$GITHUB_SHA"
          test "$(git rev-parse HEAD)" = "$GITHUB_SHA"
          test -z "$(git status --short)"
      - name: Use the verified Node.js line
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24.18.0
          package-manager-cache: "false"
      - name: Download the exact once-built npm candidate
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ${{ env.EXPECTED_CANDIDATE_ARTIFACT }}
          path: output/npm
      - name: Recompute and bind the exact pilot candidate
        shell: bash
        run: |
          node --input-type=module <<'NODE'
          import { execFileSync } from "node:child_process";
          import { createHash } from "node:crypto";
          import fs from "node:fs";
          const tarball = process.env.TARBALL;
          const stat = fs.lstatSync(tarball);
          if (!stat.isFile() || stat.isSymbolicLink() || stat.size <= 0 || stat.size > 32 * 1024 * 1024) {
            throw new Error("Agent pilot candidate must be a bounded regular tarball.");
          }
          const bytes = fs.readFileSync(tarball);
          const tarballSha256 = createHash("sha256").update(bytes).digest("hex");
          const integrity = `sha512-${createHash("sha512").update(bytes).digest("base64")}`;
          const entries = execFileSync("tar", ["-tzf", tarball], {
            encoding: "utf8",
            timeout: 30_000,
            maxBuffer: 1024 * 1024
          }).split(/\r?\n/u).filter(Boolean);
          if (entries.some((entry) => {
            const normalized = entry.replace(/\/$/u, "");
            return !normalized.startsWith("package/")
              || normalized.includes("\\")
              || normalized.split("/").some((segment) => segment === "." || segment === "..");
          })) {
            throw new Error("Agent pilot candidate contains an unsafe archive path.");
          }
          const files = entries
            .filter((entry) => !entry.endsWith("/"))
            .map((entry) => entry.slice("package/".length))
            .sort();
          const inventorySha256 = createHash("sha256")
            .update(`${files.join("\n")}\n`, "utf8")
            .digest("hex");
          if (tarballSha256 !== process.env.EXPECTED_TARBALL_SHA256
              || integrity !== process.env.EXPECTED_NPM_INTEGRITY
              || inventorySha256 !== process.env.EXPECTED_PACKAGE_INVENTORY_SHA256
              || process.env.EXPECTED_CANDIDATE_COMMIT !== process.env.GITHUB_SHA
              || !/^[a-f0-9]{64}$/u.test(process.env.CANDIDATE_ARTIFACT_FINGERPRINT_SHA256 ?? "")
              || !/^[a-z0-9][a-z0-9._-]{0,63}$/u.test(process.env.EXPECTED_PACKAGE_NAME ?? "")
              || !/^[0-9]+\.[0-9]+\.[0-9]+$/u.test(process.env.EXPECTED_PACKAGE_VERSION ?? "")) {
            throw new Error("Agent pilot candidate differs from the once-built assured bytes or dispatch binding.");
          }
          fs.appendFileSync(process.env.GITHUB_ENV, [
            `PILOT_TARBALL_SHA256=${tarballSha256}`,
            `PILOT_NPM_INTEGRITY=${integrity}`,
            `PILOT_PACKAGE_INVENTORY_SHA256=${inventorySha256}`,
            ""
          ].join("\n"));
          NODE
      - name: Extract the exact candidate into the bounded pilot workspace
        shell: bash
        run: |
          mkdir -p output/pilots/package
          tar -xzf "$TARBALL" -C output/pilots/package --strip-components=1
          test -f output/pilots/package/package-manifest.json
          test -f output/pilots/package/bin/dusk-developer-studio.mjs
      - name: Create the first-attempt GitHub Actions provenance envelope
        shell: bash
        run: |
          mkdir -p output/pilots
          node --input-type=module <<'NODE'
          import fs from "node:fs";
          const workflowPath = process.env.PILOT_WORKFLOW_PATH;
          const expectedWorkflowRef =
            `${process.env.GITHUB_REPOSITORY}/${workflowPath}@${process.env.GITHUB_REF}`;
          if (process.env.GITHUB_EVENT_NAME !== "workflow_dispatch"
              || process.env.GITHUB_RUN_ATTEMPT !== "1"
              || process.env.GITHUB_SHA !== process.env.EXPECTED_CANDIDATE_COMMIT
              || process.env.GITHUB_WORKFLOW_REF !== expectedWorkflowRef
              || !/^[1-9][0-9]{0,19}$/u.test(process.env.GITHUB_RUN_ID ?? "")
              || process.env.GITHUB_REF !== "refs/heads/main"
              || !/^[A-Za-z0-9][A-Za-z0-9._-]{0,127}$/u.test(process.env.PILOT_ARTIFACT ?? "")) {
            throw new Error("GitHub Actions pilot provenance is not a fresh exact first-attempt dispatch.");
          }
          const envelope = {
            schema_version: 1,
            repository: process.env.GITHUB_REPOSITORY,
            workflow_path: workflowPath,
            run_id: process.env.GITHUB_RUN_ID,
            run_attempt: Number(process.env.GITHUB_RUN_ATTEMPT),
            job_name: `agent-pilot-${process.env.PILOT_SCENARIO}`,
            event_name: process.env.GITHUB_EVENT_NAME,
            ref: process.env.GITHUB_REF,
            sha: process.env.GITHUB_SHA,
            artifact_name: process.env.PILOT_ARTIFACT
          };
          fs.writeFileSync(process.env.PILOT_PROVENANCE, `${JSON.stringify(envelope, null, 2)}\n`, {
            encoding: "utf8",
            flag: "wx"
          });
          NODE
      - name: Materialize the deterministic scenario plan
        shell: bash
        run: |
          node scripts/agent-pilot-plan.mjs \
            --scenario "$PILOT_SCENARIO" \
            --package-name "$EXPECTED_PACKAGE_NAME" \
            --package-version "$EXPECTED_PACKAGE_VERSION" \
            --package-commit "$EXPECTED_CANDIDATE_COMMIT" \
            --tarball-sha256 "$PILOT_TARBALL_SHA256" \
            --npm-integrity "$PILOT_NPM_INTEGRITY" \
            --package-inventory-sha256 "$PILOT_PACKAGE_INVENTORY_SHA256" \
            --phase5-fingerprint-sha256 "$CANDIDATE_ARTIFACT_FINGERPRINT_SHA256" \
            --output "$PILOT_PLAN"
      - name: Execute the machine-collected pilot
        shell: bash
        run: |
          node scripts/agent-pilot-collector.mjs \
            --plan "$PILOT_PLAN" \
            --tarball "$TARBALL" \
            --workspace . \
            --output "$PILOT_WRAPPER" \
            --policy config/phase5-policy.json \
            --provenance-envelope "$PILOT_PROVENANCE"
      - name: Validate the wrapper and materialize the canonical direct receipt
        shell: bash
        run: |
          node --input-type=module <<'NODE'
          import { createHash } from "node:crypto";
          import fs from "node:fs";
          import { verifyAgentPilotResult } from "./scripts/agent-pilot-collector.mjs";
          const result = JSON.parse(fs.readFileSync(process.env.PILOT_WRAPPER, "utf8"));
          const envelope = result.receipt?.github_actions_provenance_input;
          if (verifyAgentPilotResult(result) !== true
              || result.phase5_embedding_summary.scenario_id !== process.env.PILOT_SCENARIO
              || result.phase5_embedding_summary.candidate_commit !== process.env.GITHUB_SHA
              || result.phase5_embedding_summary.candidate_artifact_fingerprint_sha256
                !== process.env.CANDIDATE_ARTIFACT_FINGERPRINT_SHA256
              || result.phase5_embedding_summary.artifact_name !== process.env.PILOT_ARTIFACT
              || result.phase5_embedding_summary.run_url
                !== `https://github.com/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID}`
              || result.phase5_embedding_summary.provenance !== null
              || envelope?.repository !== process.env.GITHUB_REPOSITORY
              || envelope?.workflow_path !== process.env.PILOT_WORKFLOW_PATH
              || envelope?.run_id !== process.env.GITHUB_RUN_ID
              || envelope?.run_attempt !== 1
              || envelope?.job_name !== `agent-pilot-${process.env.PILOT_SCENARIO}`
              || envelope?.event_name !== "workflow_dispatch"
              || envelope?.ref !== "refs/heads/main"
              || envelope?.sha !== process.env.GITHUB_SHA
              || envelope?.artifact_name !== process.env.PILOT_ARTIFACT) {
            throw new Error("Agent pilot receipt wrapper or GitHub Actions provenance binding is invalid.");
          }
          const receiptBytes = Buffer.from(
            result.phase5_embedding_summary.receipt_json,
            "utf8"
          );
          const receiptSha256 = createHash("sha256").update(receiptBytes).digest("hex");
          if (receiptSha256 !== result.receipt_sha256
              || receiptBytes.at(-1) === 0x0a
              || receiptBytes.at(-1) === 0x0d) {
            throw new Error("Canonical agent pilot direct receipt bytes are not exact.");
          }
          fs.writeFileSync(process.env.PILOT_RECEIPT, receiptBytes, { flag: "wx" });
          fs.appendFileSync(
            process.env.GITHUB_ENV,
            `PILOT_RECEIPT_SHA256=${receiptSha256}\n`
          );
          NODE
      - name: Upload the direct agent pilot receipt
        id: pilot-upload
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ env.PILOT_ARTIFACT }}
          path: ${{ env.PILOT_RECEIPT }}
          archive: false
          if-no-files-found: error
          retention-days: 90
      - name: Upload the non-formal assembly wrapper
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ env.PILOT_WRAPPER_ARTIFACT }}
          path: ${{ env.PILOT_WRAPPER }}
          archive: false
          if-no-files-found: error
          retention-days: 30
      - name: Record the mandatory post-download provenance assembly boundary
        shell: bash
        env:
          UPLOADED_ARTIFACT_ID: ${{ steps.pilot-upload.outputs.artifact-id }}
          UPLOADED_ARTIFACT_URL: ${{ steps.pilot-upload.outputs.artifact-url }}
          UPLOADED_ARTIFACT_DIGEST: ${{ steps.pilot-upload.outputs.artifact-digest }}
        run: |
          node --input-type=module <<'NODE'
          import fs from "node:fs";
          const artifactId = process.env.UPLOADED_ARTIFACT_ID ?? "";
          const artifactUrl = process.env.UPLOADED_ARTIFACT_URL ?? "";
          const artifactDigest = process.env.UPLOADED_ARTIFACT_DIGEST ?? "";
          if (!/^[1-9][0-9]{0,19}$/u.test(artifactId)
              || artifactUrl
                !== `https://github.com/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID}/artifacts/${artifactId}`
              || !/^[a-f0-9]{64}$/u.test(artifactDigest)
              || artifactDigest !== process.env.PILOT_RECEIPT_SHA256) {
            throw new Error("Uploaded pilot artifact metadata is incomplete.");
          }
          const finalProvenanceFields = [
            "schema_version", "repository", "workflow_path", "run_id", "run_url",
            "run_attempt", "run_event", "run_commit", "run_conclusion", "artifact_id",
            "artifact_name", "artifact_api_url", "artifact_digest_sha256",
            "artifact_sha256", "artifact_expired", "receipt_path", "receipt_sha256",
            "downloaded_at"
          ];
          const assembledSession =
            `output/pilots/phase5-session-${process.env.PILOT_SCENARIO}.json`;
          const assemblyCommand = [
            "node scripts/assemble-agent-pilot-evidence.mjs",
            `--wrapper "${process.env.PILOT_WRAPPER}"`,
            `--output "${assembledSession}"`
          ].join(" ");
          fs.appendFileSync(process.env.GITHUB_STEP_SUMMARY, [
            `### ${process.env.PILOT_SCENARIO} post-download evidence assembly`,
            "",
            `The direct formal artifact is \`${process.env.PILOT_ARTIFACT}\` (artifact ${artifactId}).`,
            `Download the non-formal \`${process.env.PILOT_WRAPPER_ARTIFACT}\` artifact so its wrapper is available at \`${process.env.PILOT_WRAPPER}\`.`,
            "Set `GH_TOKEN` or `GITHUB_TOKEN` to a credential with Actions read access, then run:",
            "",
            "```sh",
            assemblyCommand,
            "```",
            "",
            `The command writes the Phase 5 session to \`${assembledSession}\`. It queries the exact run and artifact APIs, downloads the direct receipt itself, verifies the run, ref, commit, event, attempt, artifact metadata, byte count, digest, and embedded receipt, and emits this exact provenance schema:`,
            "",
            `\`${finalProvenanceFields.join(", ")}\``,
            "",
            "Submit the enriched session, not the collector wrapper, to the Phase 5 evidence set.",
            ""
          ].join("\n"));
          NODE

  aggregate-assurance:
    name: Aggregate npm package assurance
    needs: [build-package, package-assurance]
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    env:
      EXPECTED_NPM_INTEGRITY: ${{ needs.build-package.outputs.integrity }}
      EXPECTED_PACKAGE_INVENTORY_SHA256: ${{ needs.build-package.outputs.package_inventory_sha256 }}
      EXPECTED_CANDIDATE_COMMIT: ${{ needs.build-package.outputs.candidate_commit }}
      EXPECTED_CANDIDATE_ARTIFACT: ${{ needs.build-package.outputs.candidate_artifact_name }}
      EXPECTED_BROWSER_SMOKE: ${{ needs.build-package.outputs.browser_smoke }}
      EXPECTED_LOCAL_ACTIONS_SCAFFOLD_SMOKE: ${{ needs.build-package.outputs.exact_tarball_local_actions_scaffold_smoke }}
      EXPECTED_SCAFFOLD_PRESERVATION_SMOKE: ${{ needs.build-package.outputs.exact_tarball_scaffold_preservation_smoke }}
      EXPECTED_SHUTDOWN_SMOKE: ${{ needs.build-package.outputs.exact_tarball_shutdown_smoke }}
    outputs:
      integrity: ${{ steps.aggregate.outputs.integrity }}
      package_inventory_sha256: ${{ steps.aggregate.outputs.package_inventory_sha256 }}
      candidate_commit: ${{ steps.aggregate.outputs.candidate_commit }}
      candidate_artifact_name: ${{ steps.aggregate.outputs.candidate_artifact_name }}
    steps:
      - name: Check out reviewed source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 1
          persist-credentials: "false"
      - name: Download exact platform receipts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: npm-platform-*
          path: output/npm/platform
          merge-multiple: true
      - name: Aggregate the exact candidate assurance
        id: aggregate
        run: |
          node --input-type=module <<'NODE'
          import fs from "node:fs";
          const policy = JSON.parse(fs.readFileSync("config/companion-release-policy.json", "utf8"));
          if (process.env.EXPECTED_BROWSER_SMOKE !== "passed"
              || process.env.EXPECTED_LOCAL_ACTIONS_SCAFFOLD_SMOKE !== "passed"
              || process.env.EXPECTED_SCAFFOLD_PRESERVATION_SMOKE !== "passed"
              || process.env.EXPECTED_SHUTDOWN_SMOKE !== "passed") {
            throw new Error("Exact-tarball browser boot, pairing, Local Actions scaffold, preservation, and shutdown smoke did not pass.");
          }
          const records = Object.fromEntries(policy.assurance.required_runners.map((runner) => {
            const file = `output/npm/platform/npm-platform-${runner}.json`;
            return [runner, JSON.parse(fs.readFileSync(file, "utf8"))];
          }));
          for (const runner of policy.assurance.required_runners) {
            const record = records[runner];
            if (record.schema_version !== 2
                || record.status !== "passed"
                || record.runner !== runner
                || record.node_version !== process.env.NODE_VERSION
                || record.safe_smoke !== "passed"
                || record.local_actions_capability_contract_smoke !== "passed"
                || record.direct_cli_scaffold_smoke !== "passed"
                || record.local_actions_scaffold_smoke !== "passed"
                || record.scaffold_preservation_smoke !== "passed"
                || record.shutdown_smoke !== "passed"
                || record.elevated_refusal !== "passed"
                || record.candidate_commit !== process.env.EXPECTED_CANDIDATE_COMMIT
                || record.integrity !== process.env.EXPECTED_NPM_INTEGRITY
                || record.package_inventory_sha256 !== process.env.EXPECTED_PACKAGE_INVENTORY_SHA256) {
              throw new Error(`npm platform receipt is not bound to the exact candidate: ${runner}.`);
            }
          }
          const receipt = {
            schema_version: 2,
            status: "passed",
            package_name: policy.package.name,
            package_version: policy.package.version,
            node_engine: policy.package.node_engine,
            candidate_commit: process.env.EXPECTED_CANDIDATE_COMMIT,
            workflow_path: policy.assurance.workflow_path,
            observed_at: new Date().toISOString(),
            integrity: process.env.EXPECTED_NPM_INTEGRITY,
            package_inventory_sha256: process.env.EXPECTED_PACKAGE_INVENTORY_SHA256,
            browser_boot_and_pairing_smoke: "passed",
            exact_tarball_direct_cli_scaffold_smoke: "passed",
            exact_tarball_local_actions_scaffold_smoke: "passed",
            exact_tarball_scaffold_preservation_smoke: "passed",
            exact_tarball_shutdown_smoke: "passed",
            platform_smoke: records
          };
          fs.mkdirSync("output/npm", { recursive: true });
          fs.writeFileSync(`output/npm/studio-npm-assurance-receipt-${process.env.GITHUB_RUN_ID}.json`, `${JSON.stringify(receipt, null, 2)}\n`);
          fs.appendFileSync(process.env.GITHUB_OUTPUT, [
            `integrity=${receipt.integrity}`,
            `package_inventory_sha256=${receipt.package_inventory_sha256}`,
            `candidate_commit=${receipt.candidate_commit}`,
            `candidate_artifact_name=${process.env.EXPECTED_CANDIDATE_ARTIFACT}`,
            ""
          ].join("\n"));
          NODE
      - name: Upload the direct npm assurance receipt
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: studio-npm-assurance-receipt-${{ github.run_id }}.json
          path: output/npm/studio-npm-assurance-receipt-${{ github.run_id }}.json
          archive: false
          if-no-files-found: error
          retention-days: 90
