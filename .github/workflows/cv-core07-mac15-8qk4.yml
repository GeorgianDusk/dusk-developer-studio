name: CV-SEC-06 macOS arm64 public-package pilot

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - ".github/workflows/cv-core07-mac15-8qk4.yml"

permissions:
  contents: read

jobs:
  native-macos-arm64:
    if: github.head_ref == 'agent/cv-core07-mac15-20260722-8qk4'
    runs-on: macos-15
    timeout-minutes: 35
    steps:
      - name: Install exact supported Node
        uses: actions/setup-node@v4
        with:
          node-version: 24.18.0

      - name: Run counted source-blind security pilot
        shell: bash
        env:
          EXEC_ID: CV-X-SEC06-MAC15-20260722T103447Z-P1X7
          PACKAGE_SPEC: dusk-developer-studio@1.0.9
          EXPECTED_SHA256: 0bdb30406229c59b9753c73caadd29dde6d34874b6d05b4cd25e5e9c4c07ff67
          EXPECTED_INTEGRITY: sha512-D4PwA16hD4sRQU+kxU642x7Q+npDZKJhx5hLHkobLOPqOMhL1YE25oQ6WqQlpEc98sXCyRk0LkG316AB/O3DKw==
          EXPECTED_COMMIT: 22312ecc9f221da0f091e9e96e3206f943ea5513
        run: |
          # The repository is intentionally not checked out. This job inspects only
          # public package metadata/docs and black-box product behavior.
          set +e
          set -uo pipefail
          ROOT="$RUNNER_TEMP/$EXEC_ID"
          ART="$RUNNER_TEMP/$EXEC_ID-artifact"
          LOGS="$ROOT/logs"
          RECEIPT="$ROOT/receipt.env"
          TIMELINE="$ROOT/timeline.log"
          STATE="$ROOT/fixture-state"
          PRODUCT_WRAPPER=""
          PRODUCT_LISTENERS=""
          WATCHDOG_PID=""
          TECHNICAL_FAILURE=0
          PRODUCT_DEFECT=0
          rm -rf "$ROOT" "$ART"
          mkdir -p "$ROOT" "$ART" "$LOGS" "$STATE" "$ROOT/home" "$ROOT/cache" \
            "$ROOT/temp" "$ROOT/npm-cache" "$ROOT/npm-prefix" "$ROOT/package" \
            "$ROOT/harness" "$ROOT/browser-profile" "$ROOT/work/actions" \
            "$ROOT/fixture-bin" "$ROOT/sentinel/nested"

          record() { printf '%s=%s\n' "$1" "$2" >> "$RECEIPT"; }
          evidence() { printf '%s %s %s\n' "$1" "$(date -u +%Y-%m-%dT%H:%M:%SZ)" "$2" | tee -a "$TIMELINE"; }
          ports_open() {
            local found=1
            lsof -nP -iTCP:5173 -sTCP:LISTEN 2>/dev/null && found=0
            lsof -nP -iTCP:8788 -sTCP:LISTEN 2>/dev/null && found=0
            return "$found"
          }
          listener_pids() {
            { lsof -nP -t -iTCP:5173 -sTCP:LISTEN 2>/dev/null
              lsof -nP -t -iTCP:8788 -sTCP:LISTEN 2>/dev/null
            } | sort -u
          }
          wait_ports() {
            local deadline=$((SECONDS + 60))
            while [ "$SECONDS" -lt "$deadline" ]; do
              if lsof -nP -iTCP:5173 -sTCP:LISTEN >/dev/null 2>&1 &&
                 lsof -nP -iTCP:8788 -sTCP:LISTEN >/dev/null 2>&1; then return 0; fi
              sleep 1
            done
            return 1
          }
          wait_ports_closed() {
            local deadline=$((SECONDS + 25))
            while [ "$SECONDS" -lt "$deadline" ]; do
              if ! lsof -nP -iTCP:5173 -sTCP:LISTEN >/dev/null 2>&1 &&
                 ! lsof -nP -iTCP:8788 -sTCP:LISTEN >/dev/null 2>&1; then return 0; fi
              sleep 1
            done
            return 1
          }
          snapshot_sentinel() {
            (
              cd "$ROOT/sentinel" || exit 1
              find . -type f -print0 | sort -z | while IFS= read -r -d '' file; do
                stat -f '%N|%z|%SB|%Sm' -t '%Y-%m-%dT%H:%M:%SZ' "$file"
                shasum -a 256 "$file"
              done
            )
          }
          get_meta() {
            local file="$1" key="$2"
            [ -f "$file" ] || return 1
            awk -F= -v wanted="$key" '$1==wanted {sub(/^[^=]*=/, ""); print; exit}' "$file"
          }
          pid_active() {
            local pid="$1" stat
            case "$pid" in ''|*[!0-9]*) return 1;; esac
            stat="$(ps -o stat= -p "$pid" 2>/dev/null | tr -d ' ')"
            [ -n "$stat" ] || return 1
            case "$stat" in Z*) return 1;; *) return 0;; esac
          }
          safe_fixture_kill() {
            local sig="$1" pid="$2" cmd
            case "$pid" in ''|*[!0-9]*) return 0;; esac
            cmd="$(ps -o command= -p "$pid" 2>/dev/null)"
            case "$cmd" in
              *"$ROOT/fixture-bin/wasm-tools"*|*"$ROOT/fixture-state"*) kill "-$sig" "$pid" 2>/dev/null || true;;
              '') true;;
              *) printf 'refused_unverified_pid=%s command=%s\n' "$pid" "$cmd" >> "$LOGS/cleanup-refusals.log"; return 1;;
            esac
          }
          fixture_pids() {
            find "$STATE" -type f \( -name 'self.env' -o -name 'normal.env' -o -name 'detached.env' \) -print 2>/dev/null |
              while IFS= read -r file; do get_meta "$file" pid; done | sort -u
          }
          stop_known_fixtures() {
            local pid
            fixture_pids > "$ROOT/known-fixture-pids.txt"
            while IFS= read -r pid; do safe_fixture_kill TERM "$pid" || true; done < "$ROOT/known-fixture-pids.txt"
            sleep 2
            while IFS= read -r pid; do if pid_active "$pid"; then safe_fixture_kill KILL "$pid" || true; fi; done < "$ROOT/known-fixture-pids.txt"
            sleep 1
          }
          finalize() {
            local code=$? pid root_absent ports_closed candidate_processes fixture_survivors
            trap - EXIT
            set +e
            [ -z "$WATCHDOG_PID" ] || kill -TERM "$WATCHDOG_PID" 2>/dev/null || true
            stop_known_fixtures
            for pid in $PRODUCT_LISTENERS; do kill -INT "$pid" 2>/dev/null || true; done
            [ -z "$PRODUCT_WRAPPER" ] || kill -TERM "$PRODUCT_WRAPPER" 2>/dev/null || true
            sleep 2
            for pid in $PRODUCT_LISTENERS; do kill -KILL "$pid" 2>/dev/null || true; done
            [ -z "$PRODUCT_WRAPPER" ] || kill -KILL "$PRODUCT_WRAPPER" 2>/dev/null || true
            mkdir -p "$ART/logs"
            cp "$TIMELINE" "$RECEIPT" "$ART/" 2>/dev/null
            find "$LOGS" -maxdepth 1 -type f -exec cp {} "$ART/logs/" \; 2>/dev/null
            if [ -f "$RECEIPT" ]; then
              python3 - "$RECEIPT" "$ART/receipt.json" <<'PY'
          import json, sys
          data = {}
          for raw in open(sys.argv[1], encoding="utf-8"):
              raw = raw.rstrip("\n")
              if "=" in raw:
                  key, value = raw.split("=", 1)
                  data[key] = value
          json.dump(data, open(sys.argv[2], "w", encoding="utf-8"), indent=2, sort_keys=True)
          PY
            fi
            if [ ! -f "$RECEIPT" ] || ! grep -qx 'receipt_complete=true' "$RECEIPT"; then code=98; fi
            rm -rf "$ROOT"
            root_absent="$([ ! -e "$ROOT" ] && echo true || echo false)"
            ports_closed="$(! ports_open >/dev/null 2>&1 && echo true || echo false)"
            candidate_processes="$(pgrep -af dusk-developer-studio 2>/dev/null | wc -l | tr -d ' ')"
            fixture_survivors=0
            if [ -f "$ART/logs/known-fixture-pids.txt" ]; then
              while IFS= read -r pid; do if pid_active "$pid"; then fixture_survivors=$((fixture_survivors + 1)); fi; done < "$ART/logs/known-fixture-pids.txt"
            fi
            if [ "$root_absent" != true ] || [ "$ports_closed" != true ] ||
               [ "$candidate_processes" != 0 ] || [ "$fixture_survivors" != 0 ]; then code=99; fi
            {
              printf 'cleanup_utc=%s\n' "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
              printf 'pilot_root_absent=%s\n' "$root_absent"
              printf 'ports_closed=%s\n' "$ports_closed"
              printf 'candidate_processes=%s\n' "$candidate_processes"
              printf 'fixture_survivors=%s\n' "$fixture_survivors"
            } > "$ART/cleanup.txt"
            exit "$code"
          }
          trap finalize EXIT
          trap 'record harness_signal_received TERM; exit 124' TERM
          PILOT_SHELL_PID="$$"
          (sleep 900; kill -TERM "$PILOT_SHELL_PID" 2>/dev/null || true) &
          WATCHDOG_PID=$!

          export HOME="$ROOT/home"
          export USERPROFILE="$ROOT/home"
          export XDG_CACHE_HOME="$ROOT/cache"
          export TMPDIR="$ROOT/temp"
          export npm_config_cache="$ROOT/npm-cache"
          export npm_config_prefix="$ROOT/npm-prefix"
          export NPM_CONFIG_CACHE="$ROOT/npm-cache"
          export NPM_CONFIG_PREFIX="$ROOT/npm-prefix"

          record execution_id "$EXEC_ID"
          record started_utc "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          record source_boundary "public npm metadata, package manifests/readme, and black-box Studio UI/API only"
          evidence S1 "fresh redirected root; repository checkout absent"

          OS_VERSION="$(sw_vers | tr '\n' ';')"; ARCH="$(uname -m)"
          USER_ID="$(id -u)"; USER_NAME="$(id -un)"; ADMIN_CAPABLE=false
          if sudo -n true >/dev/null 2>&1; then ADMIN_CAPABLE=true; fi
          NODE_VERSION="$(node --version)"; NPM_VERSION="$(npm --version)"
          record runner_os "$OS_VERSION"; record runner_arch "$ARCH"; record runner_user "$USER_NAME"
          record runner_uid "$USER_ID"; record runner_sudo_capable "$ADMIN_CAPABLE"
          record image_os "${ImageOS:-unknown}"; record image_version "${ImageVersion:-unknown}"
          record node_version "$NODE_VERSION"; record npm_version "$NPM_VERSION"
          { sw_vers; uname -a; sysctl -n machdep.cpu.brand_string 2>/dev/null || true; id;
            printf 'sudo_capable=%s\nnode=%s npm=%s\n' "$ADMIN_CAPABLE" "$NODE_VERSION" "$NPM_VERSION"; } > "$LOGS/environment.log"
          if [ "$ARCH" != arm64 ] || [ "$NODE_VERSION" != v24.18.0 ] || [ "$USER_ID" -eq 0 ]; then
            record environment_status blocked; exit 2
          fi
          record environment_status pass
          BASELINE_CANDIDATES="$(pgrep -af dusk-developer-studio 2>/dev/null | wc -l | tr -d ' ')"
          ports_open > "$LOGS/ports-baseline.log"; BASELINE_PORT_STATUS=$?
          record ports_baseline "$([ "$BASELINE_PORT_STATUS" -ne 0 ] && echo clean || echo occupied)"
          record candidate_processes_baseline "$BASELINE_CANDIDATES"
          if [ "$BASELINE_PORT_STATUS" -eq 0 ] || [ "$BASELINE_CANDIDATES" != 0 ]; then exit 3; fi
          evidence S2 "native macOS arm64, exact Node, non-root, clean ports and process baseline"

          printf 'CV-SEC-06 preservation sentinel\n' > "$ROOT/sentinel/README.txt"
          printf '{"execution":"%s","purpose":"security-preservation"}\n' "$EXEC_ID" > "$ROOT/sentinel/nested/fixture.json"
          snapshot_sentinel > "$ROOT/sentinel-baseline.txt"
          record sentinel_baseline_sha256 "$(shasum -a 256 "$ROOT/sentinel-baseline.txt" | awk '{print $1}')"

          npm view "$PACKAGE_SPEC" name version engines dist readme --json > "$ROOT/package/registry.json"
          npm pack "$PACKAGE_SPEC" --pack-destination "$ROOT/package" --json > "$ROOT/package/pack.json"
          TGZ="$(find "$ROOT/package" -maxdepth 1 -name 'dusk-developer-studio-1.0.9.tgz' -print -quit)"
          ACTUAL_SHA256="$(shasum -a 256 "$TGZ" | awk '{print $1}')"
          ACTUAL_SHASUM="$(shasum -a 1 "$TGZ" | awk '{print $1}')"
          ACTUAL_INTEGRITY="$(node - "$TGZ" <<'NODE'
          const fs=require('node:fs'),crypto=require('node:crypto');
          process.stdout.write('sha512-'+crypto.createHash('sha512').update(fs.readFileSync(process.argv[2])).digest('base64'));
          NODE
          )"
          REGISTRY_INTEGRITY="$(node -e "const r=require(process.argv[1]);process.stdout.write(r.dist.integrity)" "$ROOT/package/registry.json")"
          REGISTRY_SHASUM="$(node -e "const r=require(process.argv[1]);process.stdout.write(r.dist.shasum)" "$ROOT/package/registry.json")"
          tar -xOf "$TGZ" package/package-manifest.json > "$ROOT/package/package-manifest.json"
          PACKAGE_COMMIT="$(node -e "const r=require(process.argv[1]);process.stdout.write(r.commit)" "$ROOT/package/package-manifest.json")"
          PACKAGE_VERSION="$(node -e "const r=require(process.argv[1]);process.stdout.write(r.version)" "$ROOT/package/package-manifest.json")"
          PACKAGE_PRODUCT="$(node -e "const r=require(process.argv[1]);process.stdout.write(r.product)" "$ROOT/package/package-manifest.json")"
          node -e "const r=require(process.argv[1]);process.stdout.write(r.readme||'')" "$ROOT/package/registry.json" > "$LOGS/public-readme.log"
          record package_sha256 "$ACTUAL_SHA256"; record package_shasum "$ACTUAL_SHASUM"
          record registry_shasum "$REGISTRY_SHASUM"; record package_integrity "$ACTUAL_INTEGRITY"
          record registry_integrity "$REGISTRY_INTEGRITY"; record package_commit "$PACKAGE_COMMIT"
          record package_version "$PACKAGE_VERSION"; record package_product "$PACKAGE_PRODUCT"
          if [ "$ACTUAL_SHA256" != "$EXPECTED_SHA256" ] || [ "$ACTUAL_INTEGRITY" != "$EXPECTED_INTEGRITY" ] ||
             [ "$ACTUAL_INTEGRITY" != "$REGISTRY_INTEGRITY" ] || [ "$ACTUAL_SHASUM" != "$REGISTRY_SHASUM" ] ||
             [ "$PACKAGE_COMMIT" != "$EXPECTED_COMMIT" ] || [ "$PACKAGE_VERSION" != 1.0.9 ]; then
            record package_identity_status fail; exit 4
          fi
          record package_identity_status pass
          record public_containment_promise "$([ "$(grep -Eic 'sandbox|descendant process|process tree|setsid|detached process' "$LOGS/public-readme.log")" -eq 0 ] && echo none || echo present)"
          evidence S3 "exact public package hash, integrity, version, product and commit; public README boundary captured"

          CHROME=""
          for candidate in "/Applications/Google Chrome.app/Contents/MacOS/Google Chrome" "/Applications/Chromium.app/Contents/MacOS/Chromium"; do
            if [ -x "$candidate" ]; then CHROME="$candidate"; break; fi
          done
          if [ -z "$CHROME" ]; then record browser_status blocked; exit 5; fi
          "$CHROME" --version > "$LOGS/browser-version.log"
          record browser_version "$(cat "$LOGS/browser-version.log")"
          if npm install --ignore-scripts --no-save --no-package-lock --prefix "$ROOT/harness" playwright-core@latest > "$LOGS/playwright-install.log" 2> "$LOGS/playwright-install.stderr"; then
            PLAYWRIGHT_VERSION="$(node -e "process.stdout.write(require(process.argv[1]).version)" "$ROOT/harness/node_modules/playwright-core/package.json")"
            record browser_harness playwright-core; record playwright_version "$PLAYWRIGHT_VERSION"
          else
            record browser_harness install_failed; exit 5
          fi

          cat > "$ROOT/fixture-bin/wasm-tools" <<'PY'
          #!/usr/bin/env python3
          import os, pathlib, signal, subprocess, sys, time

          def atomic(path, text):
              tmp = path.with_name(path.name + ".tmp-" + str(os.getpid()))
              tmp.write_text(text, encoding="utf-8")
              os.replace(tmp, path)

          def metadata(role):
              return "\n".join([
                  "role=" + role,
                  "pid=" + str(os.getpid()),
                  "ppid=" + str(os.getppid()),
                  "pgid=" + str(os.getpgid(0)),
                  "sid=" + str(os.getsid(0)),
                  "started_utc=" + time.strftime("%Y-%m-%dT%H:%M:%SZ", time.gmtime()),
                  "started_epoch_ms=" + str(time.time_ns() // 1_000_000),
                  "argv=" + " ".join(sys.argv[1:]),
                  "",
              ])

          def child(role, directory):
              path = pathlib.Path(directory)
              atomic(path / (role + ".env"), metadata(role))
              def stop(signum, _frame):
                  atomic(path / (role + ".exit.env"), "signal=" + str(signum) + "\nended_utc=" + time.strftime("%Y-%m-%dT%H:%M:%SZ", time.gmtime()) + "\n")
                  raise SystemExit(128 + signum)
              signal.signal(signal.SIGTERM, stop)
              signal.signal(signal.SIGINT, stop)
              signal.signal(signal.SIGHUP, stop)
              while True:
                  signal.pause()

          if len(sys.argv) >= 4 and sys.argv[1] == "--sec06-child":
              child(sys.argv[2], sys.argv[3])
              raise SystemExit(0)

          state = pathlib.Path(os.environ["SEC06_STATE"])
          phase = (state / "current-phase").read_text(encoding="utf-8").strip()
          if phase not in {"timeout", "shutdown"}:
              raise SystemExit(77)
          directory = state / phase
          directory.mkdir(parents=True, exist_ok=True)
          lock = directory / "invocation.lock"
          try:
              lock.mkdir()
          except FileExistsError:
              atomic(directory / ("duplicate-" + str(os.getpid()) + ".env"), metadata("duplicate"))
              while True:
                  signal.pause()

          private = "CV-SEC-06-PRIVATE-" + phase + "-" + os.environ["SEC06_EXEC_ID"]
          atomic(directory / "private.txt", private + "\n")
          atomic(directory / "self.env", metadata("fixture-parent"))
          child_argv = [sys.executable, str(pathlib.Path(__file__).resolve()), "--sec06-child"]
          normal_log = open(directory / "normal.log", "ab", buffering=0)
          detached_log = open(directory / "detached.log", "ab", buffering=0)
          normal = subprocess.Popen(child_argv + ["normal", str(directory)], stdin=subprocess.DEVNULL, stdout=normal_log, stderr=normal_log)
          detached = subprocess.Popen(child_argv + ["detached", str(directory)], stdin=subprocess.DEVNULL, stdout=detached_log, stderr=detached_log, start_new_session=True)
          atomic(directory / "spawn.env", "normal_pid=" + str(normal.pid) + "\ndetached_pid=" + str(detached.pid) + "\n")
          emitted = "CV-SEC-06-FIXTURE phase=" + phase + " pid=" + str(os.getpid()) + "\nbounded-output: fixture tool intentionally hangs\n"
          atomic(directory / "emitted.txt", emitted)
          print(emitted, end="", flush=True)

          def parent_stop(signum, _frame):
              atomic(directory / "parent.exit.env", "signal=" + str(signum) + "\nended_utc=" + time.strftime("%Y-%m-%dT%H:%M:%SZ", time.gmtime()) + "\n")
              raise SystemExit(128 + signum)
          signal.signal(signal.SIGTERM, parent_stop)
          signal.signal(signal.SIGINT, parent_stop)
          signal.signal(signal.SIGHUP, parent_stop)
          while True:
              signal.pause()
          PY
          chmod 700 "$ROOT/fixture-bin/wasm-tools"
          printf 'timeout\n' > "$STATE/current-phase"
          record fixture_tool wasm-tools
          record fixture_path_precedence first
          evidence S4 "disposable wasm-tools fixture staged with ordinary and setsid descendants; sentinel baseline captured"

          cat > "$ROOT/ui-driver.mjs" <<'JS'
          import {createRequire} from 'node:module';
          import fs from 'node:fs';
          import net from 'node:net';
          import {execFileSync} from 'node:child_process';
          import path from 'node:path';
          const require=createRequire(import.meta.url),{chromium}=require(process.env.PW_MODULE);
          const state=process.env.SEC06_STATE,profile=process.env.PROFILE_DIR,requests=[],responses=[],actions=[];
          const wait=(ms)=>new Promise((resolve)=>setTimeout(resolve,ms));
          const now=()=>new Date().toISOString();
          const trace=(s)=>console.error(now(),s);
          const watchdog=setTimeout(()=>{trace('driver-watchdog-timeout');process.exit(124);},180000);
          function readEnv(file){const out={};for(const line of fs.readFileSync(file,'utf8').split(/\r?\n/)){const i=line.indexOf('=');if(i>0)out[line.slice(0,i)]=line.slice(i+1);}return out;}
          async function waitFile(file,ms=90000){const end=Date.now()+ms;while(Date.now()<end){if(fs.existsSync(file))return readEnv(file);await wait(150);}throw new Error('timed out waiting for '+file);}
          function proc(pid){try{const s=execFileSync('/bin/ps',['-o','stat=','-o','ppid=','-o','pgid=','-o','sess=','-o','command=','-p',String(pid)],{encoding:'utf8'}).trim();if(!s)return{pid:Number(pid),exists:false,active:false};const m=s.match(/^(\S+)\s+(\d+)\s+(\d+)\s+(\d+)\s+(.*)$/s);return{pid:Number(pid),exists:true,active:!String(m?.[1]||'').startsWith('Z'),stat:m?.[1]||'',ppid:Number(m?.[2]||0),pgid:Number(m?.[3]||0),sid:Number(m?.[4]||0),command:String(m?.[5]||'').slice(0,500)};}catch{return{pid:Number(pid),exists:false,active:false};}}
          function portClosed(port){return new Promise((resolve)=>{const s=net.createConnection({host:'127.0.0.1',port});s.setTimeout(600);s.once('connect',()=>{s.destroy();resolve(false);});s.once('error',()=>resolve(true));s.once('timeout',()=>{s.destroy();resolve(true);});});}
          async function waitPortsClosed(ms=25000){const end=Date.now()+ms;while(Date.now()<end){if(await portClosed(5173)&&await portClosed(8788))return true;await wait(250);}return false;}
          async function press(page,name,kind){const loc=page.getByRole(/path/i.test(kind)?'button':'button',{name}).first();if(!(await loc.count())){actions.push({kind,pressed:false});return false;}await loc.focus();await loc.press('Enter');actions.push({kind,pressed:true,label:String(await loc.textContent()||'').trim().slice(0,300)});return true;}
          async function pressAny(page,name,kind){for(const role of ['button','link']){const loc=page.getByRole(role,{name}).first();if(await loc.count()){await loc.focus();await loc.press('Enter');actions.push({kind,pressed:true,role,label:String(await loc.textContent()||'').trim().slice(0,300)});return true;}}actions.push({kind,pressed:false});return false;}
          async function body(page){return String(await page.locator('body').textContent({timeout:10000})||'');}
          async function health(page){return page.evaluate(async()=>{try{const r=await fetch('http://127.0.0.1:8788/health',{credentials:'include'});return{status:r.status,text:(await r.text()).slice(0,2000)};}catch(e){return{status:0,error:String(e)};}});}
          async function waitTimeoutUI(page,ms=110000){const end=Date.now()+ms;while(Date.now()<end){const text=await body(page);const compact=text.replace(/\s+/g,' ');const i=compact.lastIndexOf('wasm-tools');const snippet=i>=0?compact.slice(i,i+900):'';if(/wasm-tools.*?Cause:\s*timeout/i.test(snippet)&&/Retry/i.test(compact))return{text,compact,snippet};await wait(300);}throw new Error('wasm-tools timeout result did not appear');}
          async function clearStorage(page,context){const before=await page.evaluate(async()=>({local:Object.keys(localStorage),session:Object.keys(sessionStorage),indexed:indexedDB.databases?(await indexedDB.databases()).map(x=>x.name):[],caches:globalThis.caches?await caches.keys():[]}));const after=await page.evaluate(async()=>{localStorage.clear();sessionStorage.clear();if(globalThis.caches)for(const k of await caches.keys())await caches.delete(k);if(indexedDB.databases)for(const x of await indexedDB.databases())if(x.name)indexedDB.deleteDatabase(x.name);return{local:Object.keys(localStorage),session:Object.keys(sessionStorage)};});await context.clearCookies();return{before,after};}
          let context;
          try{
            context=await chromium.launchPersistentContext(profile,{executablePath:process.env.CHROME_PATH,headless:true,viewport:{width:1440,height:1000},args:['--no-first-run','--no-default-browser-check']});
            context.setDefaultTimeout(12000);
            context.on('request',r=>requests.push({method:r.method(),url:r.url()}));
            context.on('response',async r=>{if(r.url().includes('/preflight')){try{const text=await r.text();responses.push({url:r.url(),status:r.status(),bytes:Buffer.byteLength(text),text:text.slice(0,65536)});}catch(e){responses.push({url:r.url(),status:r.status(),error:String(e)});}}});
            const page=context.pages()[0]||await context.newPage();
            await page.goto('http://127.0.0.1:5173/#companion',{waitUntil:'domcontentloaded',timeout:25000});await page.waitForTimeout(3000);
            const healthBefore=await health(page);
            await pressAny(page,/^Paths$|Choose or resume a path/i,'paths');await page.waitForTimeout(500);
            await pressAny(page,/DuskDS|Native Dusk path/i,'duskds');await page.waitForTimeout(500);
            await pressAny(page,/Run automatic preflight/i,'preflight');
            const tSelf=await waitFile(path.join(state,'timeout','self.env'));
            const tNormal=await waitFile(path.join(state,'timeout','normal.env'));
            const tDetached=await waitFile(path.join(state,'timeout','detached.env'));
            const timeoutUI=await waitTimeoutUI(page);
            await page.screenshot({path:path.join(process.env.LOGS,'timeout-result.png'),fullPage:true});
            await wait(500);
            const timeoutEnded=Date.now(),healthAfterTimeout=await health(page);
            const privateTimeout=fs.readFileSync(path.join(state,'timeout','private.txt'),'utf8').trim();
            const timeoutResponse=responses[0]||{};
            const timeoutProcs={parent:proc(tSelf.pid),normal:proc(tNormal.pid),detached:proc(tDetached.pid)};
            const timeoutResult={
              elapsedMs:timeoutEnded-Number(tSelf.started_epoch_ms),
              uiCauseTimeout:/wasm-tools.*?Cause:\s*timeout/i.test(timeoutUI.snippet),
              uiBlocked:/At least one required tool.*fix before Build|EvidenceBlocked|Current blocker/i.test(timeoutUI.compact),
              fixtureOutputVisible:/CV-SEC-06-FIXTURE|bounded-output: fixture tool intentionally hangs/i.test(timeoutUI.snippet)||/CV-SEC-06-FIXTURE|bounded-output: fixture tool intentionally hangs/i.test(timeoutResponse.text||''),
              privateLeak:timeoutUI.text.includes(privateTimeout)||String(timeoutResponse.text||'').includes(privateTimeout),
              uiChars:timeoutUI.text.length,
              fixtureSnippet:timeoutUI.snippet.slice(0,900),
              responseStatus:timeoutResponse.status||0,
              responseBytes:timeoutResponse.bytes||0,
              healthAfter:healthAfterTimeout,
              procs:timeoutProcs,
              metadata:{parent:tSelf,normal:tNormal,detached:tDetached},
            };
            fs.writeFileSync(path.join(state,'current-phase'),'shutdown\n');
            await pressAny(page,/^Retry$/i,'retry');
            const sSelf=await waitFile(path.join(state,'shutdown','self.env'));
            const sNormal=await waitFile(path.join(state,'shutdown','normal.env'));
            const sDetached=await waitFile(path.join(state,'shutdown','detached.env'));
            const shutdownActive={parent:proc(sSelf.pid),normal:proc(sNormal.pid),detached:proc(sDetached.pid)};
            await page.screenshot({path:path.join(process.env.LOGS,'shutdown-active.png'),fullPage:true});
            const storage=await clearStorage(page,context);
            const studioPids=process.env.STUDIO_PIDS.split(',').filter(Boolean).map(Number);
            for(const pid of studioPids){try{process.kill(pid,'SIGINT');}catch{}}
            const portsClosedAfterSigint=await waitPortsClosed();
            await wait(5000);
            const shutdownAfter={parent:proc(sSelf.pid),normal:proc(sNormal.pid),detached:proc(sDetached.pid)};
            const privateShutdown=fs.readFileSync(path.join(state,'shutdown','private.txt'),'utf8').trim();
            const allResponseText=responses.map(x=>x.text||'').join('\n');
            const externalMutations=requests.filter(r=>!/^(GET|HEAD|OPTIONS)$/i.test(r.method)&&!/^https?:\/\/(127\.0\.0\.1|localhost)(:\d+)?\//i.test(r.url));
            const duplicates={timeout:fs.readdirSync(path.join(state,'timeout')).filter(x=>x.startsWith('duplicate-')),shutdown:fs.readdirSync(path.join(state,'shutdown')).filter(x=>x.startsWith('duplicate-'))};
            const result={healthBefore,actions,timeout:timeoutResult,shutdown:{active:shutdownActive,after:shutdownAfter,metadata:{parent:sSelf,normal:sNormal,detached:sDetached},portsClosedAfterSigint},storage,requests,responses:responses.map(x=>({...x,text:String(x.text||'').slice(0,4000)})),externalMutations,walletOrDeployClicks:actions.filter(x=>/wallet|deploy|fund|sign|transaction/i.test(x.label||'')).length,privateLeakAny:timeoutUI.text.includes(privateShutdown)||allResponseText.includes(privateTimeout)||allResponseText.includes(privateShutdown),duplicates};
            process.stdout.write(JSON.stringify(result,null,2));
          }finally{if(context)await context.close().catch(()=>{});clearTimeout(watchdog);}
          JS

          cd "$ROOT/work/actions"
          PATH="$ROOT/fixture-bin:$PATH" SEC06_STATE="$STATE" SEC06_EXEC_ID="$EXEC_ID" \
            npx --yes "$PACKAGE_SPEC" local-actions --no-open > "$LOGS/product-stdout.log" 2> "$LOGS/product-stderr.log" &
          PRODUCT_WRAPPER=$!
          if ! wait_ports; then record launch_status fail; exit 6; fi
          PRODUCT_LISTENERS="$(listener_pids)"
          printf '%s\n' "$PRODUCT_LISTENERS" > "$LOGS/product-listener-pids.txt"
          ports_open > "$LOGS/ports-active.log" || true
          if ! grep -q 'Dusk Developer Studio 1.0.9 (22312ecc)' "$LOGS/product-stdout.log" ||
             ! grep -q 'Mode: local tool checks and starter creation enabled' "$LOGS/product-stdout.log"; then
            record launch_status fail; exit 7
          fi
          record launch_status pass; record product_listener_pids "$(printf '%s' "$PRODUCT_LISTENERS" | tr '\n' ',')"
          evidence S5 "Local Actions launched from exact package with disposable fixture PATH; both loopback listeners paired"

          STUDIO_PIDS="$(printf '%s' "$PRODUCT_LISTENERS" | paste -sd, -)"
          PW_MODULE="$ROOT/harness/node_modules/playwright-core" CHROME_PATH="$CHROME" \
            PROFILE_DIR="$ROOT/browser-profile" SEC06_STATE="$STATE" LOGS="$LOGS" STUDIO_PIDS="$STUDIO_PIDS" \
            node "$ROOT/ui-driver.mjs" > "$LOGS/sec-ui.json" 2> "$LOGS/sec-ui.stderr"
          DRIVER_STATUS=$?
          record ui_driver_exit "$DRIVER_STATUS"
          if [ "$DRIVER_STATUS" -ne 0 ] || [ ! -s "$LOGS/sec-ui.json" ]; then record ui_driver_status fail; exit 8; fi
          record ui_driver_status pass

          node - "$LOGS/sec-ui.json" "$RECEIPT" <<'NODE'
          const fs=require('node:fs'),r=JSON.parse(fs.readFileSync(process.argv[2],'utf8')),out=[];
          const rec=(k,v)=>out.push(`${k}=${String(v).replace(/[\r\n]/g,' ')}`);
          rec('health_before',r.healthBefore.status);rec('timeout_elapsed_ms',r.timeout.elapsedMs);
          rec('timeout_ui_cause_timeout',r.timeout.uiCauseTimeout);rec('timeout_ui_blocked',r.timeout.uiBlocked);
          rec('timeout_fixture_output_visible',r.timeout.fixtureOutputVisible);rec('timeout_private_leak',r.timeout.privateLeak);
          rec('timeout_ui_chars',r.timeout.uiChars);rec('timeout_response_status',r.timeout.responseStatus);
          rec('timeout_response_bytes',r.timeout.responseBytes);rec('health_after_timeout',r.timeout.healthAfter.status);
          for(const role of ['parent','normal','detached']){const p=r.timeout.procs[role];rec(`timeout_${role}_pid`,p.pid);rec(`timeout_${role}_active`,p.active);rec(`timeout_${role}_pgid`,r.timeout.metadata[role].pgid);rec(`timeout_${role}_sid`,r.timeout.metadata[role].sid);}
          for(const role of ['parent','normal','detached']){const p=r.shutdown.active[role];rec(`shutdown_active_${role}_pid`,p.pid);rec(`shutdown_active_${role}`,p.active);rec(`shutdown_${role}_pgid`,r.shutdown.metadata[role].pgid);rec(`shutdown_${role}_sid`,r.shutdown.metadata[role].sid);}
          for(const role of ['parent','normal','detached'])rec(`shutdown_after_${role}_active`,r.shutdown.after[role].active);
          rec('shutdown_ports_closed_after_sigint',r.shutdown.portsClosedAfterSigint);
          rec('storage_local_after',r.storage.after.local.length);rec('storage_session_after',r.storage.after.session.length);
          rec('external_mutating_browser_requests',r.externalMutations.length);rec('wallet_deploy_action_clicks',r.walletOrDeployClicks);
          rec('private_leak_any',r.privateLeakAny);rec('timeout_duplicate_invocations',r.duplicates.timeout.length);rec('shutdown_duplicate_invocations',r.duplicates.shutdown.length);
          fs.appendFileSync(process.argv[3],out.join('\n')+'\n');
          NODE
          evidence S6 "automatic preflight returned bounded wasm-tools timeout diagnostics; UI and API redaction, health and false-success state captured"

          # Independently re-read every fixture marker and PID outside the browser driver.
          : > "$LOGS/fixture-lifecycle.log"
          for phase in timeout shutdown; do
            for role in self normal detached; do
              file="$STATE/$phase/$role.env"
              pid="$(get_meta "$file" pid)"; ppid="$(get_meta "$file" ppid)"; pgid="$(get_meta "$file" pgid)"; sid="$(get_meta "$file" sid)"
              if pid_active "$pid"; then active=true; else active=false; fi
              printf 'phase=%s role=%s pid=%s ppid=%s pgid=%s sid=%s shell_active_before_cleanup=%s\n' "$phase" "$role" "$pid" "$ppid" "$pgid" "$sid" "$active" >> "$LOGS/fixture-lifecycle.log"
              record "${phase}_${role}_marker_present" "$([ -s "$file" ] && echo true || echo false)"
            done
            record "${phase}_private_marker_present" "$([ -s "$STATE/$phase/private.txt" ] && echo true || echo false)"
            record "${phase}_private_marker_sha256" "$(shasum -a 256 "$STATE/$phase/private.txt" | awk '{print $1}')"
            record "${phase}_emitted_marker_present" "$([ -s "$STATE/$phase/emitted.txt" ] && echo true || echo false)"
            record "${phase}_emitted_bytes" "$(wc -c < "$STATE/$phase/emitted.txt" | tr -d ' ')"
            record "${phase}_parent_exit_marker" "$([ -s "$STATE/$phase/parent.exit.env" ] && echo true || echo false)"
          done
          cp "$ROOT/known-fixture-pids.txt" "$LOGS/known-fixture-pids.txt" 2>/dev/null || fixture_pids > "$LOGS/known-fixture-pids.txt"

          TIMEOUT_PARENT_ACTIVE="$(get_meta "$RECEIPT" timeout_parent_active)"
          TIMEOUT_NORMAL_ACTIVE="$(get_meta "$RECEIPT" timeout_normal_active)"
          TIMEOUT_DETACHED_ACTIVE="$(get_meta "$RECEIPT" timeout_detached_active)"
          SHUTDOWN_PARENT_ACTIVE="$(get_meta "$RECEIPT" shutdown_after_parent_active)"
          SHUTDOWN_NORMAL_ACTIVE="$(get_meta "$RECEIPT" shutdown_after_normal_active)"
          SHUTDOWN_DETACHED_ACTIVE="$(get_meta "$RECEIPT" shutdown_after_detached_active)"
          SIGINT_PORTS_CLOSED="$(get_meta "$RECEIPT" shutdown_ports_closed_after_sigint)"
          DETACHED_SESSION_OK=true
          for phase in timeout shutdown; do
            dp="$(get_meta "$STATE/$phase/detached.env" pid)"; dg="$(get_meta "$STATE/$phase/detached.env" pgid)"; ds="$(get_meta "$STATE/$phase/detached.env" sid)"
            [ "$dp" = "$dg" ] && [ "$dp" = "$ds" ] || DETACHED_SESSION_OK=false
          done
          record detached_setsid_proved "$DETACHED_SESSION_OK"
          if [ "$TIMEOUT_DETACHED_ACTIVE" = true ] || [ "$SHUTDOWN_DETACHED_ACTIVE" = true ]; then
            record containment_boundary "same_user_detached_session_requires_harness_cleanup"
          else
            record containment_boundary "product_terminated_detached_descendants"
          fi
          if [ "$TIMEOUT_NORMAL_ACTIVE" = true ] || [ "$SHUTDOWN_PARENT_ACTIVE" = true ] || [ "$SHUTDOWN_NORMAL_ACTIVE" = true ]; then
            PRODUCT_DEFECT=1
            record product_defect "owned_non_detached_process_survived_timeout_or_shutdown"
          else
            record product_defect none
          fi
          if [ "$SIGINT_PORTS_CLOSED" = true ]; then
            record shutdown_sigint_status pass
          else
            PRODUCT_DEFECT=1
            record shutdown_sigint_status failed_required_recovery
          fi
          if [ "$TIMEOUT_PARENT_ACTIVE" = true ]; then PRODUCT_DEFECT=1; record timeout_parent_termination fail; else record timeout_parent_termination pass; fi
          evidence S7 "every timeout PID/marker independently checked; detached session boundary classified"
          evidence S8 "second fresh invocation observed active, then Studio SIGINT and descendant state recorded"

          if wait_ports_closed; then
            record shutdown_recovery none
          else
            record shutdown_recovery term_kill
            for pid in $PRODUCT_LISTENERS; do kill -TERM "$pid" 2>/dev/null || true; done
            kill -TERM "$PRODUCT_WRAPPER" 2>/dev/null || true; sleep 2
            for pid in $PRODUCT_LISTENERS; do kill -KILL "$pid" 2>/dev/null || true; done
            kill -KILL "$PRODUCT_WRAPPER" 2>/dev/null || true; sleep 1
          fi
          if ports_open > "$LOGS/ports-after-shutdown.log"; then record orphan_listener_status fail; TECHNICAL_FAILURE=1; else record orphan_listener_status pass; fi
          stop_known_fixtures
          fixture_pids > "$LOGS/known-fixture-pids.txt"
          FIXTURE_SURVIVORS=0
          while IFS= read -r pid; do if pid_active "$pid"; then FIXTURE_SURVIVORS=$((FIXTURE_SURVIVORS + 1)); fi; done < "$LOGS/known-fixture-pids.txt"
          record fixture_survivors_after_cleanup "$FIXTURE_SURVIVORS"
          [ "$FIXTURE_SURVIVORS" -eq 0 ] || TECHNICAL_FAILURE=1
          rm -rf "$ROOT/browser-profile"
          record browser_profile_removed "$([ ! -e "$ROOT/browser-profile" ] && echo true || echo false)"
          record work_root_entries "$(find "$ROOT/work/actions" -mindepth 1 -print | wc -l | tr -d ' ')"
          if snapshot_sentinel | cmp -s "$ROOT/sentinel-baseline.txt" -; then record sentinel_unchanged true; else record sentinel_unchanged false; TECHNICAL_FAILURE=1; fi
          record ended_utc "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          evidence S9 "fixture cleanup, listener closure, cleared browser profile/storage, empty work root and unchanged sentinel verified"

          RECEIPT_COMPLETE=true
          for required in \
            environment_status=pass ports_baseline=clean candidate_processes_baseline=0 package_identity_status=pass \
            browser_harness=playwright-core launch_status=pass ui_driver_status=pass health_before=200 \
            timeout_ui_cause_timeout=true timeout_ui_blocked=true \
            timeout_private_leak=false health_after_timeout=200 timeout_parent_termination=pass \
            detached_setsid_proved=true shutdown_active_parent=true shutdown_active_normal=true shutdown_active_detached=true \
            storage_local_after=0 storage_session_after=0 \
            external_mutating_browser_requests=0 wallet_deploy_action_clicks=0 private_leak_any=false \
            timeout_duplicate_invocations=0 shutdown_duplicate_invocations=0 timeout_self_marker_present=true \
            timeout_normal_marker_present=true timeout_detached_marker_present=true timeout_private_marker_present=true \
            timeout_emitted_marker_present=true \
            shutdown_self_marker_present=true shutdown_normal_marker_present=true shutdown_detached_marker_present=true \
            shutdown_private_marker_present=true shutdown_emitted_marker_present=true orphan_listener_status=pass fixture_survivors_after_cleanup=0 \
            browser_profile_removed=true work_root_entries=0 sentinel_unchanged=true; do
            grep -qx "$required" "$RECEIPT" || RECEIPT_COMPLETE=false
          done
          ELAPSED="$(get_meta "$RECEIPT" timeout_elapsed_ms)"
          RESPONSE_BYTES="$(get_meta "$RECEIPT" timeout_response_bytes)"
          UI_CHARS="$(get_meta "$RECEIPT" timeout_ui_chars)"
          case "$ELAPSED" in ''|*[!0-9]*) RECEIPT_COMPLETE=false;; *) [ "$ELAPSED" -ge 1000 ] && [ "$ELAPSED" -le 30000 ] || RECEIPT_COMPLETE=false;; esac
          case "$RESPONSE_BYTES" in ''|*[!0-9]*) RECEIPT_COMPLETE=false;; *) [ "$RESPONSE_BYTES" -gt 0 ] && [ "$RESPONSE_BYTES" -le 65536 ] || RECEIPT_COMPLETE=false;; esac
          case "$UI_CHARS" in ''|*[!0-9]*) RECEIPT_COMPLETE=false;; *) [ "$UI_CHARS" -le 65536 ] || RECEIPT_COMPLETE=false;; esac
          for phase in timeout shutdown; do
            EMITTED_BYTES="$(get_meta "$RECEIPT" "${phase}_emitted_bytes")"
            case "$EMITTED_BYTES" in ''|*[!0-9]*) RECEIPT_COMPLETE=false;; *) [ "$EMITTED_BYTES" -gt 0 ] && [ "$EMITTED_BYTES" -le 256 ] || RECEIPT_COMPLETE=false;; esac
          done
          if [ "$TECHNICAL_FAILURE" -ne 0 ]; then RECEIPT_COMPLETE=false; fi
          if [ "$PRODUCT_DEFECT" -eq 1 ]; then record overall_status fail_product_defect; else record overall_status pass; fi
          record receipt_complete "$RECEIPT_COMPLETE"
          evidence S10 "receipt completeness and final public-contract/product-defect classification recorded"
          if [ "$RECEIPT_COMPLETE" != true ]; then exit 10; fi
          if [ "$PRODUCT_DEFECT" -eq 1 ]; then exit 20; fi

