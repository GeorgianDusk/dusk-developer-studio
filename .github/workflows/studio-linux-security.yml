name: Studio production assurance

"on":
  pull_request:
    branches: [main]
    paths:
      - .github/workflows/studio-linux-security.yml
      - "**"
  push:
    branches: [main]
    paths:
      - .github/workflows/studio-linux-security.yml
      - "**"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: studio-production-assurance-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  posix-security:
    name: POSIX product and security gates
    runs-on: ubuntu-24.04
    timeout-minutes: 25
    env:
      CI: "true"
    defaults:
      run:
        shell: bash
        working-directory: .
    steps:
      - name: Check out reviewed source
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 1
          persist-credentials: "false"
      - name: Use the verified Node.js line
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24.11.0
          package-manager-cache: "false"
      - name: Enable repository-pinned pnpm
        run: |
          corepack enable
          corepack install --global pnpm@11.7.0
      - name: Restore frozen dependencies
        run: pnpm install --frozen-lockfile
      - name: Build and smoke the extracted Linux companion archive
        env:
          DUSK_STUDIO_ARTIFACT_CHANNEL: portable
          DUSK_STUDIO_RELEASE_COMMIT: ${{ github.sha }}
        run: |
          RUNTIME="$RUNNER_TEMP/node-v24.11.0-linux-x64.tar.xz"
          BUNDLE="$RUNNER_TEMP/companion-bundle-linux"
          RELEASE="$RUNNER_TEMP/companion-release-linux"
          ARCHIVE="$RUNNER_TEMP/dusk-developer-studio-local-linux-x64.tar.gz"
          EXTRACT="$RUNNER_TEMP/companion-extracted-linux"
          curl --fail --silent --show-error --location --output "$RUNTIME" https://nodejs.org/dist/v24.11.0/node-v24.11.0-linux-x64.tar.xz
          node scripts/companion-bundle.mjs --out="$BUNDLE"
          pnpm --filter @dusk/studio build
          node scripts/companion-build.mjs --target=linux-x64 --out="$RELEASE" --launcher-bundle="$BUNDLE" --runtime-archive="$RUNTIME" --commit="$GITHUB_SHA" --source-date-epoch=1700000000
          node scripts/companion-verify.mjs --release="$RELEASE"
          node scripts/companion-archive.mjs --release="$RELEASE" --out="$ARCHIVE"
          mkdir "$EXTRACT"
          tar -xf "$ARCHIVE" -C "$EXTRACT"
          RELEASE_ROOT="$EXTRACT/dusk-developer-studio-local-0.1.0-linux-x64"
          node scripts/companion-verify.mjs --release="$RELEASE_ROOT"
          "$RELEASE_ROOT/runtime/node" "$RELEASE_ROOT/app/companion.mjs" --no-open &
          COMPANION_PID=$!
          trap 'kill "$COMPANION_PID" 2>/dev/null || true' EXIT
          READY=0
          for attempt in $(seq 1 40); do
            if curl --fail --silent http://127.0.0.1:5173/healthz >/dev/null; then READY=1; break; fi
            sleep 0.25
          done
          test "$READY" = "1"
          kill "$COMPANION_PID"
          wait "$COMPANION_PID" || true
          trap - EXIT
      - name: Exercise POSIX filesystem and process branches
        run: |
          test "$(node -p 'process.platform')" = "linux"
          pnpm exec vitest run packages/local-agent/src/__tests__/transactionalScaffold.test.ts packages/local-agent/src/__tests__/runBoundedProcess.test.ts --reporter=verbose
      - name: Run complete source and product gate
        run: |
          pnpm check:no-secrets
          pnpm verify:local
      - name: Enforce dependency severity gate
        run: pnpm audit --audit-level=moderate
      - name: Prove deterministic release artifacts
        run: |
          pnpm build
          FIRST="$(pnpm --silent fingerprint:artifacts)"
          pnpm build
          SECOND="$(pnpm --silent fingerprint:artifacts)"
          test "$FIRST" = "$SECOND"

  browser-assurance:
    name: Five-project browser, accessibility, and performance matrix
    needs: posix-security
    runs-on: ubuntu-24.04
    timeout-minutes: 35
    env:
      CI: "true"
    defaults:
      run:
        shell: bash
        working-directory: .
    steps:
      - name: Check out reviewed source
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 1
          persist-credentials: "false"
      - name: Use the verified Node.js line
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24.11.0
          package-manager-cache: "false"
      - name: Enable repository-pinned pnpm
        run: |
          corepack enable
          corepack install --global pnpm@11.7.0
      - name: Restore frozen dependencies
        run: pnpm install --frozen-lockfile
      - name: Install pinned Playwright browsers
        run: pnpm exec playwright install --with-deps chromium firefox webkit
      - name: Run built-release browser assurance
        run: pnpm e2e

  windows-command-assurance:
    name: Windows and WSL command contracts
    runs-on: windows-2025
    timeout-minutes: 25
    env:
      CI: "true"
    defaults:
      run:
        shell: pwsh
        working-directory: .
    steps:
      - name: Check out reviewed source
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 1
          persist-credentials: "false"
      - name: Use the verified Node.js line
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24.11.0
          package-manager-cache: "false"
      - name: Enable repository-pinned pnpm
        run: |
          corepack enable
          corepack install --global pnpm@11.7.0
      - name: Restore frozen dependencies
        run: pnpm install --frozen-lockfile
      - name: Build and smoke the extracted Windows companion archive
        env:
          DUSK_STUDIO_ARTIFACT_CHANNEL: portable
          DUSK_STUDIO_RELEASE_COMMIT: ${{ github.sha }}
        run: |
          $runtime = Join-Path $env:RUNNER_TEMP 'node-v24.11.0-win-x64.zip'
          $bundle = Join-Path $env:RUNNER_TEMP 'companion-bundle-windows'
          $release = Join-Path $env:RUNNER_TEMP 'companion-release-windows'
          $archive = Join-Path $env:RUNNER_TEMP 'dusk-developer-studio-local-windows-x64.zip'
          $extract = Join-Path $env:RUNNER_TEMP 'companion-extracted-windows'
          Invoke-WebRequest -UseBasicParsing -Uri 'https://nodejs.org/dist/v24.11.0/node-v24.11.0-win-x64.zip' -OutFile $runtime
          node scripts/companion-bundle.mjs "--out=$bundle"
          pnpm --filter @dusk/studio build
          node scripts/companion-build.mjs --target=windows-x64 "--out=$release" "--launcher-bundle=$bundle" "--runtime-archive=$runtime" "--commit=$env:GITHUB_SHA" --source-date-epoch=1700000000
          node scripts/companion-verify.mjs "--release=$release"
          node scripts/companion-archive.mjs "--release=$release" "--out=$archive"
          New-Item -ItemType Directory -Path $extract | Out-Null
          tar -xf $archive -C $extract
          $releaseRoot = Join-Path $extract 'dusk-developer-studio-local-0.1.0-windows-x64'
          node scripts/companion-verify.mjs "--release=$releaseRoot"
          $node = Join-Path $releaseRoot 'runtime/node.exe'
          $companion = Join-Path $releaseRoot 'app/companion.mjs'
          $process = Start-Process -FilePath $node -ArgumentList @($companion, '--no-open') -PassThru -WindowStyle Hidden
          try {
            $ready = $false
            foreach ($attempt in 1..40) {
              try { Invoke-WebRequest -UseBasicParsing -Uri 'http://127.0.0.1:5173/healthz' | Out-Null; $ready = $true; break } catch { Start-Sleep -Milliseconds 250 }
            }
            if (-not $ready) { throw 'Extracted Windows companion did not become healthy.' }
          } finally {
            if (-not $process.HasExited) { Stop-Process -Id $process.Id -Force }
          }
      - name: Validate Windows, WSL, and POSIX command generation
        run: pnpm exec vitest run packages/core/src/__tests__/cli.test.ts packages/local-agent/src/__tests__/safePaths.test.ts packages/local-agent/src/__tests__/preflightFailureKinds.test.ts --reporter=verbose
      - name: Run platform-neutral compile and secret gates
        run: |
          pnpm typecheck
          pnpm check:no-secrets
