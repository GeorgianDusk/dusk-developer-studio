name: Studio production assurance

"on":
  pull_request:
    branches: [main]
    paths:
      - .github/workflows/studio-linux-security.yml
      - "**"
  push:
    branches: [main]
    paths:
      - .github/workflows/studio-linux-security.yml
      - "**"
  workflow_dispatch:
  schedule:
    - cron: "23 4 * * 1"

permissions:
  contents: read

concurrency:
  group: studio-production-assurance-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  posix-security:
    name: POSIX product and security gates
    runs-on: ubuntu-24.04
    timeout-minutes: 35
    env:
      CI: "true"
    defaults:
      run:
        shell: bash
        working-directory: .
    steps:
      - name: Check out reviewed source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 1
          persist-credentials: "false"
      - name: Use the verified Node.js line
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24.18.0
          package-manager-cache: "false"
      - name: Install the exact Cargo advisory scanner
        run: |
          rustup toolchain install 1.94.0 --profile minimal
          cargo +1.94.0 install --locked \
            --root "$RUNNER_TEMP/cargo-audit-0.22.2" \
            --version 0.22.2 \
            cargo-audit
      - name: Enforce the reviewed Cargo advisory result
        env:
          CARGO_AUDIT_BIN: ${{ runner.temp }}/cargo-audit-0.22.2/bin/cargo-audit
        run: node scripts/check-cargo-advisory-review.mjs
      - name: Enable repository-pinned pnpm
        run: |
          corepack enable
          corepack install --global pnpm@11.7.0
      - name: Restore frozen dependencies
        run: pnpm install --frozen-lockfile
      - name: Build, pack, install, and smoke the Linux npm package
        run: |
          pnpm build:npm
          pnpm test:npm
          pnpm pack:npm
          TARBALL="output/npm/$(node --input-type=module -e 'import fs from "node:fs"; const receipt = JSON.parse(fs.readFileSync("output/npm/pack-receipt.json", "utf8")); process.stdout.write(receipt.filename);')"
          INSTALL_ROOT="$RUNNER_TEMP/npm-install"
          PRIMARY="$INSTALL_ROOT/node_modules/dusk-developer-studio/bin/dusk-developer-studio.mjs"
          test -f "$TARBALL"
          npm install --ignore-scripts --prefix "$INSTALL_ROOT" "$TARBALL"
          NODE_BIN="$(command -v node)"
          test -f "$PRIMARY"
          test -x "$NODE_BIN"
          "$NODE_BIN" "$PRIMARY" --lifecycle-self-test --no-open
          "$NODE_BIN" "$PRIMARY" local-actions --lifecycle-self-test --no-open
          set +e
          ELEVATED_OUTPUT="$(sudo -n "$NODE_BIN" "$PRIMARY" --lifecycle-self-test --no-open 2>&1)"
          ELEVATED_STATUS=$?
          set -e
          test "$ELEVATED_STATUS" -ne 0
          printf '%s' "$ELEVATED_OUTPUT" | grep -F "Dusk Developer Studio refuses elevated or root execution."
      - name: Exercise POSIX filesystem and process branches
        run: |
          test "$(node -p 'process.platform')" = "linux"
          pnpm exec vitest run packages/local-agent/src/__tests__/transactionalScaffold.test.ts packages/local-agent/src/__tests__/runBoundedProcess.test.ts --reporter=verbose
      - name: Run complete source and product gate
        run: |
          pnpm check:no-secrets
          pnpm verify:local
      - name: Enforce dependency severity gate
        run: pnpm audit --audit-level=moderate
      - name: Prove deterministic release artifacts
        run: |
          pnpm build
          FIRST="$(pnpm --silent fingerprint:artifacts)"
          pnpm build
          SECOND="$(pnpm --silent fingerprint:artifacts)"
          test "$FIRST" = "$SECOND"

  browser-assurance:
    name: Five-project browser, accessibility, and performance matrix
    needs: posix-security
    runs-on: ubuntu-24.04
    timeout-minutes: 35
    env:
      CI: "true"
    defaults:
      run:
        shell: bash
        working-directory: .
    steps:
      - name: Check out reviewed source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 1
          persist-credentials: "false"
      - name: Use the verified Node.js line
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24.18.0
          package-manager-cache: "false"
      - name: Enable repository-pinned pnpm
        run: |
          corepack enable
          corepack install --global pnpm@11.7.0
      - name: Restore frozen dependencies
        run: pnpm install --frozen-lockfile
      - name: Install pinned Playwright browsers
        run: pnpm exec playwright install --with-deps chromium firefox webkit
      - name: Run built-release browser assurance
        run: pnpm e2e

  windows-command-assurance:
    name: Windows and WSL command contracts
    runs-on: windows-2025
    timeout-minutes: 25
    env:
      CI: "true"
    defaults:
      run:
        shell: pwsh
        working-directory: .
    steps:
      - name: Check out reviewed source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 1
          persist-credentials: "false"
      - name: Use the verified Node.js line
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24.18.0
          package-manager-cache: "false"
      - name: Enable repository-pinned pnpm
        run: |
          corepack enable
          corepack install --global pnpm@11.7.0
      - name: Restore frozen dependencies
        run: pnpm install --frozen-lockfile
      - name: Build, pack, install, and smoke the Windows npm package
        run: |
          pnpm build:npm
          pnpm test:npm
          pnpm pack:npm
          $packReceipt = Get-Content -Raw -LiteralPath 'output/npm/pack-receipt.json' | ConvertFrom-Json
          $tarball = Join-Path 'output/npm' ([string] $packReceipt.filename)
          if (-not (Test-Path -LiteralPath $tarball -PathType Leaf)) { throw 'npm tarball is missing.' }
          $isAdmin = ([Security.Principal.WindowsPrincipal] [Security.Principal.WindowsIdentity]::GetCurrent()).IsInRole([Security.Principal.WindowsBuiltInRole]::Administrator)
          if (-not $isAdmin) { throw 'Windows assurance runner must provide the separate elevated-refusal lane.' }
          $publicRoot = Join-Path $env:PUBLIC "dusk-studio-security-$env:GITHUB_RUN_ID"
          $dataRoot = Join-Path $env:PUBLIC "dusk-studio-security-data-$env:GITHUB_RUN_ID"
          $userName = "dss$env:GITHUB_RUN_ID"
          $passwordPlain = "$([Guid]::NewGuid().ToString('N'))Aa1!"
          $password = ConvertTo-SecureString $passwordPlain -AsPlainText -Force
          $credential = [PSCredential]::new("$env:COMPUTERNAME\$userName", $password)
          $userCreated = $false
          try {
            if ((Test-Path -LiteralPath $publicRoot) -or (Test-Path -LiteralPath $dataRoot)) {
              throw 'Windows npm assurance roots must not already exist.'
            }
            New-Item -ItemType Directory -Path $publicRoot | Out-Null
            $profileRoot = Join-Path $dataRoot 'Profile'
            $localAppData = Join-Path $profileRoot 'AppData\Local'
            $roamingAppData = Join-Path $profileRoot 'AppData\Roaming'
            $tempRoot = Join-Path $dataRoot 'Temp'
            New-Item -ItemType Directory -Path $localAppData, $roamingAppData, $tempRoot -Force | Out-Null
            $resolvedTarball = (Resolve-Path -LiteralPath $tarball).Path
            npm install --ignore-scripts --prefix $publicRoot $resolvedTarball
            if ($LASTEXITCODE -ne 0) { throw 'npm package installation failed.' }
            $publicNode = Join-Path $publicRoot 'node.exe'
            Copy-Item -LiteralPath (Get-Command node.exe).Source -Destination $publicNode
            $publicPrimary = Join-Path $publicRoot 'node_modules/dusk-developer-studio/bin/dusk-developer-studio.mjs'
            if (-not (Test-Path -LiteralPath $publicPrimary -PathType Leaf)) { throw 'npm install did not produce the reviewed CLI.' }
            New-LocalUser -Name $userName -Password $password -AccountNeverExpires -PasswordNeverExpires | Out-Null
            $userCreated = $true
            $userSid = (Get-LocalUser -Name $userName).SID.Value
            & "$env:SystemRoot\System32\icacls.exe" $publicRoot '/inheritance:r' '/grant:r' `
              '*S-1-5-18:(OI)(CI)F' '*S-1-5-32-544:(OI)(CI)F' "*${userSid}:(OI)(CI)RX" | Out-Null
            if ($LASTEXITCODE -ne 0) { throw 'Could not bound the public npm assurance root ACL.' }
            & "$env:SystemRoot\System32\icacls.exe" $dataRoot '/inheritance:r' '/grant:r' `
              '*S-1-5-18:(OI)(CI)F' '*S-1-5-32-544:(OI)(CI)F' "*${userSid}:(OI)(CI)M" | Out-Null
            if ($LASTEXITCODE -ne 0) { throw 'Could not bound the npm assurance data root ACL.' }
            $childEnvironment = @{
              APPDATA = $roamingAppData
              HOME = $profileRoot
              LOCALAPPDATA = $localAppData
              TEMP = $tempRoot
              TMP = $tempRoot
              USERPROFILE = $profileRoot
            }
            function Invoke-StandardUserSmoke {
              param([string[]] $Arguments, [string] $Label)
              $stdout = Join-Path $env:RUNNER_TEMP "$Label.stdout.txt"
              $stderr = Join-Path $env:RUNNER_TEMP "$Label.stderr.txt"
              $process = Start-Process -FilePath $publicNode `
                -ArgumentList (@($publicPrimary) + $Arguments) `
                -WorkingDirectory $publicRoot `
                -Credential $credential `
                -Environment $childEnvironment `
                -LoadUserProfile `
                -WindowStyle Hidden `
                -RedirectStandardOutput $stdout `
                -RedirectStandardError $stderr `
                -Wait `
                -PassThru
              if ($process.ExitCode -ne 0) {
                $detail = @(
                  Get-Content -Raw -ErrorAction SilentlyContinue $stderr
                  Get-Content -Raw -ErrorAction SilentlyContinue $stdout
                ) -join "`n"
                throw "$Label failed as the temporary standard user: $($detail.Trim())"
              }
            }
            Invoke-StandardUserSmoke -Arguments @('--lifecycle-self-test', '--no-open') -Label 'safe-smoke'
            Invoke-StandardUserSmoke -Arguments @('local-actions', '--lifecycle-self-test', '--no-open') -Label 'local-actions-capability-contract-smoke'
            $elevatedOutput = & $publicNode $publicPrimary --lifecycle-self-test --no-open 2>&1
            $elevatedStatus = $LASTEXITCODE
            if ($elevatedStatus -eq 0 -or -not (($elevatedOutput | Out-String).Contains('Dusk Developer Studio refuses elevated or root execution.'))) {
              throw 'Elevated Windows npm launch was not refused.'
            }
          } finally {
            $passwordPlain = $null
            if ($userCreated) { Remove-LocalUser -Name $userName -ErrorAction SilentlyContinue }
            if (Test-Path -LiteralPath $publicRoot) { Remove-Item -LiteralPath $publicRoot -Recurse -Force }
            if (Test-Path -LiteralPath $dataRoot) { Remove-Item -LiteralPath $dataRoot -Recurse -Force }
          }
          # GitHub's pwsh wrapper exits with the last native process status.
          # The non-zero status above is expected and has already been verified.
          $global:LASTEXITCODE = 0
      - name: Validate Windows, WSL, and POSIX command generation
        run: pnpm exec vitest run packages/core/src/__tests__/cli.test.ts packages/local-agent/src/__tests__/safePaths.test.ts packages/local-agent/src/__tests__/preflightFailureKinds.test.ts --reporter=verbose
      - name: Run platform-neutral compile and secret gates
        run: |
          pnpm typecheck
          pnpm check:no-secrets
