name: Studio public deployment assurance

"on":
  schedule:
    - cron: "23 */6 * * *"
  workflow_dispatch:
    inputs:
      target_url:
        description: Approved Studio origin; leave blank to use the repository configuration
        required: false
        type: string
      expected_environment:
        description: Expected release-manifest environment; repository-default uses the repository configuration
        required: false
        default: repository-default
        type: choice
        options:
          - repository-default
          - staging
          - production
      verify_alert_delivery:
        description: Create, assign, and close a harmless monitor-rehearsal issue
        required: true
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: studio-public-staging-assurance
  cancel-in-progress: true

jobs:
  public-release:
    name: Exact public release, routes, TLS, and degradation
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    permissions:
      contents: read
      issues: write
    env:
      TARGET_URL: ${{ github.event.inputs.target_url || vars.DUSK_STUDIO_PUBLIC_URL }}
      EXPECTED_ENVIRONMENT: ${{ (github.event.inputs.expected_environment != 'repository-default' && github.event.inputs.expected_environment) || vars.DUSK_STUDIO_PUBLIC_ENVIRONMENT }}
      DUSK_STUDIO_PUBLIC_URL: ${{ github.event.inputs.target_url || vars.DUSK_STUDIO_PUBLIC_URL }}
      DUSK_STUDIO_EXPECTED_ENVIRONMENT: ${{ (github.event.inputs.expected_environment != 'repository-default' && github.event.inputs.expected_environment) || vars.DUSK_STUDIO_PUBLIC_ENVIRONMENT }}
      CI: "true"
    steps:
      - name: Check out the exact source under test
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 1
          persist-credentials: "false"
      - name: Use the verified Node.js line
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24.11.0
          package-manager-cache: "false"
      - name: Enable repository-pinned pnpm
        run: |
          corepack enable
          corepack install --global pnpm@11.7.0
      - name: Restore frozen dependencies
        run: pnpm install --frozen-lockfile
      - name: Reject missing or invalid target configuration
        run: |
          test -n "$TARGET_URL"
          case "$EXPECTED_ENVIRONMENT" in staging|production) ;; *) echo "Expected environment must be staging or production." >&2; exit 1 ;; esac
          node --input-type=module <<'NODE'
          import fs from "node:fs";
          import { validateAssuranceTargetOrigin } from "./scripts/staging-smoke.mjs";
          const policy = JSON.parse(fs.readFileSync("config/phase5-policy.json", "utf8"));
          validateAssuranceTargetOrigin(process.env.TARGET_URL, policy);
          NODE
      - name: Install Chromium for hosted desktop and mobile checks
        run: pnpm exec playwright install --with-deps chromium
      - name: Run public routes and controlled DuskEVM preview degradation checks
        id: browser
        continue-on-error: true
        run: pnpm e2e:public
      - name: Run receipt, exact-commit, TLS, DuskDS node, source, fallback-cache, and closed-port checks
        id: synthetic
        continue-on-error: true
        run: node scripts/check-staging.mjs --url="$TARGET_URL" --environment="$EXPECTED_ENVIRONMENT" --commit="$GITHUB_SHA" --rpc-degradation="${{ steps.browser.outcome }}" --out=output/public-synthetic-receipt.json
      - name: Classify Studio and upstream dependency state
        id: classification
        if: always()
        env:
          BROWSER_OUTCOME: ${{ steps.browser.outcome }}
          SYNTHETIC_OUTCOME: ${{ steps.synthetic.outcome }}
        run: |
          node --input-type=module <<'NODE'
          import fs from "node:fs";
          import { selectAssuranceIncidentTitle } from "./scripts/staging-smoke.mjs";
          let receipt = {};
          try { receipt = JSON.parse(fs.readFileSync("output/public-synthetic-receipt.json", "utf8")); } catch {}
          const normalize = (value) => value === "passed" || value === "failed" ? value : "unknown";
          const classification = {
            studio_status: normalize(receipt.studio_status),
            upstream_dependency_status: normalize(receipt.upstream_dependency_status)
          };
          const incidentTitle = selectAssuranceIncidentTitle(process.env.BROWSER_OUTCOME, process.env.SYNTHETIC_OUTCOME, classification);
          fs.appendFileSync(process.env.GITHUB_OUTPUT, `studio_status=${classification.studio_status}\nupstream_status=${classification.upstream_dependency_status}\nincident_title=${incidentTitle}\n`);
          NODE
      - name: Upload the bounded synthetic receipt
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: studio-public-synthetic-receipt-${{ github.run_id }}
          path: output/public-synthetic-receipt.json
          if-no-files-found: ignore
          retention-days: 30
          compression-level: 0
      - name: Open or update the assigned monitor alert
        if: always() && github.event_name == 'schedule' && (steps.synthetic.outcome != 'success' || steps.browser.outcome != 'success')
        env:
          GH_TOKEN: ${{ github.token }}
          INCIDENT_TITLE: ${{ steps.classification.outputs.incident_title }}
        run: |
          case "$INCIDENT_TITLE" in
            "Studio upstream dependency unavailable") title="$INCIDENT_TITLE" ;;
            *) title="Studio public deployment assurance failed" ;;
          esac
          issue="$(gh issue list --repo "$GITHUB_REPOSITORY" --state open --search "$title in:title" --json number,title --jq ".[] | select(.title == \"$title\") | .number" | head -n 1)"
          body="Scheduled DuskDS production assurance failed for $TARGET_URL at commit $GITHUB_SHA. Studio status: ${{ steps.classification.outputs.studio_status }}. DuskDS upstream dependency status: ${{ steps.classification.outputs.upstream_status }}. DuskEVM RPC remains an expected non-blocking pre-launch deferral. Monitoring mode: GitHub-only under docs/operations/github-only-monitoring-decision.md. Run: $GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID"
          if [ -n "$issue" ]; then
            gh issue comment "$issue" --repo "$GITHUB_REPOSITORY" --body "$body"
          else
            issue_url="$(gh issue create --repo "$GITHUB_REPOSITORY" --title "$title" --body "$body" --assignee GeorgianDusk)"
            issue="${issue_url##*/}"
          fi
          for other_title in "Studio public deployment assurance failed" "Studio upstream dependency unavailable" "DuskEVM Testnet upstream dependency unavailable" "Studio staging synthetic assurance failed"; do
            if [ "$other_title" = "$title" ]; then continue; fi
            other_issues="$(gh issue list --repo "$GITHUB_REPOSITORY" --state open --limit 100 --search "$other_title in:title" --json number,title --jq ".[] | select(.title == \"$other_title\") | .number")"
            while IFS= read -r other_issue; do
              if [ -z "$other_issue" ]; then continue; fi
              gh issue close "$other_issue" --repo "$GITHUB_REPOSITORY" --comment "Reclassified into #$issue by failed scheduled assurance $GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID."
            done <<< "$other_issues"
          done
      - name: Close the active monitor alert after recovery
        if: always() && github.event_name == 'schedule' && steps.synthetic.outcome == 'success' && steps.browser.outcome == 'success'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          for title in "Studio public deployment assurance failed" "Studio upstream dependency unavailable" "DuskEVM Testnet upstream dependency unavailable" "Studio staging synthetic assurance failed"; do
            issue="$(gh issue list --repo "$GITHUB_REPOSITORY" --state open --search "$title in:title" --json number,title --jq ".[] | select(.title == \"$title\") | .number" | head -n 1)"
            if [ -n "$issue" ]; then
              gh issue close "$issue" --repo "$GITHUB_REPOSITORY" --comment "Scheduled assurance recovered in $GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID"
            fi
          done
      - name: Rehearse assigned issue-alert delivery
        if: always() && github.event_name == 'workflow_dispatch' && inputs.verify_alert_delivery
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          title="[monitor rehearsal] Studio staging alert delivery $GITHUB_RUN_ID"
          url="$(gh issue create --repo "$GITHUB_REPOSITORY" --title "$title" --body "Harmless alert-delivery rehearsal for run $GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID" --assignee GeorgianDusk)"
          number="${url##*/}"
          gh issue close "$number" --repo "$GITHUB_REPOSITORY" --comment "Alert-delivery rehearsal completed."
          mkdir -p output
          printf '{"schema_version":1,"status":"passed","channel":"github-assigned-issue","owner":"George","issue_number":%s,"run_id":"%s"}\n' "$number" "$GITHUB_RUN_ID" > output/alert-delivery-receipt.json
      - name: Upload alert-delivery rehearsal receipt
        if: always() && github.event_name == 'workflow_dispatch' && inputs.verify_alert_delivery
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: studio-alert-delivery-receipt-${{ github.run_id }}
          path: output/alert-delivery-receipt.json
          if-no-files-found: error
          retention-days: 30
          compression-level: 0
      - name: Enforce synthetic assurance result
        if: always()
        run: |
          test "${{ steps.browser.outcome }}" = "success"
          test "${{ steps.synthetic.outcome }}" = "success"
