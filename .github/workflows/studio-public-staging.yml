name: Studio public staging assurance

"on":
  schedule:
    - cron: "23 */6 * * *"
  workflow_dispatch:
    inputs:
      target_url:
        description: Approved Studio staging or production origin
        required: true
        default: https://studio.134-122-59-217.sslip.io
        type: string
      expected_environment:
        description: Expected release-manifest environment
        required: true
        default: staging
        type: choice
        options:
          - staging
          - production
      verify_alert_delivery:
        description: Create, assign, and close a harmless monitor-rehearsal issue
        required: true
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: studio-public-staging-assurance
  cancel-in-progress: true

jobs:
  public-release:
    name: Exact public release, routes, TLS, and degradation
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    permissions:
      contents: read
      issues: write
    env:
      TARGET_URL: ${{ github.event.inputs.target_url || 'https://studio.134-122-59-217.sslip.io' }}
      EXPECTED_ENVIRONMENT: ${{ github.event.inputs.expected_environment || 'staging' }}
      DUSK_STUDIO_PUBLIC_URL: ${{ github.event.inputs.target_url || 'https://studio.134-122-59-217.sslip.io' }}
      DUSK_STUDIO_EXPECTED_ENVIRONMENT: ${{ github.event.inputs.expected_environment || 'staging' }}
      CI: "true"
    steps:
      - name: Check out the exact source under test
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 1
          persist-credentials: "false"
      - name: Use the verified Node.js line
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24.11.0
          package-manager-cache: "false"
      - name: Enable repository-pinned pnpm
        run: |
          corepack enable
          corepack install --global pnpm@11.7.0
      - name: Restore frozen dependencies
        run: pnpm install --frozen-lockfile
      - name: Install Chromium for hosted desktop and mobile checks
        run: pnpm exec playwright install --with-deps chromium
      - name: Run public routes and controlled RPC degradation checks
        id: browser
        continue-on-error: true
        run: pnpm e2e:public
      - name: Run receipt, exact-commit, TLS, source, RPC, fallback-cache, and closed-port checks
        id: synthetic
        continue-on-error: true
        run: node scripts/check-staging.mjs --url="$TARGET_URL" --environment="$EXPECTED_ENVIRONMENT" --commit="$GITHUB_SHA" --rpc-degradation="${{ steps.browser.outcome }}" --out=output/public-synthetic-receipt.json
      - name: Upload the bounded synthetic receipt
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: studio-public-synthetic-receipt-${{ github.run_id }}
          path: output/public-synthetic-receipt.json
          if-no-files-found: ignore
          retention-days: 30
          compression-level: 0
      - name: Send the externally hosted success heartbeat
        id: external_heartbeat
        if: always() && github.event_name == 'schedule' && steps.synthetic.outcome == 'success' && steps.browser.outcome == 'success'
        continue-on-error: true
        env:
          EXTERNAL_HEARTBEAT_URL: ${{ secrets.STUDIO_MONITOR_HEARTBEAT_URL }}
        run: |
          case "$EXTERNAL_HEARTBEAT_URL" in https://*) ;; *) echo "External heartbeat is not configured with an HTTPS secret URL." >&2; exit 1 ;; esac
          curl --proto '=https' --tlsv1.2 --fail --silent --show-error --max-time 20 --output /dev/null "$EXTERNAL_HEARTBEAT_URL"
      - name: Open or update the assigned monitor alert
        if: always() && github.event_name == 'schedule' && (steps.synthetic.outcome != 'success' || steps.browser.outcome != 'success' || steps.external_heartbeat.outcome != 'success')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          title="Studio staging synthetic assurance failed"
          issue="$(gh issue list --repo "$GITHUB_REPOSITORY" --state open --search "$title in:title" --json number,title --jq ".[] | select(.title == \"$title\") | .number" | head -n 1)"
          body="Scheduled assurance or its external success heartbeat failed for $TARGET_URL at commit $GITHUB_SHA. Run: $GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID"
          if [ -n "$issue" ]; then
            gh issue comment "$issue" --repo "$GITHUB_REPOSITORY" --body "$body"
          else
            gh issue create --repo "$GITHUB_REPOSITORY" --title "$title" --body "$body" --assignee GeorgianDusk
          fi
      - name: Close the active monitor alert after recovery
        if: always() && github.event_name == 'schedule' && steps.synthetic.outcome == 'success' && steps.browser.outcome == 'success' && steps.external_heartbeat.outcome == 'success'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          title="Studio staging synthetic assurance failed"
          issue="$(gh issue list --repo "$GITHUB_REPOSITORY" --state open --search "$title in:title" --json number,title --jq ".[] | select(.title == \"$title\") | .number" | head -n 1)"
          if [ -n "$issue" ]; then
            gh issue close "$issue" --repo "$GITHUB_REPOSITORY" --comment "Scheduled assurance recovered in $GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID"
          fi
      - name: Rehearse assigned issue-alert delivery
        if: always() && github.event_name == 'workflow_dispatch' && inputs.verify_alert_delivery
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          title="[monitor rehearsal] Studio staging alert delivery $GITHUB_RUN_ID"
          url="$(gh issue create --repo "$GITHUB_REPOSITORY" --title "$title" --body "Harmless alert-delivery rehearsal for run $GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID" --assignee GeorgianDusk)"
          number="${url##*/}"
          gh issue close "$number" --repo "$GITHUB_REPOSITORY" --comment "Alert-delivery rehearsal completed."
          mkdir -p output
          printf '{"schema_version":1,"status":"passed","channel":"github-assigned-issue","owner":"George","issue_number":%s,"run_id":"%s"}\n' "$number" "$GITHUB_RUN_ID" > output/alert-delivery-receipt.json
      - name: Upload alert-delivery rehearsal receipt
        if: always() && github.event_name == 'workflow_dispatch' && inputs.verify_alert_delivery
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: studio-alert-delivery-receipt-${{ github.run_id }}
          path: output/alert-delivery-receipt.json
          if-no-files-found: error
          retention-days: 30
          compression-level: 0
      - name: Enforce synthetic assurance result
        if: always()
        run: |
          test "${{ steps.browser.outcome }}" = "success"
          test "${{ steps.synthetic.outcome }}" = "success"
          if [ "$GITHUB_EVENT_NAME" = 'schedule' ]; then test "${{ steps.external_heartbeat.outcome }}" = "success"; fi
