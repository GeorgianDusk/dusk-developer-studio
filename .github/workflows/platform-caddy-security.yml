name: Studio Caddy fragment security

"on":
  pull_request:
    branches: [main]
    paths:
      - .github/workflows/platform-caddy-security.yml
      - deploy/caddy/**
      - docs/deployment/self-hosting.md
  push:
    branches: [main]
    paths:
      - .github/workflows/platform-caddy-security.yml
      - deploy/caddy/**
      - docs/deployment/self-hosting.md
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: studio-caddy-security-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-fragment:
    name: Validate static-only Caddy fragment
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Check out reviewed source
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 1
          persist-credentials: "false"
      - name: Install checksum-pinned Caddy
        env:
          CADDY_VERSION: 2.6.2
          CADDY_ARCHIVE_SHA512: ae18c0facae7c8ee872492a1ba63a4c7608915d6d9fe267aef4f869cf65ebd4b7f9ff57f609aff2bd52db98c761d877b574aea2c0c9ddc2ec53d0d5e174cb542
        run: |
          set -euo pipefail
          archive="caddy_${CADDY_VERSION}_linux_amd64.tar.gz"
          curl --proto '=https' --tlsv1.2 --location --fail --silent --show-error --output "/tmp/${archive}" "https://github.com/caddyserver/caddy/releases/download/v${CADDY_VERSION}/${archive}"
          printf '%s  %s\n' "$CADDY_ARCHIVE_SHA512" "/tmp/${archive}" | sha512sum --check --strict
          tar -xzf "/tmp/${archive}" -C /tmp caddy
          chmod 0755 /tmp/caddy
          /tmp/caddy version
      - name: Enforce the static-hosting boundary
        run: |
          set -euo pipefail
          fragment=deploy/caddy/studio.caddy
          test -f "$fragment"
          if grep -Eiq 'reverse_proxy|127\.0\.0\.1|localhost|:8788|basic_auth|basicauth|/login' "$fragment"; then
            echo "The public Studio fragment crosses the static-hosting boundary." >&2
            exit 1
          fi
          grep -F 'Content-Security-Policy' "$fragment"
          grep -F 'Strict-Transport-Security' "$fragment"
          grep -F 'respond /healthz' "$fragment"
          test -z "$(/tmp/caddy fmt --diff "$fragment")"
          /tmp/caddy validate --config "$fragment" --adapter caddyfile
