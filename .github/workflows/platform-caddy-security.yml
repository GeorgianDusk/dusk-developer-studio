name: Studio Caddy fragment security

"on":
  pull_request:
    branches: [main]
  push:
    branches: [main]
    paths:
      - .github/workflows/platform-caddy-security.yml
      - deploy/caddy/**
      - docs/deployment/self-hosting.md
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: studio-caddy-security-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-fragment:
    name: Validate static-only Caddy fragment
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Check out reviewed source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: "false"
      - name: Classify Caddy security scope
        id: scope
        env:
          EVENT_NAME: ${{ github.event_name }}
          BASE_SHA: ${{ github.event.pull_request.base.sha || '' }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
        run: |
          set -euo pipefail
          if [[ "$EVENT_NAME" != "pull_request" ]]; then
            echo "relevant=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          test -n "$BASE_SHA"
          test -n "$HEAD_SHA"
          git cat-file -e "$BASE_SHA^{commit}"
          git cat-file -e "$HEAD_SHA^{commit}"
          changed_paths="$RUNNER_TEMP/caddy-security-changed-paths"
          git diff --no-renames --name-only -z "$BASE_SHA...$HEAD_SHA" > "$changed_paths"
          relevant=false
          while IFS= read -r -d '' changed; do
            case "$changed" in
              .github/workflows/platform-caddy-security.yml|deploy/caddy/*|docs/deployment/self-hosting.md)
                relevant=true
                break
                ;;
            esac
          done < "$changed_paths"
          echo "relevant=$relevant" >> "$GITHUB_OUTPUT"
      - name: Install checksum-pinned Caddy
        if: steps.scope.outputs.relevant == 'true'
        env:
          CADDY_VERSION: 2.11.4
          CADDY_ARCHIVE_SHA256: 527fbf917c39189a1e3b31d34fa955601680b2d5c8055d2a87b8b9588dec7bb9
        run: |
          set -euo pipefail
          archive="caddy_${CADDY_VERSION}_linux_amd64.tar.gz"
          curl --proto '=https' --tlsv1.2 --location --fail --silent --show-error --output "/tmp/${archive}" "https://github.com/caddyserver/caddy/releases/download/v${CADDY_VERSION}/${archive}"
          printf '%s  %s\n' "$CADDY_ARCHIVE_SHA256" "/tmp/${archive}" | sha256sum --check --strict
          tar -xzf "/tmp/${archive}" -C /tmp caddy
          chmod 0755 /tmp/caddy
          sudo install -d -m 0755 -o "$(id -u)" -g "$(id -g)" /var/log/caddy
          actual_version="$(/tmp/caddy version)"
          case "$actual_version" in "v${CADDY_VERSION} "*|"${CADDY_VERSION} "*|"v${CADDY_VERSION}"|"${CADDY_VERSION}") ;; *) exit 1 ;; esac
          printf '%s\n' "$actual_version"
      - name: Enforce the static-hosting boundary
        if: steps.scope.outputs.relevant == 'true'
        run: |
          set -euo pipefail
          fragment=deploy/caddy/studio.caddy
          test -f "$fragment"
          if grep -Eiq 'reverse_proxy|127\.0\.0\.1|localhost|:8788|basic_auth|basicauth|/login' "$fragment"; then
            echo "The public Studio fragment crosses the static-hosting boundary." >&2
            exit 1
          fi
          grep -F 'Content-Security-Policy' "$fragment"
          grep -F 'Strict-Transport-Security' "$fragment"
          grep -F '@health path /healthz' "$fragment"
          grep -F 'dusk-studio-access.log' "$fragment"
          grep -F 'roll_keep_for 168h' "$fragment"
          grep -F 'request>uri regexp \?.*$ ""' "$fragment"
          grep -F 'request>headers>Referer delete' "$fragment"
          formatted="$RUNNER_TEMP/studio.caddy.formatted"
          /tmp/caddy fmt "$fragment" > "$formatted"
          if ! cmp --silent "$fragment" "$formatted"; then
            echo "The Studio Caddy fragment is not canonically formatted." >&2
            diff --unified "$fragment" "$formatted" || true
            exit 1
          fi
          /tmp/caddy validate --config "$fragment" --adapter caddyfile
      - name: Report scope-only success
        if: steps.scope.outputs.relevant == 'false'
        run: |
          {
            echo "### Studio Caddy fragment security"
            echo "No Caddy boundary inputs changed. The stable required-check context passed without downloading Caddy."
          } >> "$GITHUB_STEP_SUMMARY"
