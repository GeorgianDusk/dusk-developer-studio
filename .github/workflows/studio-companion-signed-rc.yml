name: Studio companion signed release candidate

"on":
  workflow_dispatch:
    inputs:
      release_tag:
        description: Protected studio-companion-vX.Y.Z-rc.N tag selected as this workflow's ref
        required: true
        type: string
      approval_reference:
        description: Canonical GeorgianDusk GitHub URL approving this internal signed-RC run
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: studio-companion-signed-rc-${{ inputs.release_tag }}
  cancel-in-progress: false

env:
  PRODUCT_ROOT: .
  NODE_VERSION: 24.18.0
  PNPM_VERSION: 11.7.0

jobs:
  preflight:
    name: Validate protected tag and fail-closed signing policy
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    permissions:
      contents: read
    defaults:
      run:
        shell: bash
        working-directory: .
    steps:
      - name: Check out the selected release tag
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.sha }}
          fetch-depth: 1
          persist-credentials: "false"
      - name: Use the frozen Node.js line
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24.18.0
          package-manager-cache: "false"
      - name: Prove tag-bound invocation and policy readiness
        env:
          RELEASE_TAG: ${{ inputs.release_tag }}
          APPROVAL_REFERENCE: ${{ inputs.approval_reference }}
        run: |
          node -e 'if (!/^studio-companion-v\d+\.\d+\.\d+-rc\.\d+$/.test(process.env.RELEASE_TAG)) process.exit(1)'
          test "$GITHUB_REF" = "refs/tags/$RELEASE_TAG"
          test "$(git rev-parse HEAD)" = "$GITHUB_SHA"
          git fetch --force --no-tags origin "refs/tags/$RELEASE_TAG:refs/tags/$RELEASE_TAG"
          test "$(git rev-parse "$RELEASE_TAG^{commit}")" = "$GITHUB_SHA"
          test -n "$APPROVAL_REFERENCE"
          node -e 'const u=new URL(process.env.APPROVAL_REFERENCE); if (u.protocol!=="https:" || u.hostname!=="github.com" || u.username || u.password || !u.pathname.startsWith("/GeorgianDusk/dusk-developer-studio/")) process.exit(1)'
          node scripts/standalone-signing-evidence.mjs --readiness --release-tag="$RELEASE_TAG"
      - name: Restore the exact frozen dependency graph
        run: |
          corepack enable
          corepack install --global pnpm@$PNPM_VERSION
          pnpm install --frozen-lockfile
      - name: Run source, secret, and signed-RC tooling gates
        run: |
          pnpm check:no-secrets
          node scripts/test-standalone-signing-evidence.mjs
          node scripts/test-standalone-rc-tooling.mjs
          node scripts/test-standalone-safe-zip-extract.mjs
          node scripts/test-standalone-release-workflow.mjs
  sign-windows:
    name: Build and Authenticode-sign Windows x64
    needs: preflight
    runs-on: windows-2025
    timeout-minutes: 35
    environment: studio-companion-signing
    permissions:
      contents: read
      id-token: write
    env:
      STUDIO_AZURE_CLIENT_ID: ${{ vars.STUDIO_AZURE_CLIENT_ID }}
      STUDIO_AZURE_TENANT_ID: ${{ vars.STUDIO_AZURE_TENANT_ID }}
      STUDIO_AZURE_SUBSCRIPTION_ID: ${{ vars.STUDIO_AZURE_SUBSCRIPTION_ID }}
      STUDIO_AZURE_SIGNING_ENDPOINT: ${{ vars.STUDIO_AZURE_SIGNING_ENDPOINT }}
      STUDIO_AZURE_SIGNING_ACCOUNT: ${{ vars.STUDIO_AZURE_SIGNING_ACCOUNT }}
      STUDIO_AZURE_CERTIFICATE_PROFILE: ${{ vars.STUDIO_AZURE_CERTIFICATE_PROFILE }}
      STUDIO_WINDOWS_PUBLISHER_SUBJECT: ${{ vars.STUDIO_WINDOWS_PUBLISHER_SUBJECT }}
    defaults:
      run:
        shell: pwsh
        working-directory: .
    steps:
      - name: Check out the exact tag
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.sha }}
          fetch-depth: 1
          persist-credentials: "false"
      - name: Assert immutable Windows checkout
        run: |
          $PSNativeCommandUseErrorActionPreference = $true
          if ((git rev-parse HEAD).Trim() -ne $env:GITHUB_SHA) { throw 'Windows checkout does not match the workflow commit.' }
      - name: Use the frozen Node.js line
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24.18.0
          package-manager-cache: "false"
      - name: Restore frozen dependencies
        run: |
          $PSNativeCommandUseErrorActionPreference = $true
          corepack enable
          corepack install --global pnpm@$env:PNPM_VERSION
          pnpm install --frozen-lockfile
      - name: Build the exact unsigned Windows SEA
        env:
          DUSK_STUDIO_ARTIFACT_CHANNEL: portable
          DUSK_STUDIO_RELEASE_COMMIT: ${{ github.sha }}
          RELEASE_TAG: ${{ inputs.release_tag }}
        run: |
          $PSNativeCommandUseErrorActionPreference = $true
          if ($env:RELEASE_TAG -notmatch '^studio-companion-v(\d+\.\d+\.\d+)-rc\.\d+$') { throw 'Release tag version is invalid.' }
          $version = $Matches[1]
          $runtime = Join-Path $env:RUNNER_TEMP 'node-v24.18.0-win-x64.zip'
          $bundle = Join-Path $env:RUNNER_TEMP 'studio-windows-bundle'
          $release = Join-Path $env:RUNNER_TEMP 'studio-windows-release'
          $sea = Join-Path $env:RUNNER_TEMP 'studio-windows-sea'
          Invoke-WebRequest -UseBasicParsing -Uri 'https://nodejs.org/dist/v24.18.0/node-v24.18.0-win-x64.zip' -OutFile $runtime
          node scripts/companion-bundle.mjs "--out=$bundle"
          pnpm --filter @dusk/studio build
          $epoch = git show -s --format=%ct $env:GITHUB_SHA
          node scripts/companion-build.mjs --target=windows-x64 "--out=$release" "--launcher-bundle=$bundle" "--runtime-archive=$runtime" "--commit=$env:GITHUB_SHA" "--version=$version" "--source-date-epoch=$epoch"
          node scripts/companion-verify.mjs "--release=$release"
          node scripts/companion-sea-prototype.mjs "--release=$release" --target=windows-x64 "--out=$sea"
      - name: Authenticate to Azure Artifact Signing with OIDC
        uses: Azure/login@93381592711f247e165c389ebb30b596c84cdc48 # v3.0.0
        env:
          AZURE_LOGIN_PRE_CLEANUP: "true"
          AZURE_LOGIN_POST_CLEANUP: "true"
        with:
          client-id: ${{ env.STUDIO_AZURE_CLIENT_ID }}
          tenant-id: ${{ env.STUDIO_AZURE_TENANT_ID }}
          subscription-id: ${{ env.STUDIO_AZURE_SUBSCRIPTION_ID }}
      - name: Apply the maintainer-approved Authenticode signature
        uses: Azure/artifact-signing-action@208f8af4bf26cf2af8597424e3cb5582801523ba # v2.0.0
        with:
          endpoint: ${{ env.STUDIO_AZURE_SIGNING_ENDPOINT }}
          signing-account-name: ${{ env.STUDIO_AZURE_SIGNING_ACCOUNT }}
          certificate-profile-name: ${{ env.STUDIO_AZURE_CERTIFICATE_PROFILE }}
          files-folder: ${{ runner.temp }}\studio-windows-sea
          files-folder-filter: "*.exe"
          files-folder-recurse: "false"
          file-digest: SHA256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256
          cache-dependencies: "false"
      - name: Verify publisher, timestamp, and malware result
        run: |
          $PSNativeCommandUseErrorActionPreference = $true
          $policy = Get-Content config/companion-standalone-signing-policy.json -Raw | ConvertFrom-Json
          if (-not $env:STUDIO_WINDOWS_PUBLISHER_SUBJECT -or $policy.targets.'windows-x64'.approved_identity -ne $env:STUDIO_WINDOWS_PUBLISHER_SUBJECT) { throw 'Windows publisher does not match committed policy.' }
          $sea = Join-Path $env:RUNNER_TEMP 'studio-windows-sea'
          $receipt = Get-Content (Join-Path $sea 'prototype-receipt.json') -Raw | ConvertFrom-Json
          $names = @($receipt.launchers.safe.name, $receipt.launchers.local_actions.name)
          if ($names.Count -ne 2 -or $names[0] -eq $names[1]) { throw 'Expected two distinct mode-bound Windows launchers.' }
          $scanner = Get-ChildItem "$env:ProgramFiles\Windows Defender\MpCmdRun.exe", "$env:ProgramData\Microsoft\Windows Defender\Platform\*\MpCmdRun.exe" -ErrorAction SilentlyContinue | Sort-Object LastWriteTime -Descending | Select-Object -First 1
          if ($null -eq $scanner) { throw 'Microsoft Defender scanner is unavailable.' }
          foreach ($name in $names) {
            $executable = Join-Path $sea $name
            if (-not (Test-Path -LiteralPath $executable -PathType Leaf)) { throw "Signed launcher is missing: $name" }
            $signature = Get-AuthenticodeSignature -LiteralPath $executable
            if ($signature.Status -ne 'Valid') { throw "Authenticode status for $name is $($signature.Status)." }
            if ($signature.SignerCertificate.Subject -ne $env:STUDIO_WINDOWS_PUBLISHER_SUBJECT) { throw "Authenticode publisher subject mismatch for $name." }
            if ($null -eq $signature.TimeStamperCertificate) { throw "Authenticode timestamp is missing for $name." }
            & $scanner.FullName -Scan -ScanType 3 -File $executable
            if ($LASTEXITCODE -ne 0) { throw "Microsoft Defender scan failed for $name with exit code $LASTEXITCODE." }
          }
      - name: Assemble the exact runner-local Windows candidate package
        env:
          RELEASE_TAG: ${{ inputs.release_tag }}
        run: |
          $PSNativeCommandUseErrorActionPreference = $true
          if ($env:RELEASE_TAG -notmatch '^studio-companion-v(\d+\.\d+\.\d+)-rc\.\d+$') { throw 'Release tag version is invalid.' }
          $version = $Matches[1]
          $sea = Join-Path $env:RUNNER_TEMP 'studio-windows-sea'
          $receipt = Get-Content (Join-Path $sea 'prototype-receipt.json') -Raw | ConvertFrom-Json
          $stage = Join-Path $env:RUNNER_TEMP 'candidate-windows-stage'
          $launchers = Join-Path $stage 'launchers'
          $evidence = Join-Path $stage 'evidence'
          New-Item -ItemType Directory -Path $launchers, $evidence | Out-Null
          $safe = Join-Path $sea $receipt.launchers.safe.name
          $actions = Join-Path $sea $receipt.launchers.local_actions.name
          Copy-Item -LiteralPath $safe, $actions -Destination $launchers
          $receiptCopy = Join-Path $evidence 'prototype-receipt.json'
          Copy-Item -LiteralPath (Join-Path $sea 'prototype-receipt.json') -Destination $receiptCopy
          $index = Join-Path $stage 'signed-launcher-index.json'
          node scripts/standalone-signed-launcher-index.mjs --target=windows-x64 "--safe-launcher=$safe" "--local-actions-launcher=$actions" "--safe-name=launchers/$($receipt.launchers.safe.name)" "--local-actions-name=launchers/$($receipt.launchers.local_actions.name)" "--build-receipt=$receiptCopy" "--out=$index"
          node scripts/standalone-candidate-package-manifest.mjs "--root=$stage" --target=windows-x64 "--build-receipt=$receiptCopy" "--signed-launcher-index=$index" "--out=$(Join-Path $stage 'candidate-package-manifest.json')"
          $package = Join-Path $env:RUNNER_TEMP "dusk-developer-studio-$version-windows-x64-internal-rc.zip"
          node scripts/standalone-safe-zip-extract.mjs --create "--root=$stage" --target=windows-x64 "--ephemeral-root=$env:RUNNER_TEMP" "--out=$package"
          if (-not (Test-Path -LiteralPath $package -PathType Leaf)) { throw 'Windows candidate package was not created.' }
      - name: Stop before candidate transport
        run: throw 'Candidate transport is disabled; the signed Windows candidate remains runner-local and must not be uploaded as an Actions artifact.'
  sign-linux:
    name: Build and Sigstore-sign Linux x64
    needs: preflight
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    environment: studio-companion-signing
    permissions:
      contents: read
      id-token: write
    defaults:
      run:
        shell: bash
        working-directory: .
    steps:
      - name: Check out the exact tag
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.sha }}
          fetch-depth: 1
          persist-credentials: "false"
      - name: Assert immutable Linux checkout
        run: test "$(git rev-parse HEAD)" = "$GITHUB_SHA"
      - name: Use the frozen Node.js line
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24.18.0
          package-manager-cache: "false"
      - name: Restore frozen dependencies
        run: |
          corepack enable
          corepack install --global pnpm@$PNPM_VERSION
          pnpm install --frozen-lockfile
      - name: Build the exact unsigned Linux SEA
        env:
          DUSK_STUDIO_ARTIFACT_CHANNEL: portable
          DUSK_STUDIO_RELEASE_COMMIT: ${{ github.sha }}
          RELEASE_TAG: ${{ inputs.release_tag }}
        run: |
          version="${RELEASE_TAG#studio-companion-v}"
          version="${version%%-rc.*}"
          test -n "$version"
          runtime="$RUNNER_TEMP/node-v24.18.0-linux-x64.tar.xz"
          bundle="$RUNNER_TEMP/studio-linux-bundle"
          release="$RUNNER_TEMP/studio-linux-release"
          sea="$RUNNER_TEMP/studio-linux-sea"
          curl --fail --silent --show-error --location --output "$runtime" https://nodejs.org/dist/v24.18.0/node-v24.18.0-linux-x64.tar.xz
          node scripts/companion-bundle.mjs --out="$bundle"
          pnpm --filter @dusk/studio build
          epoch="$(git show -s --format=%ct "$GITHUB_SHA")"
          node scripts/companion-build.mjs --target=linux-x64 --out="$release" --launcher-bundle="$bundle" --runtime-archive="$runtime" --commit="$GITHUB_SHA" --version="$version" --source-date-epoch="$epoch"
          node scripts/companion-verify.mjs --release="$release"
          node scripts/companion-sea-prototype.mjs --release="$release" --target=linux-x64 --out="$sea"
      - name: Install integrity-verified cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
        with:
          cosign-release: v3.0.6
      - name: Sign and verify both exact Linux launchers
        env:
          RELEASE_TAG: ${{ inputs.release_tag }}
        run: |
          sea="$RUNNER_TEMP/studio-linux-sea"
          identity="https://github.com/GeorgianDusk/dusk-developer-studio/.github/workflows/studio-companion-signed-rc.yml@refs/tags/$RELEASE_TAG"
          for key in safe local_actions; do
            name="$(node -p "JSON.parse(require('fs').readFileSync('$sea/prototype-receipt.json')).launchers.$key.name")"
            executable="$sea/$name"
            test -f "$executable"
            bundle="$executable.sigstore.json"
            cosign sign-blob --yes --bundle "$bundle" "$executable"
            cosign verify-blob --bundle "$bundle" --certificate-identity "$identity" --certificate-oidc-issuer https://token.actions.githubusercontent.com "$executable"
          done
      - name: Assemble the exact runner-local Linux candidate package
        env:
          RELEASE_TAG: ${{ inputs.release_tag }}
        run: |
          set -euo pipefail
          version="${RELEASE_TAG#studio-companion-v}"
          version="${version%%-rc.*}"
          sea="$RUNNER_TEMP/studio-linux-sea"
          stage="$RUNNER_TEMP/candidate-linux-stage"
          mkdir -p "$stage/launchers" "$stage/attestations" "$stage/evidence"
          safe_name="$(node -p "JSON.parse(require('fs').readFileSync('$sea/prototype-receipt.json')).launchers.safe.name")"
          actions_name="$(node -p "JSON.parse(require('fs').readFileSync('$sea/prototype-receipt.json')).launchers.local_actions.name")"
          cp "$sea/$safe_name" "$sea/$actions_name" "$stage/launchers/"
          cp "$sea/$safe_name.sigstore.json" "$sea/$actions_name.sigstore.json" "$stage/attestations/"
          cp "$sea/prototype-receipt.json" "$stage/evidence/prototype-receipt.json"
          node scripts/standalone-signed-launcher-index.mjs --target=linux-x64 --safe-launcher="$sea/$safe_name" --local-actions-launcher="$sea/$actions_name" --safe-name="launchers/$safe_name" --local-actions-name="launchers/$actions_name" --build-receipt="$stage/evidence/prototype-receipt.json" --safe-attestation="$sea/$safe_name.sigstore.json" --local-actions-attestation="$sea/$actions_name.sigstore.json" --out="$stage/signed-launcher-index.json"
          node scripts/standalone-candidate-package-manifest.mjs --root="$stage" --target=linux-x64 --build-receipt="$stage/evidence/prototype-receipt.json" --signed-launcher-index="$stage/signed-launcher-index.json" --out="$stage/candidate-package-manifest.json"
          package="$RUNNER_TEMP/dusk-developer-studio-$version-linux-x64-internal-rc.zip"
          node scripts/standalone-safe-zip-extract.mjs --create --root="$stage" --target=linux-x64 --ephemeral-root="$RUNNER_TEMP" --out="$package"
      - name: Stop before candidate transport
        run: |
          echo 'Candidate transport is disabled; the signed Linux candidate remains runner-local and must not be uploaded as an Actions artifact.' >&2
          exit 1
  sign-macos:
    name: Build, Developer-ID sign, notarize, and staple macOS arm64
    needs: preflight
    runs-on: macos-15
    timeout-minutes: 45
    environment: studio-companion-signing
    permissions:
      contents: read
    env:
      STUDIO_APPLE_TEAM_ID: ${{ vars.STUDIO_APPLE_TEAM_ID }}
      STUDIO_APPLE_DEVELOPER_IDENTITY: ${{ vars.STUDIO_APPLE_DEVELOPER_IDENTITY }}
      STUDIO_APPLE_NOTARY_KEY_ID: ${{ vars.STUDIO_APPLE_NOTARY_KEY_ID }}
      STUDIO_APPLE_NOTARY_ISSUER_ID: ${{ vars.STUDIO_APPLE_NOTARY_ISSUER_ID }}
    defaults:
      run:
        shell: bash
        working-directory: .
    steps:
      - name: Check out the exact tag
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.sha }}
          fetch-depth: 1
          persist-credentials: "false"
      - name: Assert immutable macOS checkout
        run: test "$(git rev-parse HEAD)" = "$GITHUB_SHA"
      - name: Use the frozen Node.js line
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24.18.0
          package-manager-cache: "false"
      - name: Prove native Apple Silicon and restore frozen dependencies
        run: |
          test "$(uname -s)" = Darwin
          test "$(uname -m)" = arm64
          test "$(node -p 'process.arch')" = arm64
          corepack enable
          corepack install --global pnpm@$PNPM_VERSION
          pnpm install --frozen-lockfile
      - name: Build the exact unsigned macOS SEA and app bundle
        env:
          DUSK_STUDIO_ARTIFACT_CHANNEL: portable
          DUSK_STUDIO_RELEASE_COMMIT: ${{ github.sha }}
          RELEASE_TAG: ${{ inputs.release_tag }}
        run: |
          version="${RELEASE_TAG#studio-companion-v}"
          version="${version%%-rc.*}"
          test -n "$version"
          runtime="$RUNNER_TEMP/node-v24.18.0-darwin-arm64.tar.xz"
          bundle="$RUNNER_TEMP/studio-macos-bundle"
          release="$RUNNER_TEMP/studio-macos-release"
          sea="$RUNNER_TEMP/studio-macos-sea"
          app_root="$RUNNER_TEMP/studio-macos-app"
          curl --fail --silent --show-error --location --output "$runtime" https://nodejs.org/dist/v24.18.0/node-v24.18.0-darwin-arm64.tar.xz
          node scripts/companion-bundle.mjs --out="$bundle"
          pnpm --filter @dusk/studio build
          epoch="$(git show -s --format=%ct "$GITHUB_SHA")"
          node scripts/companion-build.mjs --target=darwin-arm64 --out="$release" --launcher-bundle="$bundle" --runtime-archive="$runtime" --commit="$GITHUB_SHA" --version="$version" --source-date-epoch="$epoch"
          node scripts/companion-verify.mjs --release="$release"
          node scripts/companion-sea-prototype.mjs --release="$release" --target=darwin-arm64 --out="$sea"
          safe_name="$(node -p "JSON.parse(require('fs').readFileSync('$sea/prototype-receipt.json')).launchers.safe.name")"
          actions_name="$(node -p "JSON.parse(require('fs').readFileSync('$sea/prototype-receipt.json')).launchers.local_actions.name")"
          node scripts/standalone-macos-app.mjs --safe-executable="$sea/$safe_name" --local-actions-executable="$sea/$actions_name" --build-receipt="$sea/prototype-receipt.json" --out="$app_root"
      - name: Sign, notarize, staple, and verify both mode-bound apps
        env:
          APPLE_P12_BASE64: ${{ secrets.STUDIO_APPLE_DEVELOPER_ID_P12_BASE64 }}
          APPLE_P12_PASSWORD: ${{ secrets.STUDIO_APPLE_DEVELOPER_ID_P12_PASSWORD }}
          APPLE_NOTARY_P8_BASE64: ${{ secrets.STUDIO_APPLE_NOTARY_API_KEY_P8_BASE64 }}
          RELEASE_TAG: ${{ inputs.release_tag }}
        run: |
          set -euo pipefail
          version="${RELEASE_TAG#studio-companion-v}"
          version="${version%%-rc.*}"
          app_root="$RUNNER_TEMP/studio-macos-app"
          safe_app="$app_root/Dusk Developer Studio.app"
          actions_app="$app_root/Dusk Developer Studio Local Actions.app"
          safe_executable="$safe_app/Contents/MacOS/dusk-studio"
          actions_executable="$actions_app/Contents/MacOS/dusk-studio-local-actions"
          keychain="$RUNNER_TEMP/studio-signing.keychain-db"
          p12="$RUNNER_TEMP/studio-developer-id.p12"
          notary_key_path="$RUNNER_TEMP/AuthKey_$STUDIO_APPLE_NOTARY_KEY_ID.p8"
          notary_zip="$RUNNER_TEMP/studio-notary-submission.zip"
          final_dir="$RUNNER_TEMP/studio-macos-final"
          final_zip="$RUNNER_TEMP/dusk-developer-studio-$version-darwin-arm64-internal-rc.zip"
          mkdir "$final_dir"
          test -n "$STUDIO_APPLE_TEAM_ID"
          test -n "$STUDIO_APPLE_DEVELOPER_IDENTITY"
          test -n "$STUDIO_APPLE_NOTARY_KEY_ID"
          test -n "$STUDIO_APPLE_NOTARY_ISSUER_ID"
          test -n "$APPLE_P12_BASE64"
          test -n "$APPLE_P12_PASSWORD"
          test -n "$APPLE_NOTARY_P8_BASE64"
          policy_team="$(node -p "JSON.parse(require('fs').readFileSync('config/companion-standalone-signing-policy.json')).targets['darwin-arm64'].approved_identity")"
          test "$policy_team" = "$STUDIO_APPLE_TEAM_ID"
          printf '%s' "$APPLE_P12_BASE64" | base64 --decode > "$p12"
          printf '%s' "$APPLE_NOTARY_P8_BASE64" | base64 --decode > "$notary_key_path"
          chmod 600 "$p12" "$notary_key_path"
          keychain_password="$(openssl rand -base64 32)"
          echo "::add-mask::$keychain_password"
          security create-keychain -p "$keychain_password" "$keychain"
          security set-keychain-settings -lut 21600 "$keychain"
          security unlock-keychain -p "$keychain_password" "$keychain"
          security import "$p12" -k "$keychain" -P "$APPLE_P12_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k "$keychain_password" "$keychain"
          security list-keychains -d user -s "$keychain"
          for app in "$safe_app" "$actions_app"; do
            executable="$app/Contents/MacOS/$(/usr/libexec/PlistBuddy -c 'Print :CFBundleExecutable' "$app/Contents/Info.plist")"
            codesign --force --options runtime --timestamp --sign "$STUDIO_APPLE_DEVELOPER_IDENTITY" "$executable"
            codesign --force --options runtime --timestamp --sign "$STUDIO_APPLE_DEVELOPER_IDENTITY" "$app"
            codesign --verify --deep --strict --verbose=4 "$app"
            details="$(codesign -d --verbose=4 "$app" 2>&1)"
            printf '%s\n' "$details" | grep -F "TeamIdentifier=$STUDIO_APPLE_TEAM_ID"
          done
          ditto -c -k "$app_root" "$notary_zip"
          xcrun notarytool submit "$notary_zip" --key "$notary_key_path" --key-id "$STUDIO_APPLE_NOTARY_KEY_ID" --issuer "$STUDIO_APPLE_NOTARY_ISSUER_ID" --wait --output-format json > "$final_dir/notarization.json"
          jq -e '.status == "Accepted"' "$final_dir/notarization.json"
          for app in "$safe_app" "$actions_app"; do
            xcrun stapler staple "$app"
            xcrun stapler validate "$app"
            spctl --assess --type execute --verbose=4 "$app"
          done
          stage="$RUNNER_TEMP/candidate-macos-stage"
          mkdir -p "$stage/evidence"
          ditto "$safe_app" "$stage/Dusk Developer Studio.app"
          ditto "$actions_app" "$stage/Dusk Developer Studio Local Actions.app"
          cp "$RUNNER_TEMP/studio-macos-sea/prototype-receipt.json" "$stage/evidence/prototype-receipt.json"
          cp "$app_root/macos-app-receipt.json" "$stage/evidence/macos-app-receipt.json"
          cp "$final_dir/notarization.json" "$stage/evidence/notarization.json"
          node scripts/standalone-signed-launcher-index.mjs --target=darwin-arm64 --safe-launcher="$stage/Dusk Developer Studio.app/Contents/MacOS/dusk-studio" --local-actions-launcher="$stage/Dusk Developer Studio Local Actions.app/Contents/MacOS/dusk-studio-local-actions" --safe-name="Dusk Developer Studio.app/Contents/MacOS/dusk-studio" --local-actions-name="Dusk Developer Studio Local Actions.app/Contents/MacOS/dusk-studio-local-actions" --build-receipt="$stage/evidence/prototype-receipt.json" --out="$stage/signed-launcher-index.json"
          node scripts/standalone-candidate-package-manifest.mjs --root="$stage" --target=darwin-arm64 --build-receipt="$stage/evidence/prototype-receipt.json" --signed-launcher-index="$stage/signed-launcher-index.json" --out="$stage/candidate-package-manifest.json"
          node scripts/standalone-safe-zip-extract.mjs --create --root="$stage" --target=darwin-arm64 --ephemeral-root="$RUNNER_TEMP" --out="$final_zip"
      - name: Remove imported signing material
        if: always()
        run: |
          security delete-keychain "$RUNNER_TEMP/studio-signing.keychain-db" 2>/dev/null || true
          rm -f "$RUNNER_TEMP/studio-developer-id.p12" "$RUNNER_TEMP"/AuthKey_*.p8
      - name: Stop before candidate transport
        run: |
          echo 'Candidate transport is disabled; the signed macOS candidate remains runner-local and must not be uploaded as an Actions artifact.' >&2
          exit 1
  smoke-windows:
    name: Fresh Windows runner trust and lifecycle smoke
    needs: sign-windows
    runs-on: windows-2025
    timeout-minutes: 15
    permissions:
      contents: read
    defaults:
      run:
        shell: pwsh
        working-directory: .
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.sha }}
          persist-credentials: "false"
      - name: Assert immutable Windows smoke checkout
        run: |
          $PSNativeCommandUseErrorActionPreference = $true
          if ((git rev-parse HEAD).Trim() -ne $env:GITHUB_SHA) { throw 'Windows smoke checkout does not match the workflow commit.' }
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24.18.0
          package-manager-cache: "false"
      - name: Stop because private candidate transport is unavailable
        run: throw 'Fresh-runner Windows smoke is disabled until a separately reviewed private candidate transport exists.'
      - name: Verify, self-test, clean up, and record Windows evidence
        env:
          RELEASE_TAG: ${{ inputs.release_tag }}
        run: |
          $PSNativeCommandUseErrorActionPreference = $true
          $download = Join-Path $env:RUNNER_TEMP 'download-windows'
          if ($env:RELEASE_TAG -notmatch '^studio-companion-v(\d+\.\d+\.\d+)-rc\.\d+$') { throw 'Release tag version is invalid.' }
          $version = $Matches[1]
          $policy = Get-Content config/companion-standalone-signing-policy.json -Raw | ConvertFrom-Json
          $publisher = $policy.targets.'windows-x64'.approved_identity
          if (-not $publisher) { throw 'Committed Windows publisher identity is empty.' }
          $package = Join-Path $download "dusk-developer-studio-$version-windows-x64-internal-rc.zip"
          if (-not (Test-Path -LiteralPath $package -PathType Leaf)) { throw 'Expected exact Windows candidate package.' }
          $install = Join-Path $env:RUNNER_TEMP 'installed-windows'
          node scripts/standalone-safe-zip-extract.mjs "--archive=$package" --target=windows-x64 "--ephemeral-root=$env:RUNNER_TEMP" "--out=$install"
          $index = Get-Content (Join-Path $install 'signed-launcher-index.json') -Raw | ConvertFrom-Json
          $safe = Join-Path $install $index.launchers.safe.name
          $actions = Join-Path $install $index.launchers.local_actions.name
          $scanner = Get-ChildItem "$env:ProgramFiles\Windows Defender\MpCmdRun.exe", "$env:ProgramData\Microsoft\Windows Defender\Platform\*\MpCmdRun.exe" -ErrorAction SilentlyContinue | Sort-Object LastWriteTime -Descending | Select-Object -First 1
          if ($null -eq $scanner) { throw 'Microsoft Defender scanner is unavailable.' }
          foreach ($candidate in @($safe, $actions)) {
            $signature = Get-AuthenticodeSignature -LiteralPath $candidate
            if ($signature.Status -ne 'Valid' -or $signature.SignerCertificate.Subject -ne $publisher -or $null -eq $signature.TimeStamperCertificate) { throw "Fresh-runner Authenticode verification failed for $candidate." }
            & $scanner.FullName -Scan -ScanType 3 -File $candidate
            if ($LASTEXITCODE -ne 0) { throw "Fresh-runner Defender scan failed for $candidate." }
          }
          $receiptCopy = Join-Path $env:RUNNER_TEMP 'windows-build-receipt.json'
          Copy-Item -LiteralPath (Join-Path $install 'evidence/prototype-receipt.json') -Destination $receiptCopy
          $lifecycle = Join-Path $env:RUNNER_TEMP 'windows-lifecycle.json'
          node scripts/companion-standalone-self-test.mjs --target=windows-x64 "--candidate-package=$package" "--safe-launcher=$safe" "--local-actions-launcher=$actions" "--build-receipt=$(Join-Path $install 'evidence/prototype-receipt.json')" "--signed-launcher-index=$(Join-Path $install 'signed-launcher-index.json')" "--package-manifest=$(Join-Path $install 'candidate-package-manifest.json')" "--ephemeral-root=$env:RUNNER_TEMP" "--cleanup-root=$install" "--workspace=$(Join-Path $env:RUNNER_TEMP 'lifecycle-windows')" "--out=$lifecycle"
          $record = Join-Path $env:RUNNER_TEMP 'windows-x64.json'
          node scripts/standalone-target-evidence.mjs --target=windows-x64 "--candidate-package=$package" "--build-receipt=$receiptCopy" "--lifecycle-report=$lifecycle" "--release-tag=$env:RELEASE_TAG" "--identity=$publisher" "--repository=$env:GITHUB_REPOSITORY" "--workflow-ref=https://github.com/$env:GITHUB_WORKFLOW_REF" "--run-id=$env:GITHUB_RUN_ID" "--run-attempt=$env:GITHUB_RUN_ATTEMPT" "--run-actor=github:$env:GITHUB_ACTOR" --checks=authenticode_valid,timestamp_valid,publisher_identity_verified,fresh_runner_smoke_passed,install_cleanup_verified,malware_scan_passed,install_rollback_verified "--out=$record"
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: studio-signed-rc-target-windows-x64-attempt-${{ github.run_attempt }}
          path: ${{ runner.temp }}/windows-x64.json
          if-no-files-found: error
          retention-days: 14
  smoke-linux:
    name: Fresh Linux runner trust and lifecycle smoke
    needs: sign-linux
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    permissions:
      contents: read
    defaults:
      run:
        shell: bash
        working-directory: .
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.sha }}
          persist-credentials: "false"
      - name: Assert immutable Linux smoke checkout
        run: test "$(git rev-parse HEAD)" = "$GITHUB_SHA"
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24.18.0
          package-manager-cache: "false"
      - uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
        with:
          cosign-release: v3.0.6
      - name: Stop because private candidate transport is unavailable
        run: |
          echo 'Fresh-runner Linux smoke is disabled until a separately reviewed private candidate transport exists.' >&2
          exit 1
      - name: Verify, self-test, clean up, and record Linux evidence
        env:
          RELEASE_TAG: ${{ inputs.release_tag }}
        run: |
          set -euo pipefail
          download="$RUNNER_TEMP/download-linux"
          version="${RELEASE_TAG#studio-companion-v}"
          version="${version%%-rc.*}"
          package="$download/dusk-developer-studio-$version-linux-x64-internal-rc.zip"
          test -f "$package"
          install="$RUNNER_TEMP/installed-linux"
          node scripts/standalone-safe-zip-extract.mjs --archive="$package" --target=linux-x64 --ephemeral-root="$RUNNER_TEMP" --out="$install"
          index="$install/signed-launcher-index.json"
          safe_name="$(node -p "JSON.parse(require('fs').readFileSync('$index')).launchers.safe.name")"
          actions_name="$(node -p "JSON.parse(require('fs').readFileSync('$index')).launchers.local_actions.name")"
          safe="$install/$safe_name"
          actions="$install/$actions_name"
          safe_bundle="$install/$(node -p "JSON.parse(require('fs').readFileSync('$index')).attestations.safe.name")"
          actions_bundle="$install/$(node -p "JSON.parse(require('fs').readFileSync('$index')).attestations.local_actions.name")"
          identity="https://github.com/GeorgianDusk/dusk-developer-studio/.github/workflows/studio-companion-signed-rc.yml@refs/tags/$RELEASE_TAG"
          cosign verify-blob --bundle "$safe_bundle" --certificate-identity "$identity" --certificate-oidc-issuer https://token.actions.githubusercontent.com "$safe"
          cosign verify-blob --bundle "$actions_bundle" --certificate-identity "$identity" --certificate-oidc-issuer https://token.actions.githubusercontent.com "$actions"
          cp "$install/evidence/prototype-receipt.json" "$RUNNER_TEMP/linux-build-receipt.json"
          node scripts/companion-standalone-self-test.mjs --target=linux-x64 --candidate-package="$package" --safe-launcher="$safe" --local-actions-launcher="$actions" --build-receipt="$install/evidence/prototype-receipt.json" --signed-launcher-index="$index" --package-manifest="$install/candidate-package-manifest.json" --safe-attestation="$safe_bundle" --local-actions-attestation="$actions_bundle" --ephemeral-root="$RUNNER_TEMP" --cleanup-root="$install" --workspace="$RUNNER_TEMP/lifecycle-linux" --out="$RUNNER_TEMP/linux-lifecycle.json"
          node scripts/standalone-target-evidence.mjs --target=linux-x64 --candidate-package="$package" --build-receipt="$RUNNER_TEMP/linux-build-receipt.json" --lifecycle-report="$RUNNER_TEMP/linux-lifecycle.json" --release-tag="$RELEASE_TAG" --identity="$identity" --oidc-issuer=https://token.actions.githubusercontent.com --repository="$GITHUB_REPOSITORY" --workflow-ref="https://github.com/$GITHUB_WORKFLOW_REF" --run-id="$GITHUB_RUN_ID" --run-attempt="$GITHUB_RUN_ATTEMPT" --run-actor="github:$GITHUB_ACTOR" --checks=cosign_bundle_verified,rekor_inclusion_verified,workflow_identity_verified,fresh_runner_smoke_passed,install_cleanup_verified,install_rollback_verified --out="$RUNNER_TEMP/linux-x64.json"
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: studio-signed-rc-target-linux-x64-attempt-${{ github.run_attempt }}
          path: ${{ runner.temp }}/linux-x64.json
          if-no-files-found: error
          retention-days: 14
  smoke-macos:
    name: Fresh macOS arm64 Gatekeeper and lifecycle smoke
    needs: sign-macos
    runs-on: macos-15
    timeout-minutes: 15
    permissions:
      contents: read
    defaults:
      run:
        shell: bash
        working-directory: .
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.sha }}
          persist-credentials: "false"
      - name: Assert immutable macOS smoke checkout
        run: test "$(git rev-parse HEAD)" = "$GITHUB_SHA"
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24.18.0
          package-manager-cache: "false"
      - name: Stop because private candidate transport is unavailable
        run: |
          echo 'Fresh-runner macOS smoke is disabled until a separately reviewed private candidate transport exists.' >&2
          exit 1
      - name: Verify, self-test, clean up, and record macOS evidence
        env:
          RELEASE_TAG: ${{ inputs.release_tag }}
        run: |
          set -euo pipefail
          test "$(uname -m)" = arm64
          download="$RUNNER_TEMP/download-macos"
          version="${RELEASE_TAG#studio-companion-v}"
          version="${version%%-rc.*}"
          apple_team_id="$(node -p "JSON.parse(require('fs').readFileSync('config/companion-standalone-signing-policy.json')).targets['darwin-arm64'].approved_identity")"
          test -n "$apple_team_id"
          archive="$download/dusk-developer-studio-$version-darwin-arm64-internal-rc.zip"
          test -f "$archive"
          install="$RUNNER_TEMP/installed-macos"
          node scripts/standalone-safe-zip-extract.mjs --archive="$archive" --target=darwin-arm64 --ephemeral-root="$RUNNER_TEMP" --out="$install"
          safe_app="$install/Dusk Developer Studio.app"
          actions_app="$install/Dusk Developer Studio Local Actions.app"
          safe="$safe_app/Contents/MacOS/dusk-studio"
          actions="$actions_app/Contents/MacOS/dusk-studio-local-actions"
          for app in "$safe_app" "$actions_app"; do
            xattr -w com.apple.quarantine "0081;$(printf '%x' "$(date +%s)");GitHubActions;" "$app"
            codesign --verify --deep --strict --verbose=4 "$app"
            details="$(codesign -d --verbose=4 "$app" 2>&1)"
            printf '%s\n' "$details" | grep -F "TeamIdentifier=$apple_team_id"
            xcrun stapler validate "$app"
            spctl --assess --type execute --verbose=4 "$app"
          done
          cp "$install/evidence/prototype-receipt.json" "$RUNNER_TEMP/darwin-build-receipt.json"
          node scripts/companion-standalone-self-test.mjs --target=darwin-arm64 --candidate-package="$archive" --safe-launcher="$safe" --local-actions-launcher="$actions" --build-receipt="$install/evidence/prototype-receipt.json" --signed-launcher-index="$install/signed-launcher-index.json" --package-manifest="$install/candidate-package-manifest.json" --ephemeral-root="$RUNNER_TEMP" --cleanup-root="$install" --workspace="$RUNNER_TEMP/lifecycle-macos" --out="$RUNNER_TEMP/darwin-lifecycle.json"
          node scripts/standalone-target-evidence.mjs --target=darwin-arm64 --candidate-package="$archive" --build-receipt="$RUNNER_TEMP/darwin-build-receipt.json" --lifecycle-report="$RUNNER_TEMP/darwin-lifecycle.json" --release-tag="$RELEASE_TAG" --identity="$apple_team_id" --repository="$GITHUB_REPOSITORY" --workflow-ref="https://github.com/$GITHUB_WORKFLOW_REF" --run-id="$GITHUB_RUN_ID" --run-attempt="$GITHUB_RUN_ATTEMPT" --run-actor="github:$GITHUB_ACTOR" --checks=developer_id_valid,hardened_runtime,notarized,ticket_stapled,gatekeeper_assessed,fresh_runner_smoke_passed,install_cleanup_verified,install_rollback_verified --out="$RUNNER_TEMP/darwin-arm64.json"
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: studio-signed-rc-target-darwin-arm64-attempt-${{ github.run_attempt }}
          path: ${{ runner.temp }}/darwin-arm64.json
          if-no-files-found: error
          retention-days: 14
  evidence:
    name: Assemble fail-closed signed-RC evidence packet
    needs: [smoke-windows, smoke-linux, smoke-macos]
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: read
    defaults:
      run:
        shell: bash
        working-directory: .
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.sha }}
          persist-credentials: "false"
      - name: Assert immutable evidence checkout
        run: test "$(git rev-parse HEAD)" = "$GITHUB_SHA"
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24.18.0
          package-manager-cache: "false"
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: studio-signed-rc-target-*-attempt-${{ github.run_attempt }}
          path: ${{ runner.temp }}/signed-rc-records
          merge-multiple: true
      - name: Assemble and evaluate the exact run evidence
        env:
          APPROVAL_REFERENCE: ${{ inputs.approval_reference }}
        run: |
          node scripts/assemble-standalone-signing-evidence.mjs --records="$RUNNER_TEMP/signed-rc-records" --run-id="$GITHUB_RUN_ID" --run-attempt="$GITHUB_RUN_ATTEMPT" --run-actor="github:$GITHUB_ACTOR" --approval-reference-url="$APPROVAL_REFERENCE" --out="$RUNNER_TEMP/standalone-signing-evidence.json"
          node scripts/standalone-signing-evidence.mjs --evidence="$RUNNER_TEMP/standalone-signing-evidence.json"
      - name: Upload internal evidence packet only
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: studio-signed-rc-aggregate-${{ inputs.release_tag }}-attempt-${{ github.run_attempt }}
          path: ${{ runner.temp }}/standalone-signing-evidence.json
          if-no-files-found: error
          retention-days: 30
