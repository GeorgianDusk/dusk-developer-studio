name: Studio companion signed release candidate

"on":
  workflow_dispatch:
    inputs:
      release_tag:
        description: Protected studio-companion-vX.Y.Z-rc.N tag selected as this workflow's ref
        required: true
        type: string
      approval_reference:
        description: Maintainer approval or decision reference for this private signed-RC run
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: studio-companion-signed-rc-${{ inputs.release_tag }}
  cancel-in-progress: false

env:
  PRODUCT_ROOT: .
  NODE_VERSION: 24.11.0
  PNPM_VERSION: 11.7.0

jobs:
  preflight:
    name: Validate protected tag and fail-closed signing policy
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    permissions:
      contents: read
    defaults:
      run:
        shell: bash
        working-directory: .
    steps:
      - name: Check out the selected release tag
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ inputs.release_tag }}
          fetch-depth: 1
          persist-credentials: "false"
      - name: Use the frozen Node.js line
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24.11.0
          package-manager-cache: "false"
      - name: Prove tag-bound invocation and policy readiness
        env:
          RELEASE_TAG: ${{ inputs.release_tag }}
          APPROVAL_REFERENCE: ${{ inputs.approval_reference }}
        run: |
          node -e 'if (!/^studio-companion-v\d+\.\d+\.\d+-rc\.\d+$/.test(process.env.RELEASE_TAG)) process.exit(1)'
          test "$GITHUB_REF" = "refs/tags/$RELEASE_TAG"
          test "$(git rev-parse HEAD)" = "$GITHUB_SHA"
          test "$(git rev-parse "$RELEASE_TAG^{commit}")" = "$GITHUB_SHA"
          test -n "$APPROVAL_REFERENCE"
          node scripts/standalone-signing-evidence.mjs --readiness --release-tag="$RELEASE_TAG"
      - name: Restore the exact frozen dependency graph
        run: |
          corepack enable
          corepack install --global pnpm@$PNPM_VERSION
          pnpm install --frozen-lockfile
      - name: Run source, secret, and signed-RC tooling gates
        run: |
          pnpm check:no-secrets
          node scripts/test-standalone-signing-evidence.mjs
          node scripts/test-standalone-rc-tooling.mjs
          node scripts/test-standalone-release-workflow.mjs
  sign-windows:
    name: Build and Authenticode-sign Windows x64
    needs: preflight
    runs-on: windows-2025
    timeout-minutes: 35
    environment: studio-companion-signing
    permissions:
      contents: read
      id-token: write
    env:
      STUDIO_AZURE_CLIENT_ID: ${{ vars.STUDIO_AZURE_CLIENT_ID }}
      STUDIO_AZURE_TENANT_ID: ${{ vars.STUDIO_AZURE_TENANT_ID }}
      STUDIO_AZURE_SUBSCRIPTION_ID: ${{ vars.STUDIO_AZURE_SUBSCRIPTION_ID }}
      STUDIO_AZURE_SIGNING_ENDPOINT: ${{ vars.STUDIO_AZURE_SIGNING_ENDPOINT }}
      STUDIO_AZURE_SIGNING_ACCOUNT: ${{ vars.STUDIO_AZURE_SIGNING_ACCOUNT }}
      STUDIO_AZURE_CERTIFICATE_PROFILE: ${{ vars.STUDIO_AZURE_CERTIFICATE_PROFILE }}
      STUDIO_WINDOWS_PUBLISHER_SUBJECT: ${{ vars.STUDIO_WINDOWS_PUBLISHER_SUBJECT }}
    defaults:
      run:
        shell: pwsh
        working-directory: .
    steps:
      - name: Check out the exact tag
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ inputs.release_tag }}
          fetch-depth: 1
          persist-credentials: "false"
      - name: Use the frozen Node.js line
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24.11.0
          package-manager-cache: "false"
      - name: Restore frozen dependencies
        run: |
          corepack enable
          corepack install --global pnpm@$env:PNPM_VERSION
          pnpm install --frozen-lockfile
      - name: Build the exact unsigned Windows SEA
        env:
          DUSK_STUDIO_ARTIFACT_CHANNEL: portable
          DUSK_STUDIO_RELEASE_COMMIT: ${{ github.sha }}
        run: |
          $runtime = Join-Path $env:RUNNER_TEMP 'node-v24.11.0-win-x64.zip'
          $bundle = Join-Path $env:RUNNER_TEMP 'studio-windows-bundle'
          $release = Join-Path $env:RUNNER_TEMP 'studio-windows-release'
          $sea = Join-Path $env:RUNNER_TEMP 'studio-windows-sea'
          Invoke-WebRequest -UseBasicParsing -Uri 'https://nodejs.org/dist/v24.11.0/node-v24.11.0-win-x64.zip' -OutFile $runtime
          node scripts/companion-bundle.mjs "--out=$bundle"
          pnpm --filter @dusk/studio build
          $epoch = git show -s --format=%ct $env:GITHUB_SHA
          node scripts/companion-build.mjs --target=windows-x64 "--out=$release" "--launcher-bundle=$bundle" "--runtime-archive=$runtime" "--commit=$env:GITHUB_SHA" "--source-date-epoch=$epoch"
          node scripts/companion-verify.mjs "--release=$release"
          node scripts/companion-sea-prototype.mjs "--release=$release" --target=windows-x64 "--out=$sea"
      - name: Authenticate to Azure Artifact Signing with OIDC
        uses: Azure/login@93381592711f247e165c389ebb30b596c84cdc48 # v3.0.0
        env:
          AZURE_LOGIN_PRE_CLEANUP: "true"
          AZURE_LOGIN_POST_CLEANUP: "true"
        with:
          client-id: ${{ env.STUDIO_AZURE_CLIENT_ID }}
          tenant-id: ${{ env.STUDIO_AZURE_TENANT_ID }}
          subscription-id: ${{ env.STUDIO_AZURE_SUBSCRIPTION_ID }}
      - name: Apply the maintainer-approved Authenticode signature
        uses: Azure/artifact-signing-action@208f8af4bf26cf2af8597424e3cb5582801523ba # v2.0.0
        with:
          endpoint: ${{ env.STUDIO_AZURE_SIGNING_ENDPOINT }}
          signing-account-name: ${{ env.STUDIO_AZURE_SIGNING_ACCOUNT }}
          certificate-profile-name: ${{ env.STUDIO_AZURE_CERTIFICATE_PROFILE }}
          files-folder: ${{ runner.temp }}\studio-windows-sea
          files-folder-filter: "*.exe"
          files-folder-recurse: "false"
          file-digest: SHA256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256
          cache-dependencies: "false"
      - name: Verify publisher, timestamp, and malware result
        run: |
          $policy = Get-Content config/companion-standalone-signing-policy.json -Raw | ConvertFrom-Json
          if (-not $env:STUDIO_WINDOWS_PUBLISHER_SUBJECT -or $policy.targets.'windows-x64'.approved_identity -ne $env:STUDIO_WINDOWS_PUBLISHER_SUBJECT) { throw 'Windows publisher does not match committed policy.' }
          $sea = Join-Path $env:RUNNER_TEMP 'studio-windows-sea'
          $exe = @(Get-ChildItem -LiteralPath $sea -Filter *.exe -File)
          if ($exe.Count -ne 1) { throw 'Expected exactly one signed Windows executable.' }
          $signature = Get-AuthenticodeSignature -LiteralPath $exe[0].FullName
          if ($signature.Status -ne 'Valid') { throw "Authenticode status is $($signature.Status)." }
          if ($signature.SignerCertificate.Subject -ne $env:STUDIO_WINDOWS_PUBLISHER_SUBJECT) { throw 'Authenticode publisher subject mismatch.' }
          if ($null -eq $signature.TimeStamperCertificate) { throw 'Authenticode timestamp is missing.' }
          $scanner = Get-ChildItem "$env:ProgramFiles\Windows Defender\MpCmdRun.exe", "$env:ProgramData\Microsoft\Windows Defender\Platform\*\MpCmdRun.exe" -ErrorAction SilentlyContinue | Sort-Object LastWriteTime -Descending | Select-Object -First 1
          if ($null -eq $scanner) { throw 'Microsoft Defender scanner is unavailable.' }
          & $scanner.FullName -Scan -ScanType 3 -File $exe[0].FullName
          if ($LASTEXITCODE -ne 0) { throw "Microsoft Defender scan failed with exit code $LASTEXITCODE." }
      - name: Upload internal signed Windows candidate
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: studio-signed-rc-windows-x64
          path: ${{ runner.temp }}/studio-windows-sea/*
          if-no-files-found: error
          retention-days: 7
          compression-level: 0
  sign-linux:
    name: Build and Sigstore-sign Linux x64
    needs: preflight
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    environment: studio-companion-signing
    permissions:
      contents: read
      id-token: write
    defaults:
      run:
        shell: bash
        working-directory: .
    steps:
      - name: Check out the exact tag
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ inputs.release_tag }}
          fetch-depth: 1
          persist-credentials: "false"
      - name: Use the frozen Node.js line
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24.11.0
          package-manager-cache: "false"
      - name: Restore frozen dependencies
        run: |
          corepack enable
          corepack install --global pnpm@$PNPM_VERSION
          pnpm install --frozen-lockfile
      - name: Build the exact unsigned Linux SEA
        env:
          DUSK_STUDIO_ARTIFACT_CHANNEL: portable
          DUSK_STUDIO_RELEASE_COMMIT: ${{ github.sha }}
        run: |
          runtime="$RUNNER_TEMP/node-v24.11.0-linux-x64.tar.xz"
          bundle="$RUNNER_TEMP/studio-linux-bundle"
          release="$RUNNER_TEMP/studio-linux-release"
          sea="$RUNNER_TEMP/studio-linux-sea"
          curl --fail --silent --show-error --location --output "$runtime" https://nodejs.org/dist/v24.11.0/node-v24.11.0-linux-x64.tar.xz
          node scripts/companion-bundle.mjs --out="$bundle"
          pnpm --filter @dusk/studio build
          epoch="$(git show -s --format=%ct "$GITHUB_SHA")"
          node scripts/companion-build.mjs --target=linux-x64 --out="$release" --launcher-bundle="$bundle" --runtime-archive="$runtime" --commit="$GITHUB_SHA" --source-date-epoch="$epoch"
          node scripts/companion-verify.mjs --release="$release"
          node scripts/companion-sea-prototype.mjs --release="$release" --target=linux-x64 --out="$sea"
      - name: Install integrity-verified cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
        with:
          cosign-release: v3.0.6
      - name: Sign and verify the exact Linux executable
        env:
          RELEASE_TAG: ${{ inputs.release_tag }}
        run: |
          sea="$RUNNER_TEMP/studio-linux-sea"
          executable="$(find "$sea" -maxdepth 1 -type f -name 'dusk-developer-studio-local-*' | head -n 1)"
          test -n "$executable"
          bundle="$executable.sigstore.json"
          identity="https://github.com/GeorgianDusk/dusk-developer-studio/.github/workflows/studio-companion-signed-rc.yml@refs/tags/$RELEASE_TAG"
          cosign sign-blob --yes --bundle "$bundle" "$executable"
          cosign verify-blob --bundle "$bundle" --certificate-identity "$identity" --certificate-oidc-issuer https://token.actions.githubusercontent.com "$executable"
      - name: Upload internal signed Linux candidate
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: studio-signed-rc-linux-x64
          path: ${{ runner.temp }}/studio-linux-sea/*
          if-no-files-found: error
          retention-days: 7
          compression-level: 0
  sign-macos:
    name: Build, Developer-ID sign, notarize, and staple macOS arm64
    needs: preflight
    runs-on: macos-14
    timeout-minutes: 45
    environment: studio-companion-signing
    permissions:
      contents: read
    env:
      STUDIO_APPLE_TEAM_ID: ${{ vars.STUDIO_APPLE_TEAM_ID }}
      STUDIO_APPLE_DEVELOPER_IDENTITY: ${{ vars.STUDIO_APPLE_DEVELOPER_IDENTITY }}
      STUDIO_APPLE_NOTARY_KEY_ID: ${{ vars.STUDIO_APPLE_NOTARY_KEY_ID }}
      STUDIO_APPLE_NOTARY_ISSUER_ID: ${{ vars.STUDIO_APPLE_NOTARY_ISSUER_ID }}
    defaults:
      run:
        shell: bash
        working-directory: .
    steps:
      - name: Check out the exact tag
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ inputs.release_tag }}
          fetch-depth: 1
          persist-credentials: "false"
      - name: Use the frozen Node.js line
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24.11.0
          package-manager-cache: "false"
      - name: Prove native Apple Silicon and restore frozen dependencies
        run: |
          test "$(uname -s)" = Darwin
          test "$(uname -m)" = arm64
          test "$(node -p 'process.arch')" = arm64
          corepack enable
          corepack install --global pnpm@$PNPM_VERSION
          pnpm install --frozen-lockfile
      - name: Build the exact unsigned macOS SEA and app bundle
        env:
          DUSK_STUDIO_ARTIFACT_CHANNEL: portable
          DUSK_STUDIO_RELEASE_COMMIT: ${{ github.sha }}
        run: |
          runtime="$RUNNER_TEMP/node-v24.11.0-darwin-arm64.tar.xz"
          bundle="$RUNNER_TEMP/studio-macos-bundle"
          release="$RUNNER_TEMP/studio-macos-release"
          sea="$RUNNER_TEMP/studio-macos-sea"
          app_root="$RUNNER_TEMP/studio-macos-app"
          curl --fail --silent --show-error --location --output "$runtime" https://nodejs.org/dist/v24.11.0/node-v24.11.0-darwin-arm64.tar.xz
          node scripts/companion-bundle.mjs --out="$bundle"
          pnpm --filter @dusk/studio build
          epoch="$(git show -s --format=%ct "$GITHUB_SHA")"
          node scripts/companion-build.mjs --target=darwin-arm64 --out="$release" --launcher-bundle="$bundle" --runtime-archive="$runtime" --commit="$GITHUB_SHA" --source-date-epoch="$epoch"
          node scripts/companion-verify.mjs --release="$release"
          node scripts/companion-sea-prototype.mjs --release="$release" --target=darwin-arm64 --out="$sea"
          executable="$(find "$sea" -maxdepth 1 -type f -name 'dusk-developer-studio-local-*' | head -n 1)"
          node scripts/standalone-macos-app.mjs --executable="$executable" --build-receipt="$sea/prototype-receipt.json" --out="$app_root"
      - name: Sign, notarize, staple, and verify
        env:
          APPLE_P12_BASE64: ${{ secrets.STUDIO_APPLE_DEVELOPER_ID_P12_BASE64 }}
          APPLE_P12_PASSWORD: ${{ secrets.STUDIO_APPLE_DEVELOPER_ID_P12_PASSWORD }}
          APPLE_NOTARY_P8_BASE64: ${{ secrets.STUDIO_APPLE_NOTARY_API_KEY_P8_BASE64 }}
        run: |
          set -euo pipefail
          app="$RUNNER_TEMP/studio-macos-app/Dusk Developer Studio.app"
          executable="$app/Contents/MacOS/dusk-studio"
          keychain="$RUNNER_TEMP/studio-signing.keychain-db"
          p12="$RUNNER_TEMP/studio-developer-id.p12"
          notary_key_path="$RUNNER_TEMP/AuthKey_$STUDIO_APPLE_NOTARY_KEY_ID.p8"
          notary_zip="$RUNNER_TEMP/studio-notary-submission.zip"
          final_dir="$RUNNER_TEMP/studio-macos-final"
          final_zip="$final_dir/dusk-developer-studio-local-macos-arm64.zip"
          mkdir "$final_dir"
          test -n "$STUDIO_APPLE_TEAM_ID"
          test -n "$STUDIO_APPLE_DEVELOPER_IDENTITY"
          test -n "$STUDIO_APPLE_NOTARY_KEY_ID"
          test -n "$STUDIO_APPLE_NOTARY_ISSUER_ID"
          test -n "$APPLE_P12_BASE64"
          test -n "$APPLE_P12_PASSWORD"
          test -n "$APPLE_NOTARY_P8_BASE64"
          policy_team="$(node -p "JSON.parse(require('fs').readFileSync('config/companion-standalone-signing-policy.json')).targets['darwin-arm64'].approved_identity")"
          test "$policy_team" = "$STUDIO_APPLE_TEAM_ID"
          printf '%s' "$APPLE_P12_BASE64" | base64 --decode > "$p12"
          printf '%s' "$APPLE_NOTARY_P8_BASE64" | base64 --decode > "$notary_key_path"
          chmod 600 "$p12" "$notary_key_path"
          keychain_password="$(openssl rand -base64 32)"
          echo "::add-mask::$keychain_password"
          security create-keychain -p "$keychain_password" "$keychain"
          security set-keychain-settings -lut 21600 "$keychain"
          security unlock-keychain -p "$keychain_password" "$keychain"
          security import "$p12" -k "$keychain" -P "$APPLE_P12_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k "$keychain_password" "$keychain"
          security list-keychains -d user -s "$keychain"
          codesign --force --options runtime --timestamp --sign "$STUDIO_APPLE_DEVELOPER_IDENTITY" "$executable"
          codesign --force --options runtime --timestamp --sign "$STUDIO_APPLE_DEVELOPER_IDENTITY" "$app"
          codesign --verify --deep --strict --verbose=4 "$app"
          details="$(codesign -d --verbose=4 "$app" 2>&1)"
          printf '%s\n' "$details" | grep -F "TeamIdentifier=$STUDIO_APPLE_TEAM_ID"
          ditto -c -k --keepParent "$app" "$notary_zip"
          xcrun notarytool submit "$notary_zip" --key "$notary_key_path" --key-id "$STUDIO_APPLE_NOTARY_KEY_ID" --issuer "$STUDIO_APPLE_NOTARY_ISSUER_ID" --wait --output-format json > "$final_dir/notarization.json"
          jq -e '.status == "Accepted"' "$final_dir/notarization.json"
          xcrun stapler staple "$app"
          xcrun stapler validate "$app"
          spctl --assess --type execute --verbose=4 "$app"
          ditto -c -k --keepParent "$app" "$final_zip"
          cp "$RUNNER_TEMP/studio-macos-sea/prototype-receipt.json" "$final_dir/prototype-receipt.json"
      - name: Remove imported signing material
        if: always()
        run: |
          security delete-keychain "$RUNNER_TEMP/studio-signing.keychain-db" 2>/dev/null || true
          rm -f "$RUNNER_TEMP/studio-developer-id.p12" "$RUNNER_TEMP"/AuthKey_*.p8
      - name: Upload internal signed macOS candidate
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: studio-signed-rc-darwin-arm64
          path: ${{ runner.temp }}/studio-macos-final/*
          if-no-files-found: error
          retention-days: 7
          compression-level: 0
  smoke-windows:
    name: Fresh Windows runner trust and lifecycle smoke
    needs: sign-windows
    runs-on: windows-2025
    timeout-minutes: 15
    permissions:
      contents: read
    defaults:
      run:
        shell: pwsh
        working-directory: .
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ inputs.release_tag }}
          persist-credentials: "false"
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24.11.0
          package-manager-cache: "false"
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: studio-signed-rc-windows-x64
          path: ${{ runner.temp }}/download-windows
      - name: Verify, self-test, clean up, and record Windows evidence
        env:
          RELEASE_TAG: ${{ inputs.release_tag }}
        run: |
          $download = Join-Path $env:RUNNER_TEMP 'download-windows'
          $policy = Get-Content config/companion-standalone-signing-policy.json -Raw | ConvertFrom-Json
          $publisher = $policy.targets.'windows-x64'.approved_identity
          if (-not $publisher) { throw 'Committed Windows publisher identity is empty.' }
          $source = @(Get-ChildItem -LiteralPath $download -Filter *.exe -File)
          if ($source.Count -ne 1) { throw 'Expected one Windows executable.' }
          $signature = Get-AuthenticodeSignature -LiteralPath $source[0].FullName
          if ($signature.Status -ne 'Valid' -or $signature.SignerCertificate.Subject -ne $publisher -or $null -eq $signature.TimeStamperCertificate) { throw 'Fresh-runner Authenticode verification failed.' }
          $before = @(Get-ChildItem -LiteralPath $env:TEMP -Directory -Filter 'dusk-studio-sea-*' -ErrorAction SilentlyContinue | ForEach-Object FullName)
          $install = Join-Path $env:RUNNER_TEMP 'installed-windows'
          New-Item -ItemType Directory -Path $install | Out-Null
          $candidate = Join-Path $install $source[0].Name
          Copy-Item -LiteralPath $source[0].FullName -Destination $candidate
          & $candidate --signed-rc-self-test
          if ($LASTEXITCODE -ne 0) { throw 'Windows signed-RC self-test failed.' }
          if (Get-NetTCPConnection -State Listen -LocalPort 5173,8788 -ErrorAction SilentlyContinue) { throw 'Local Studio ports remained open.' }
          $after = @(Get-ChildItem -LiteralPath $env:TEMP -Directory -Filter 'dusk-studio-sea-*' -ErrorAction SilentlyContinue | ForEach-Object FullName)
          if (@($after | Where-Object { $_ -notin $before }).Count) { throw 'SEA extraction directory remained after shutdown.' }
          Remove-Item -LiteralPath $install -Recurse -Force
          if (Test-Path -LiteralPath $install) { throw 'Windows rollback cleanup failed.' }
          $record = Join-Path $env:RUNNER_TEMP 'windows-x64.json'
          node scripts/standalone-target-evidence.mjs --target=windows-x64 "--artifact=$($source[0].FullName)" "--build-receipt=$(Join-Path $download 'prototype-receipt.json')" "--release-tag=$env:RELEASE_TAG" "--identity=$publisher" --checks=authenticode_valid,timestamp_valid,publisher_identity_verified,fresh_runner_smoke_passed,cleanup_verified,malware_scan_passed,rollback_verified "--out=$record"
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: studio-signed-rc-evidence-windows-x64
          path: ${{ runner.temp }}/windows-x64.json
          if-no-files-found: error
          retention-days: 14
  smoke-linux:
    name: Fresh Linux runner trust and lifecycle smoke
    needs: sign-linux
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    permissions:
      contents: read
    defaults:
      run:
        shell: bash
        working-directory: .
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ inputs.release_tag }}
          persist-credentials: "false"
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24.11.0
          package-manager-cache: "false"
      - uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
        with:
          cosign-release: v3.0.6
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: studio-signed-rc-linux-x64
          path: ${{ runner.temp }}/download-linux
      - name: Verify, self-test, clean up, and record Linux evidence
        env:
          RELEASE_TAG: ${{ inputs.release_tag }}
        run: |
          set -euo pipefail
          download="$RUNNER_TEMP/download-linux"
          source="$(find "$download" -maxdepth 1 -type f -name 'dusk-developer-studio-local-*' ! -name '*.json' | head -n 1)"
          test -n "$source"
          bundle="$source.sigstore.json"
          identity="https://github.com/GeorgianDusk/dusk-developer-studio/.github/workflows/studio-companion-signed-rc.yml@refs/tags/$RELEASE_TAG"
          cosign verify-blob --bundle "$bundle" --certificate-identity "$identity" --certificate-oidc-issuer https://token.actions.githubusercontent.com "$source"
          install="$RUNNER_TEMP/installed-linux"
          mkdir "$install"
          candidate="$install/dusk-studio"
          cp "$source" "$candidate"
          chmod 755 "$candidate"
          XDG_DATA_HOME="$RUNNER_TEMP/test-user-data" "$candidate" --signed-rc-self-test
          ! curl --fail --silent http://127.0.0.1:5173/healthz
          ! curl --fail --silent http://127.0.0.1:8788/healthz
          if find "${TMPDIR:-/tmp}" -maxdepth 1 -type d -name 'dusk-studio-sea-*' -print -quit | grep -q .; then exit 1; fi
          rm -rf "$install" "$RUNNER_TEMP/test-user-data"
          test ! -e "$install"
          node scripts/standalone-target-evidence.mjs --target=linux-x64 --artifact="$source" --build-receipt="$download/prototype-receipt.json" --release-tag="$RELEASE_TAG" --identity="$identity" --oidc-issuer=https://token.actions.githubusercontent.com --checks=cosign_bundle_verified,rekor_inclusion_verified,workflow_identity_verified,fresh_runner_smoke_passed,cleanup_verified,rollback_verified --out="$RUNNER_TEMP/linux-x64.json"
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: studio-signed-rc-evidence-linux-x64
          path: ${{ runner.temp }}/linux-x64.json
          if-no-files-found: error
          retention-days: 14
  smoke-macos:
    name: Fresh macOS arm64 Gatekeeper and lifecycle smoke
    needs: sign-macos
    runs-on: macos-14
    timeout-minutes: 15
    permissions:
      contents: read
    defaults:
      run:
        shell: bash
        working-directory: .
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ inputs.release_tag }}
          persist-credentials: "false"
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24.11.0
          package-manager-cache: "false"
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: studio-signed-rc-darwin-arm64
          path: ${{ runner.temp }}/download-macos
      - name: Verify, self-test, clean up, and record macOS evidence
        env:
          RELEASE_TAG: ${{ inputs.release_tag }}
        run: |
          set -euo pipefail
          test "$(uname -m)" = arm64
          download="$RUNNER_TEMP/download-macos"
          apple_team_id="$(node -p "JSON.parse(require('fs').readFileSync('config/companion-standalone-signing-policy.json')).targets['darwin-arm64'].approved_identity")"
          test -n "$apple_team_id"
          archive="$download/dusk-developer-studio-local-macos-arm64.zip"
          install="$RUNNER_TEMP/installed-macos"
          mkdir "$install"
          ditto -x -k "$archive" "$install"
          app="$install/Dusk Developer Studio.app"
          executable="$app/Contents/MacOS/dusk-studio"
          xattr -w com.apple.quarantine "0081;$(printf '%x' "$(date +%s)");GitHubActions;" "$app"
          codesign --verify --deep --strict --verbose=4 "$app"
          details="$(codesign -d --verbose=4 "$app" 2>&1)"
          printf '%s\n' "$details" | grep -F "TeamIdentifier=$apple_team_id"
          xcrun stapler validate "$app"
          spctl --assess --type execute --verbose=4 "$app"
          HOME="$RUNNER_TEMP/test-home" "$executable" --signed-rc-self-test
          ! curl --fail --silent http://127.0.0.1:5173/healthz
          ! curl --fail --silent http://127.0.0.1:8788/healthz
          if find "${TMPDIR:-/tmp}" -maxdepth 1 -type d -name 'dusk-studio-sea-*' -print -quit | grep -q .; then exit 1; fi
          rm -rf "$install" "$RUNNER_TEMP/test-home"
          test ! -e "$install"
          node scripts/standalone-target-evidence.mjs --target=darwin-arm64 --artifact="$archive" --build-receipt="$download/prototype-receipt.json" --release-tag="$RELEASE_TAG" --identity="$apple_team_id" --checks=developer_id_valid,hardened_runtime,notarized,ticket_stapled,gatekeeper_assessed,fresh_runner_smoke_passed,cleanup_verified,rollback_verified --out="$RUNNER_TEMP/darwin-arm64.json"
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: studio-signed-rc-evidence-darwin-arm64
          path: ${{ runner.temp }}/darwin-arm64.json
          if-no-files-found: error
          retention-days: 14
  evidence:
    name: Assemble fail-closed signed-RC evidence packet
    needs: [smoke-windows, smoke-linux, smoke-macos]
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: read
    defaults:
      run:
        shell: bash
        working-directory: .
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ inputs.release_tag }}
          persist-credentials: "false"
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24.11.0
          package-manager-cache: "false"
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: studio-signed-rc-evidence-*
          path: ${{ runner.temp }}/signed-rc-records
          merge-multiple: true
      - name: Assemble and evaluate the exact run evidence
        run: |
          node scripts/assemble-standalone-signing-evidence.mjs --records="$RUNNER_TEMP/signed-rc-records" --run-id="$GITHUB_RUN_ID" --out="$RUNNER_TEMP/standalone-signing-evidence.json"
          node scripts/standalone-signing-evidence.mjs --evidence="$RUNNER_TEMP/standalone-signing-evidence.json" --report-only
      - name: Upload internal evidence packet only
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: studio-signed-rc-evidence-${{ inputs.release_tag }}
          path: ${{ runner.temp }}/standalone-signing-evidence.json
          if-no-files-found: error
          retention-days: 30
