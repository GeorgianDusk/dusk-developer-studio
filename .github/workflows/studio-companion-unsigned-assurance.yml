          set +e
          elevated_output="$(sudo -n -- /usr/bin/env TMPDIR=/tmp TEMP=/tmp TMP=/tmp "$safe" --signed-rc-self-test 2>&1)"
          elevated_status=$?
          set -e
          test "$elevated_status" -ne 0
          printf '%s\n' "$elevated_output" | grep -F 'Dusk Developer Studio refuses elevated or root execution.'
          after_elevated_probe="$(find /tmp -maxdepth 1 -type d -name 'dusk-studio-sea-*' -print | LC_ALL=C sort)"
          test "$before_elevated_probe" = "$after_elevated_probe"
          node scripts/companion-standalone-unsigned-self-test.mjs --target=darwin-arm64 --candidate-package="$package" --install-root="$install" --ephemeral-root="$RUNNER_TEMP" --workspace="$RUNNER_TEMP/unsigned-lifecycle-macos" --out="$RUNNER_TEMP/macos-lifecycle.json"
          node scripts/standalone-unsigned-assurance.mjs --operation=platform-observations --target=darwin-arm64 --checks=host_target_verified,adhoc_integrity_verified,gatekeeper_rejected_unsigned --out="$RUNNER_TEMP/macos-platform.json"
      - name: Delete every workflow-owned unsigned macOS candidate path before recording evidence
        if: always()
        run: |
          set -euo pipefail
          cleanup_records=(
            "runtime_archive=$RUNNER_TEMP/node-v24.18.0-darwin-arm64.tar.xz"
            "bundle_1=$RUNNER_TEMP/unsigned-macos-bundle-1"
            "bundle_2=$RUNNER_TEMP/unsigned-macos-bundle-2"
            "release_1=$RUNNER_TEMP/unsigned-macos-release-1"
            "release_2=$RUNNER_TEMP/unsigned-macos-release-2"
            "sea_1=$RUNNER_TEMP/unsigned-macos-sea-1"
            "sea_2=$RUNNER_TEMP/unsigned-macos-sea-2"
            "app_bundle_root=$RUNNER_TEMP/unsigned-macos-apps"
            "package_stage=$RUNNER_TEMP/unsigned-macos-stage"
            "install_root=$RUNNER_TEMP/installed-unsigned-macos"
            "lifecycle_workspace=$RUNNER_TEMP/unsigned-lifecycle-macos"
            "candidate_zip=$RUNNER_TEMP/unsigned-macos-engineering.zip"
          )
          for record in "${cleanup_records[@]}"; do
            case "${record%%=*}" in
              install_root|lifecycle_workspace) ;;
              *) rm -rf -- "${record#*=}" ;;
            esac
          done
          joined="$(IFS='|'; echo "${cleanup_records[*]}")"
          node scripts/standalone-unsigned-assurance.mjs --operation=cleanup --target=darwin-arm64 --scope-root="$RUNNER_TEMP" --paths="$joined" --out="$RUNNER_TEMP/macos-cleanup.json"
          node scripts/standalone-unsigned-assurance.mjs --operation=target-evidence --target=darwin-arm64 --lifecycle-report="$RUNNER_TEMP/macos-lifecycle.json" --reproducibility-report="$RUNNER_TEMP/macos-reproducibility.json" --platform-observations="$RUNNER_TEMP/macos-platform.json" --cleanup-receipt="$RUNNER_TEMP/macos-cleanup.json" --repository="$GITHUB_REPOSITORY" --workflow-ref="$GITHUB_WORKFLOW_REF" --run-id="$GITHUB_RUN_ID" --run-attempt="$GITHUB_RUN_ATTEMPT" --run-actor="github:$GITHUB_ACTOR" --expected-commit="$EXPECTED_COMMIT" --checks="$UNSIGNED_ASSURANCE_CHECKS" --out="$RUNNER_TEMP/darwin-arm64.json"
  result:
    name: Unsigned companion engineering assurance
    needs: [preflight, windows, linux, macos]
    if: always()
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    defaults:
      run:
        shell: bash
        working-directory: .
    steps:
      - name: Require every native job
        env:
          PREFLIGHT_RESULT: ${{ needs.preflight.result }}
          WINDOWS_RESULT: ${{ needs.windows.result }}
          LINUX_RESULT: ${{ needs.linux.result }}
          MACOS_RESULT: ${{ needs.macos.result }}
        run: |
          set -euo pipefail
          test "$PREFLIGHT_RESULT" = success
          test "$WINDOWS_RESULT" = success
          test "$LINUX_RESULT" = success
          test "$MACOS_RESULT" = success
      - name: Report bounded result
        run: |
          {
            echo "### Unsigned companion engineering assurance"
            echo "- Native target lifecycles: passed"
            echo "- Reproducible dual-launcher builds: passed"
            echo "- Exact workflow-owned candidate paths: absent at the cleanup check"
            echo "- Retained workflow artifacts: none"
            echo "- Platform trust or publication eligibility: not established"
          } >> "$GITHUB_STEP_SUMMARY"
