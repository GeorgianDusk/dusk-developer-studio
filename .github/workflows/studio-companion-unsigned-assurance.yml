name: Studio companion unsigned engineering assurance

"on":
  pull_request:
    branches: [main]
  merge_group:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: studio-companion-unsigned-assurance-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: 24.18.0
  PNPM_VERSION: 11.7.0
  EXPECTED_COMMIT: ${{ github.sha }}
  UNSIGNED_ASSURANCE_CHECKS: exact_checkout_verified,frozen_dependencies_restored,runtime_lock_verified,dual_launchers_distinct,two_build_reproducibility_verified,runner_local_package_verified,non_elevated_launch_verified,safe_mode_local_action_denied,local_actions_preflight_verified,release_parity_verified,studio_listening_endpoints_verified,unexpected_studio_listening_ports_absent,isolated_user_data_roots_verified,studio_loopback_services_stopped,extraction_cleanup_verified,install_cleanup_verified,scoped_candidate_paths_absent_at_check

jobs:
  preflight:
    name: Validate unsigned assurance source contract
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    defaults:
      run:
        shell: bash
        working-directory: .
    steps:
      - name: Check out the exact reviewed source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 1
          persist-credentials: "false"
          ref: ${{ env.EXPECTED_COMMIT }}
      - name: Bind preflight to the reviewed commit
        run: |
          test "$(git rev-parse HEAD)" = "$EXPECTED_COMMIT"
          test -z "$(git status --short)"
      - name: Use the frozen Node.js line
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24.18.0
          package-manager-cache: "false"
      - name: Restore the exact dependency graph
        run: |
          corepack enable
          corepack install --global pnpm@$PNPM_VERSION
          pnpm install --frozen-lockfile
      - name: Run the complete source and product gate
        run: |
          pnpm check:no-secrets
          pnpm check:boundary
          pnpm lint
          pnpm typecheck
          pnpm test
          pnpm build

  windows:
    name: Unsigned engineering lifecycle (windows-x64)
    needs: preflight
    runs-on: windows-2025
    timeout-minutes: 45
    env:
      WINDOWS_ASSURANCE_ROOT: C:\Users\Public\DuskStudioUnsignedAssurance
    defaults:
      run:
        shell: pwsh
        working-directory: .
    steps:
      - name: Check out the exact reviewed source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 1
          persist-credentials: "false"
          ref: ${{ env.EXPECTED_COMMIT }}
      - name: Prove native target and immutable checkout
        run: |
          $PSNativeCommandUseErrorActionPreference = $true
          if ((git rev-parse HEAD).Trim() -ne $env:EXPECTED_COMMIT) { throw 'Windows checkout is not the reviewed commit.' }
          if (-not [Environment]::Is64BitOperatingSystem -or $env:PROCESSOR_ARCHITECTURE -ne 'AMD64') { throw 'Expected native Windows x64.' }
          if (git status --short) { throw 'Windows checkout is dirty.' }
      - name: Use the frozen Node.js line
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24.18.0
          package-manager-cache: "false"
      - name: Restore the exact dependency graph
        run: |
          $PSNativeCommandUseErrorActionPreference = $true
          corepack enable
          corepack install --global pnpm@$env:PNPM_VERSION
          pnpm install --frozen-lockfile
          node scripts/standalone-unsigned-assurance.mjs --operation=policy
          node scripts/test-standalone-candidate-lifecycle-core.mjs
      - name: Build two unsigned reproducibility attempts
        env:
          DUSK_STUDIO_ARTIFACT_CHANNEL: portable
          DUSK_STUDIO_RELEASE_COMMIT: ${{ env.EXPECTED_COMMIT }}
        run: |
          $PSNativeCommandUseErrorActionPreference = $true
          $windowsScopeRoot = [System.IO.Path]::GetFullPath($env:WINDOWS_ASSURANCE_ROOT)
          $expectedScopeRoot = [System.IO.Path]::GetFullPath(
            (Join-Path $env:PUBLIC 'DuskStudioUnsignedAssurance')
          )
          if (-not $windowsScopeRoot.Equals(
            $expectedScopeRoot,
            [System.StringComparison]::OrdinalIgnoreCase
          )) {
            throw 'Windows assurance scope is not the exact reviewed public-root path.'
          }
          if (Test-Path -LiteralPath $windowsScopeRoot) {
            throw 'Windows assurance scope already exists.'
          }
          New-Item -ItemType Directory -Path $windowsScopeRoot | Out-Null
          $runnerSid = [System.Security.Principal.WindowsIdentity]::GetCurrent().User.Value
          & (Join-Path $env:SystemRoot 'System32/icacls.exe') $windowsScopeRoot /inheritance:r /grant:r "*S-1-5-18:(OI)(CI)F" "*S-1-5-32-544:(OI)(CI)F" "*${runnerSid}:(OI)(CI)F"
          if ($LASTEXITCODE -ne 0) { throw 'Could not isolate the Windows assurance scope.' }
          $version = node -p "JSON.parse(require('fs').readFileSync('package.json')).version"
          $epoch = (git show -s --format=%ct $env:EXPECTED_COMMIT).Trim()
          $runtime = Join-Path $windowsScopeRoot 'node-v24.18.0-win-x64.zip'
          Invoke-WebRequest -UseBasicParsing -Uri 'https://nodejs.org/dist/v24.18.0/node-v24.18.0-win-x64.zip' -OutFile $runtime
          pnpm --filter @dusk/studio build
          foreach ($attempt in 1, 2) {
            $bundle = Join-Path $windowsScopeRoot "unsigned-windows-bundle-$attempt"
            $release = Join-Path $windowsScopeRoot "unsigned-windows-release-$attempt"
            $sea = Join-Path $windowsScopeRoot "unsigned-windows-sea-$attempt"
            node scripts/companion-bundle.mjs "--out=$bundle"
            node scripts/companion-build.mjs --target=windows-x64 "--out=$release" "--launcher-bundle=$bundle" "--runtime-archive=$runtime" "--commit=$env:EXPECTED_COMMIT" "--version=$version" "--source-date-epoch=$epoch"
            node scripts/companion-verify.mjs "--release=$release"
            node scripts/companion-sea-prototype.mjs "--release=$release" --target=windows-x64 "--out=$sea"
          }
          node scripts/standalone-unsigned-assurance.mjs --operation=reproducibility --target=windows-x64 "--first-receipt=$(Join-Path $windowsScopeRoot 'unsigned-windows-sea-1/prototype-receipt.json')" "--second-receipt=$(Join-Path $windowsScopeRoot 'unsigned-windows-sea-2/prototype-receipt.json')" "--out=$(Join-Path $windowsScopeRoot 'windows-reproducibility.json')"
      - name: Package, extract, inspect, and exercise both Windows launchers
        run: |
          $PSNativeCommandUseErrorActionPreference = $true
          $windowsScopeRoot = [System.IO.Path]::GetFullPath($env:WINDOWS_ASSURANCE_ROOT)
          $scopeItem = Get-Item -Force -LiteralPath $windowsScopeRoot
          if (-not $scopeItem.PSIsContainer -or
              ($scopeItem.Attributes -band [System.IO.FileAttributes]::ReparsePoint)) {
            throw 'Windows assurance scope must be a regular directory.'
          }
          $sea = Join-Path $windowsScopeRoot 'unsigned-windows-sea-1'
          $receiptSource = Join-Path $sea 'prototype-receipt.json'
          $receipt = Get-Content -Raw -LiteralPath $receiptSource | ConvertFrom-Json
          $controlRoot = Join-Path $windowsScopeRoot 'control'
          $cleanupConfirmation = Join-Path $controlRoot 'shutdown-confirmed.json'
          $runnerSid = [System.Security.Principal.WindowsIdentity]::GetCurrent().User.Value
          New-Item -ItemType Directory -Path $controlRoot | Out-Null
          & (Join-Path $env:SystemRoot 'System32/icacls.exe') $controlRoot /inheritance:r /grant:r "*S-1-5-18:(OI)(CI)F" "*S-1-5-32-544:(OI)(CI)F" "*${runnerSid}:(OI)(CI)F"
          if ($LASTEXITCODE -ne 0) { throw 'Could not isolate the parent-owned lifecycle control root.' }
          if (Test-Path -LiteralPath $cleanupConfirmation) {
            throw 'Lifecycle cleanup confirmation must not exist before execution.'
          }
          $standardUserRoot = Join-Path $windowsScopeRoot 'unsigned-windows-standard-user'
          New-Item -ItemType Directory -Path $standardUserRoot | Out-Null
          $stage = Join-Path $standardUserRoot 'package-stage'
          New-Item -ItemType Directory -Path (Join-Path $stage 'launchers'), (Join-Path $stage 'evidence') | Out-Null
          $safeSource = Join-Path $sea $receipt.launchers.safe.name
          $actionsSource = Join-Path $sea $receipt.launchers.local_actions.name
          Copy-Item -LiteralPath $safeSource, $actionsSource -Destination (Join-Path $stage 'launchers')
          $receiptCopy = Join-Path $stage 'evidence/prototype-receipt.json'
          Copy-Item -LiteralPath $receiptSource -Destination $receiptCopy
          $index = Join-Path $stage 'unsigned-launcher-index.json'
          node scripts/standalone-unsigned-assurance.mjs --operation=index --target=windows-x64 "--safe-launcher=$safeSource" "--local-actions-launcher=$actionsSource" "--safe-name=launchers/$($receipt.launchers.safe.name)" "--local-actions-name=launchers/$($receipt.launchers.local_actions.name)" "--build-receipt=$receiptCopy" "--out=$index"
          node scripts/standalone-unsigned-assurance.mjs --operation=manifest "--root=$stage" --target=windows-x64 "--build-receipt=$receiptCopy" "--launcher-index=$index" "--out=$(Join-Path $stage 'unsigned-candidate-manifest.json')"
          $package = Join-Path $standardUserRoot 'unsigned-windows-engineering.zip'
          node scripts/standalone-safe-zip-extract.mjs --create "--root=$stage" --target=windows-x64 "--ephemeral-root=$standardUserRoot" "--out=$package" --profile=unsigned-engineering
          $install = Join-Path $standardUserRoot 'installed-unsigned-windows'
          node scripts/standalone-safe-zip-extract.mjs "--archive=$package" --target=windows-x64 "--ephemeral-root=$standardUserRoot" "--out=$install" --profile=unsigned-engineering
          $installedIndex = Get-Content -Raw -LiteralPath (Join-Path $install 'unsigned-launcher-index.json') | ConvertFrom-Json
          $safe = Join-Path $install $installedIndex.launchers.safe.name
          $actions = Join-Path $install $installedIndex.launchers.local_actions.name
          $scanner = Get-ChildItem "$env:ProgramFiles\Windows Defender\MpCmdRun.exe", "$env:ProgramData\Microsoft\Windows Defender\Platform\*\MpCmdRun.exe" -ErrorAction SilentlyContinue | Sort-Object LastWriteTime -Descending | Select-Object -First 1
          if ($null -eq $scanner) { throw 'Microsoft Defender scanner is unavailable.' }
          foreach ($candidate in @($safe, $actions)) {
            $signature = Get-AuthenticodeSignature -LiteralPath $candidate
            if ($signature.Status -ne 'NotSigned') {
              throw "Unexpected Authenticode state for an engineering launcher: $($signature.Status)."
            }
            & $scanner.FullName -Scan -ScanType 3 -File $candidate
            if ($LASTEXITCODE -ne 0) { throw "Microsoft Defender scan failed with exit code $LASTEXITCODE." }
          }

          $beforeExtractionRoots = @(
            Get-ChildItem -LiteralPath $env:TEMP -Directory -Filter 'dusk-studio-sea-*' -ErrorAction SilentlyContinue |
              ForEach-Object FullName |
              Sort-Object
          )
          $guardInfo = [System.Diagnostics.ProcessStartInfo]::new()
          $guardInfo.FileName = $safe
          $guardInfo.UseShellExecute = $false
          $guardInfo.CreateNoWindow = $true
          $guardInfo.RedirectStandardOutput = $true
          $guardInfo.RedirectStandardError = $true
          $guardInfo.ArgumentList.Add('--signed-rc-self-test')
          $guardProcess = [System.Diagnostics.Process]::Start($guardInfo)
          $guardStdout = $guardProcess.StandardOutput.ReadToEndAsync()
          $guardStderr = $guardProcess.StandardError.ReadToEndAsync()
          if (-not $guardProcess.WaitForExit(30000)) {
            $guardProcess.Kill($true)
            throw 'Elevated-launch rejection probe timed out.'
          }
          $guardOutput = "$($guardStdout.Result)`n$($guardStderr.Result)"
          if ($guardProcess.ExitCode -eq 0 -or $guardOutput -notmatch 'Dusk Developer Studio refuses elevated or root execution[.]') {
            throw 'The Windows launcher did not reject the elevated hosted-runner token.'
          }
          $afterExtractionRoots = @(
            Get-ChildItem -LiteralPath $env:TEMP -Directory -Filter 'dusk-studio-sea-*' -ErrorAction SilentlyContinue |
              ForEach-Object FullName |
              Sort-Object
          )
          if (Compare-Object $beforeExtractionRoots $afterExtractionRoots) {
            throw 'The rejected elevated launch created a SEA extraction directory.'
          }
          $unexpectedListeners = @(
            Get-NetTCPConnection -State Listen -ErrorAction SilentlyContinue |
              Where-Object { $_.LocalPort -in @(5173, 8788) }
          )
          if ($unexpectedListeners.Count -ne 0) {
            throw 'The rejected elevated launch opened a Studio port.'
          }

          $userName = 'DuskStudioAssurance'
          if (@(
            Get-LocalUser -ErrorAction Stop |
              Where-Object Name -eq $userName
          ).Count -ne 0) {
            throw 'The isolated assurance account already exists.'
          }
          function Get-ExactSidAclRules {
            param(
              [Parameter(Mandatory = $true)][string] $Path,
              [Parameter(Mandatory = $true)][string] $Sid
            )
            return @(
              (Get-Acl -LiteralPath $Path -ErrorAction Stop).Access |
                Where-Object {
                  try {
                    $_.IdentityReference.Translate(
                      [System.Security.Principal.SecurityIdentifier]
                    ).Value -eq $Sid
                  } catch {
                    $_.IdentityReference.Value -eq $Sid -or
                      $_.IdentityReference.Value -eq "*$Sid"
                  }
                }
            )
          }
          function Get-SidProcessSnapshot {
            param([Parameter(Mandatory = $true)][string] $Sid)
            $owned = [System.Collections.Generic.List[object]]::new()
            $unresolvedProcesses = [System.Collections.Generic.List[object]]::new()
            foreach ($candidate in @(Get-CimInstance Win32_Process -ErrorAction Stop)) {
              try {
                $owner = Invoke-CimMethod -InputObject $candidate -MethodName GetOwnerSid -ErrorAction Stop
                if ($null -eq $owner -or $owner.ReturnValue -ne 0 -or
                    [string]::IsNullOrWhiteSpace([string] $owner.Sid)) {
                  throw 'Owner SID query did not return a verified identity.'
                }
              } catch {
                $liveMatch = @(
                  Get-CimInstance Win32_Process -Filter "ProcessId = $($candidate.ProcessId)" -ErrorAction Stop
                )
                if ($liveMatch.Count -gt 1) {
                  throw 'A process identifier unexpectedly matched multiple live processes.'
                }
                if ($liveMatch.Count -eq 1) {
                  $creationDate = $liveMatch[0].CreationDate
                  $instanceKey = if ($creationDate -is [DateTime]) {
                    "$([uint32] $liveMatch[0].ProcessId)|$($creationDate.ToUniversalTime().Ticks)"
                  } else {
                    $null
                  }
                  [void] $unresolvedProcesses.Add([pscustomobject]@{
                    ProcessId = [uint32] $liveMatch[0].ProcessId
                    InstanceKey = $instanceKey
                  })
                }
                continue
              }
              if ($owner.Sid -eq $Sid) {
                [void] $owned.Add($candidate)
              }
            }
            return [pscustomobject]@{
              Owned = @($owned)
              UnresolvedProcesses = @(
                $unresolvedProcesses |
                  Sort-Object ProcessId, InstanceKey -Unique
              )
            }
          }
          function Get-NewUnresolvedProcesses {
            param(
              [Parameter(Mandatory = $true)] $Snapshot,
              [Parameter(Mandatory = $true)]
              [System.Collections.Generic.HashSet[string]] $BaselineKeys
            )
            return @(
              $Snapshot.UnresolvedProcesses |
                Where-Object {
                  $null -eq $_.InstanceKey -or
                    -not $BaselineKeys.Contains($_.InstanceKey)
                }
            )
          }
          function Write-SanitizedDiagnostic {
            param(
              [Parameter(Mandatory = $true)][string] $Label,
              [AllowNull()][string] $Value,
              [Parameter(Mandatory = $true)][string] $SensitiveRoot
            )
            $text = [string] $Value
            $text = $text.Replace($SensitiveRoot, '<standard-user-root>')
            $text = [regex]::Replace(
              $text,
              '[\u0000-\u0008\u000B\u000C\u000E-\u001F\u007F]+',
              ' '
            )
            if ($text.Length -gt 4096) {
              $text = $text.Substring(0, 4096) + ' <truncated>'
            }
            $lines = @($text -split '\r\n|\n|\r')
            if ($lines.Count -eq 0 -or ($lines.Count -eq 1 -and $lines[0].Length -eq 0)) {
              Write-Output "standard-user $Label`: empty"
              return
            }
            foreach ($line in $lines) {
              Write-Output "standard-user $Label`: $line"
            }
          }
          $baselineProcessSnapshot = Get-SidProcessSnapshot -Sid 'S-1-0-0'
          if (@($baselineProcessSnapshot.Owned).Count -ne 0) {
            throw 'The Windows null SID unexpectedly owned a live process.'
          }
          $baselineUnresolvedProcessKeys =
            [System.Collections.Generic.HashSet[string]]::new(
              [System.StringComparer]::Ordinal
            )
          foreach ($unresolvedProcess in @($baselineProcessSnapshot.UnresolvedProcesses)) {
            if ([string]::IsNullOrWhiteSpace([string] $unresolvedProcess.InstanceKey)) {
              throw 'A baseline unresolved process lacked a stable instance identity.'
            }
            [void] $baselineUnresolvedProcessKeys.Add($unresolvedProcess.InstanceKey)
          }
          $driverRoot = Join-Path $standardUserRoot 'driver'
          New-Item -ItemType Directory -Path $driverRoot | Out-Null
          Copy-Item -LiteralPath (Join-Path $env:GITHUB_WORKSPACE 'scripts') -Destination (Join-Path $driverRoot 'scripts') -Recurse
          Copy-Item -LiteralPath (Join-Path $env:GITHUB_WORKSPACE 'config') -Destination (Join-Path $driverRoot 'config') -Recurse
          Copy-Item -LiteralPath (Join-Path $env:GITHUB_WORKSPACE 'package.json') -Destination (Join-Path $driverRoot 'package.json')
          Copy-Item -LiteralPath (Get-Command node).Source -Destination (Join-Path $driverRoot 'node.exe')
          $passwordText = "$([guid]::NewGuid().ToString('N'))aA1!"
          Write-Output "::add-mask::$passwordText"
          $securePassword = ConvertTo-SecureString $passwordText -AsPlainText -Force
          $securePassword.MakeReadOnly()
          $passwordText = $null
          $standardUser = $null
          $standardUserSid = $null
          $userCreated = $false
          $credentialProcess = $null
          $credentialStartInfo = $null
          $primaryFailure = $null
          $traverseAclRoots = [System.Collections.Generic.List[string]]::new()
          $ancestorAclSetupValid = $true
          $processCleanupConfirmed = $false
          $ancestorAclCleanupConfirmed = $false
          $profileCleanupConfirmed = $false
          $accountCleanupConfirmed = $false
          try {
            $standardUser = New-LocalUser -Name $userName -Password $securePassword -AccountNeverExpires -PasswordNeverExpires -UserMayNotChangePassword
            $userCreated = $true
            Add-LocalGroupMember -SID 'S-1-5-32-545' -Member $standardUser
            $standardUserSid = $standardUser.SID.Value
            if ($standardUserSid -notmatch '^S-1-5-21-(?:[0-9]+-){3}[0-9]+$') {
              throw 'Temporary standard-user SID was invalid.'
            }
            $expectedStandardUserRoot = [System.IO.Path]::GetFullPath(
              (Join-Path $windowsScopeRoot 'unsigned-windows-standard-user')
            )
            if (-not ([System.IO.Path]::GetFullPath($standardUserRoot)).Equals(
              $expectedStandardUserRoot,
              [System.StringComparison]::OrdinalIgnoreCase
            )) {
              throw 'Standard-user lifecycle root is not the exact isolated Windows assurance path.'
            }
            foreach ($traverseCursor in @($windowsScopeRoot)) {
              if (@(Get-ExactSidAclRules -Path $traverseCursor -Sid $standardUserSid).Count -ne 0) {
                $ancestorAclSetupValid = $false
                throw 'Fresh temporary SID unexpectedly had an ancestor ACL before setup.'
              }
              [void] $traverseAclRoots.Add($traverseCursor)
              & (Join-Path $env:SystemRoot 'System32/icacls.exe') $traverseCursor /grant:r "*${standardUserSid}:(X)"
              if ($LASTEXITCODE -ne 0) {
                $ancestorAclSetupValid = $false
                throw 'Could not grant temporary traversal to a lifecycle-root ancestor.'
              }
              $ancestorAclSetupValid = $false
              $grantedRules = @(Get-ExactSidAclRules -Path $traverseCursor -Sid $standardUserSid)
              $allowedAncestorRights = (
                [int] [System.Security.AccessControl.FileSystemRights]::Traverse -bor
                [int] [System.Security.AccessControl.FileSystemRights]::Synchronize
              )
              $actualAncestorRights = if ($grantedRules.Count -eq 1) {
                [int] $grantedRules[0].FileSystemRights
              } else {
                -1
              }
              if ($grantedRules.Count -ne 1 -or $grantedRules[0].IsInherited -or
                  $grantedRules[0].AccessControlType -ne
                    [System.Security.AccessControl.AccessControlType]::Allow -or
                  $grantedRules[0].InheritanceFlags -ne
                    [System.Security.AccessControl.InheritanceFlags]::None -or
                  $grantedRules[0].PropagationFlags -ne
                    [System.Security.AccessControl.PropagationFlags]::None -or
                  (($actualAncestorRights -band
                    [int] [System.Security.AccessControl.FileSystemRights]::Traverse) -eq 0) -or
                  (($actualAncestorRights -band (-bnot $allowedAncestorRights)) -ne 0)) {
                $ancestorAclSetupValid = $false
                throw 'Temporary lifecycle-root ancestor grant was broader or different than traverse-only.'
              }
              $ancestorAclSetupValid = $true
            }
            if (@(Get-CimInstance Win32_UserProfile -Filter "SID='$standardUserSid'" -ErrorAction Stop).Count -ne 0 -or
                (Test-Path -LiteralPath "Registry::HKEY_USERS\$standardUserSid") -or
                (Test-Path -LiteralPath "Registry::HKEY_USERS\${standardUserSid}_Classes")) {
              throw 'Temporary standard user unexpectedly had profile state before launch.'
            }
            & (Join-Path $env:SystemRoot 'System32/icacls.exe') $standardUserRoot /inheritance:r /grant:r "*S-1-5-18:(OI)(CI)F" "*S-1-5-32-544:(OI)(CI)F" "*${standardUserSid}:(OI)(CI)F" /T /C
            if ($LASTEXITCODE -ne 0) { throw 'Could not isolate the standard-user lifecycle root.' }

            $lifecycleReport = Join-Path $standardUserRoot 'windows-lifecycle.json'
            $launchInput = Join-Path $standardUserRoot 'windows-standard-user-input.json'
            $launchStatus = Join-Path $standardUserRoot 'windows-standard-user-status.json'
            $launchStdout = Join-Path $standardUserRoot 'windows-standard-user-stdout.log'
            $launchStderr = Join-Path $standardUserRoot 'windows-standard-user-stderr.log'
            $launchDriver = Join-Path $driverRoot 'scripts/windows-standard-user-lifecycle.ps1'
            $launchBootstrap = Join-Path $driverRoot 'scripts/windows-standard-user-bootstrap.ps1'
            $launchDiagnostic = Join-Path $standardUserRoot 'windows-standard-user-diagnostic.json'
            $launchNonce = [guid]::NewGuid().ToString('N')
            $launchContract = [ordered]@{
              schema_version = 1
              nonce = $launchNonce
              expected_sid = $standardUserSid
              ephemeral_root = $standardUserRoot
              node_path = (Join-Path $driverRoot 'node.exe')
              working_directory = $driverRoot
              script_path = (Join-Path $driverRoot 'scripts/companion-standalone-unsigned-self-test.mjs')
              arguments = @(
                '--target=windows-x64',
                "--candidate-package=$package",
                "--install-root=$install",
                "--ephemeral-root=$standardUserRoot",
                "--workspace=$(Join-Path $standardUserRoot 'unsigned-lifecycle-windows')",
                "--out=$lifecycleReport"
              )
              environment = [ordered]@{
                SystemRoot = $env:SystemRoot
                WINDIR = $env:SystemRoot
                COMSPEC = (Join-Path $env:SystemRoot 'System32/cmd.exe')
                SystemDrive = $env:SystemDrive
                PATHEXT = '.COM;.EXE;.BAT;.CMD'
                PATH = "$driverRoot;$(Join-Path $env:SystemRoot 'System32');$env:SystemRoot"
                TEMP = $standardUserRoot
                TMP = $standardUserRoot
                USERPROFILE = $standardUserRoot
                LOCALAPPDATA = $standardUserRoot
                APPDATA = $standardUserRoot
              }
              stdout_path = $launchStdout
              stderr_path = $launchStderr
              status_path = $launchStatus
              lifecycle_report_path = $lifecycleReport
              timeout_ms = 300000
            }
            $launchContract | ConvertTo-Json -Depth 5 | Set-Content -LiteralPath $launchInput -Encoding utf8NoBOM

            $credentialStartInfo = [System.Diagnostics.ProcessStartInfo]::new()
            $credentialStartInfo.FileName = (Get-Command pwsh).Source
            $credentialStartInfo.WorkingDirectory = $driverRoot
            $credentialStartInfo.UseShellExecute = $false
            $credentialStartInfo.CreateNoWindow = $true
            $credentialStartInfo.RedirectStandardInput = $true
            $credentialStartInfo.RedirectStandardOutput = $true
            $credentialStartInfo.RedirectStandardError = $true
            $credentialStartInfo.UserName = $userName
            $credentialStartInfo.Domain = $env:COMPUTERNAME
            $credentialStartInfo.Password = $securePassword
            $credentialStartInfo.LoadUserProfile = $false
            $credentialStartInfo.UseCredentialsForNetworkingOnly = $false
            $credentialStartInfo.Environment.Clear()
            foreach ($environmentName in $launchContract.environment.Keys) {
              $credentialStartInfo.Environment[$environmentName] = $launchContract.environment[$environmentName]
            }
            $launchArguments = @(
              '-NoLogo',
              '-NoProfile',
              '-NonInteractive',
              '-ExecutionPolicy',
              'Bypass',
              '-File',
              $launchBootstrap,
              '-Root',
              $standardUserRoot,
              '-Driver',
              $launchDriver,
              '-InputFile',
              $launchInput,
              '-DiagnosticFile',
              $launchDiagnostic
            )
            $launchCommandLengthBound = $credentialStartInfo.FileName.Length + 1
            foreach ($launchArgument in $launchArguments) {
              $launchCommandLengthBound += $launchArgument.Length + 3
            }
            if ($launchCommandLengthBound -gt 900) {
              throw 'Credentialed standard-user launch exceeded its conservative command-line bound.'
            }
            foreach ($launchArgument in $launchArguments) {
              $credentialStartInfo.ArgumentList.Add($launchArgument)
            }
            $credentialProcess = [System.Diagnostics.Process]::Start($credentialStartInfo)
            if ($null -eq $credentialProcess) {
              throw 'Credentialed standard-user lifecycle process did not start.'
            }
            $credentialProcess.StandardInput.Close()
            $credentialStartInfo.Password = $null
            $securePassword.Dispose()
            $securePassword = $null
            $bootstrapStdoutTask = $credentialProcess.StandardOutput.ReadToEndAsync()
            $bootstrapStderrTask = $credentialProcess.StandardError.ReadToEndAsync()
            $credentialTimedOut = -not $credentialProcess.WaitForExit(420000)
            if ($credentialTimedOut) {
              $credentialProcess.Kill($true)
              if (-not $credentialProcess.WaitForExit(15000)) {
                throw 'Credentialed standard-user lifecycle timed out and tracked shutdown could not be confirmed.'
              }
            }
            $bootstrapOutputTasks = [System.Threading.Tasks.Task[]] @(
              $bootstrapStdoutTask,
              $bootstrapStderrTask
            )
            if (-not [System.Threading.Tasks.Task]::WaitAll($bootstrapOutputTasks, 15000)) {
              throw 'Credentialed standard-user lifecycle output drain exceeded its bound.'
            }
            $bootstrapStdout = $bootstrapStdoutTask.GetAwaiter().GetResult()
            $bootstrapStderr = $bootstrapStderrTask.GetAwaiter().GetResult()
            $credentialExitCode = $credentialProcess.ExitCode
            if ($credentialTimedOut) {
              throw 'Credentialed standard-user lifecycle timed out.'
            }
            if ($credentialExitCode -ne 0) {
              Write-SanitizedDiagnostic -Label 'bootstrap stdout' -Value $bootstrapStdout -SensitiveRoot $standardUserRoot
              Write-SanitizedDiagnostic -Label 'bootstrap stderr' -Value $bootstrapStderr -SensitiveRoot $standardUserRoot
              foreach ($failedTaskLog in @(
                @{ Label = 'child stdout'; Path = $launchStdout },
                @{ Label = 'child stderr'; Path = $launchStderr }
              )) {
                if (-not (Test-Path -LiteralPath $failedTaskLog.Path -PathType Leaf)) {
                  Write-Output "standard-user $($failedTaskLog.Label): absent"
                  continue
                }
                $failedTaskLogFile = Get-Item -LiteralPath $failedTaskLog.Path
                if ($failedTaskLogFile.Length -gt 65536) {
                  throw "Standard-user Windows lifecycle $($failedTaskLog.Label) exceeded its bound."
                }
                $failedTaskLogText = [string] (Get-Content -Raw -LiteralPath $failedTaskLog.Path)
                Write-SanitizedDiagnostic -Label $failedTaskLog.Label -Value $failedTaskLogText -SensitiveRoot $standardUserRoot
              }
              if (Test-Path -LiteralPath $launchStatus -PathType Leaf) {
                $failedTaskStatusFile = Get-Item -LiteralPath $launchStatus
                if ($failedTaskStatusFile.Length -gt 4096) {
                  throw 'Standard-user Windows lifecycle status exceeded its failure-diagnostic bound.'
                }
                $failedTaskStatus = Get-Content -Raw -LiteralPath $launchStatus | ConvertFrom-Json
                $failedTaskStatusProperties = @($failedTaskStatus.PSObject.Properties.Name | Sort-Object)
                $expectedFailedTaskStatusProperties = @(
                  'exit_code',
                  'is_admin',
                  'nonce',
                  'schema_version',
                  'sid',
                  'stderr_bytes',
                  'stdout_bytes'
                )
                if (Compare-Object -ReferenceObject $expectedFailedTaskStatusProperties -DifferenceObject $failedTaskStatusProperties) {
                  throw 'Standard-user Windows lifecycle failure status had an unexpected shape.'
                }
                if (($failedTaskStatus.schema_version -ne 1) -or
                    ($failedTaskStatus.nonce -ne $launchNonce) -or
                    ($failedTaskStatus.sid -ne $standardUserSid) -or
                    ($failedTaskStatus.is_admin -ne $false) -or
                    (($failedTaskStatus.exit_code -isnot [int]) -and ($failedTaskStatus.exit_code -isnot [long])) -or
                    (($failedTaskStatus.stdout_bytes -isnot [int]) -and ($failedTaskStatus.stdout_bytes -isnot [long])) -or
                    (($failedTaskStatus.stderr_bytes -isnot [int]) -and ($failedTaskStatus.stderr_bytes -isnot [long])) -or
                    ($failedTaskStatus.stdout_bytes -lt 0) -or
                    ($failedTaskStatus.stdout_bytes -gt 65536) -or
                    ($failedTaskStatus.stderr_bytes -lt 0) -or
                    ($failedTaskStatus.stderr_bytes -gt 65536)) {
                  throw 'Standard-user Windows lifecycle failure status was invalid.'
                }
                Write-Output (
                  "standard-user status: exit_code=$($failedTaskStatus.exit_code), " +
                  "stdout_bytes=$($failedTaskStatus.stdout_bytes), " +
                  "stderr_bytes=$($failedTaskStatus.stderr_bytes), " +
                  "report_present=$(Test-Path -LiteralPath $lifecycleReport -PathType Leaf)"
                )
              } else {
                Write-Output 'standard-user status: absent'
              }
              if (Test-Path -LiteralPath $launchDiagnostic -PathType Leaf) {
                $diagnosticFile = Get-Item -LiteralPath $launchDiagnostic
                if ($diagnosticFile.Length -gt 4096) {
                  throw 'Standard-user Windows lifecycle diagnostic exceeded its bound.'
                }
                $diagnostic = Get-Content -Raw -LiteralPath $launchDiagnostic | ConvertFrom-Json
                $diagnosticProperties = @($diagnostic.PSObject.Properties.Name | Sort-Object)
                if (Compare-Object -ReferenceObject @('message', 'schema_version', 'stage') -DifferenceObject $diagnosticProperties) {
                  throw 'Standard-user Windows lifecycle diagnostic had an unexpected shape.'
                }
                if (($diagnostic.schema_version -ne 1) -or
                    ($diagnostic.stage -ne 'driver') -or
                    ($diagnostic.message -isnot [string]) -or
                    ($diagnostic.message.Length -gt 1024)) {
                  throw 'Standard-user Windows lifecycle diagnostic was invalid.'
                }
                $diagnosticMessage = [regex]::Replace(
                  $diagnostic.message,
                  '[\u0000-\u001F\u007F]+',
                  ' '
                ).Trim()
                Write-Output "standard-user diagnostic: $diagnosticMessage"
              }
              throw "Credentialed standard-user Windows lifecycle failed with result $credentialExitCode."
            }
            if (-not [string]::IsNullOrWhiteSpace($bootstrapStdout) -or
                -not [string]::IsNullOrWhiteSpace($bootstrapStderr)) {
              Write-SanitizedDiagnostic -Label 'bootstrap stdout' -Value $bootstrapStdout -SensitiveRoot $standardUserRoot
              Write-SanitizedDiagnostic -Label 'bootstrap stderr' -Value $bootstrapStderr -SensitiveRoot $standardUserRoot
              throw 'Successful standard-user bootstrap emitted unexpected output.'
            }
            if (Test-Path -LiteralPath $launchDiagnostic) {
              throw 'Successful standard-user Windows lifecycle left a failure diagnostic.'
            }
            if (-not (Test-Path -LiteralPath $launchStatus -PathType Leaf)) {
              throw 'Standard-user Windows lifecycle did not create its bounded status.'
            }
            $statusFile = Get-Item -LiteralPath $launchStatus
            if ($statusFile.Length -gt 4096) {
              throw 'Standard-user Windows lifecycle status exceeded its bound.'
            }
            $status = Get-Content -Raw -LiteralPath $launchStatus | ConvertFrom-Json
            $statusProperties = @($status.PSObject.Properties.Name | Sort-Object)
            $expectedStatusProperties = @(
              'exit_code',
              'is_admin',
              'nonce',
              'schema_version',
              'sid',
              'stderr_bytes',
              'stdout_bytes'
            )
            if (Compare-Object -ReferenceObject $expectedStatusProperties -DifferenceObject $statusProperties) {
              throw 'Standard-user Windows lifecycle status had an unexpected shape.'
            }
            if (($status.schema_version -ne 1) -or
                ($status.nonce -ne $launchNonce) -or
                ($status.sid -ne $standardUserSid) -or
                ($status.is_admin -ne $false) -or
                ($status.exit_code -ne 0) -or
                (($status.stdout_bytes -isnot [int]) -and ($status.stdout_bytes -isnot [long])) -or
                (($status.stderr_bytes -isnot [int]) -and ($status.stderr_bytes -isnot [long])) -or
                ($status.stdout_bytes -lt 0) -or
                ($status.stdout_bytes -gt 65536) -or
                ($status.stderr_bytes -lt 0) -or
                ($status.stderr_bytes -gt 65536)) {
              throw 'Standard-user Windows lifecycle status did not match its identity contract.'
            }
            foreach ($boundedLog in @(
              @{ Path = $launchStdout; Bytes = $status.stdout_bytes },
              @{ Path = $launchStderr; Bytes = $status.stderr_bytes }
            )) {
              $logFile = Get-Item -LiteralPath $boundedLog.Path
              if ($logFile.Length -gt 65536 -or $logFile.Length -ne $boundedLog.Bytes) {
                throw 'Standard-user Windows lifecycle log exceeded its bounded contract.'
              }
            }
            if (-not (Test-Path -LiteralPath $lifecycleReport -PathType Leaf)) {
              throw 'Standard-user Windows lifecycle did not create its bounded report.'
            }
            $postLaunchProfiles = @(
              Get-CimInstance Win32_UserProfile -Filter "SID='$standardUserSid'" -ErrorAction Stop
            )
            if ($postLaunchProfiles.Count -gt 1) {
              throw 'Credentialed standard-user launch created multiple profile records.'
            }
            if (@($postLaunchProfiles | Where-Object Loaded).Count -ne 0 -or
                (Test-Path -LiteralPath "Registry::HKEY_USERS\$standardUserSid") -or
                (Test-Path -LiteralPath "Registry::HKEY_USERS\${standardUserSid}_Classes")) {
              throw 'Credentialed standard-user launch unexpectedly loaded a Windows profile.'
            }
            Copy-Item -LiteralPath $lifecycleReport -Destination (Join-Path $windowsScopeRoot 'windows-lifecycle.json')
          } catch {
            $primaryFailure = $_.Exception.Message
          } finally {
            $passwordText = $null
            if ($null -ne $credentialStartInfo) {
              $credentialStartInfo.Password = $null
            }
            if ($null -ne $credentialProcess) {
              $credentialProcess.Dispose()
              $credentialProcess = $null
            }
            if ($null -ne $securePassword) {
              $securePassword.Dispose()
              $securePassword = $null
            }
          }

          $cleanupFailures = [System.Collections.Generic.List[string]]::new()
          $accountRemovalSafe = $ancestorAclSetupValid
          if ($null -ne $standardUserSid) {
            try {
              $processDeadline = [DateTime]::UtcNow.AddSeconds(30)
              do {
                $processSnapshot = Get-SidProcessSnapshot -Sid $standardUserSid
                foreach ($ownedProcess in @($processSnapshot.Owned)) {
                  Stop-Process -Id $ownedProcess.ProcessId -Force -ErrorAction SilentlyContinue
                }
                $newUnresolvedProcesses = @(
                  Get-NewUnresolvedProcesses `
                    -Snapshot $processSnapshot `
                    -BaselineKeys $baselineUnresolvedProcessKeys
                )
                $pendingProcessChecks = @($processSnapshot.Owned).Count +
                  $newUnresolvedProcesses.Count
                if ($pendingProcessChecks -ne 0) {
                  Start-Sleep -Milliseconds 500
                }
              } while ($pendingProcessChecks -ne 0 -and [DateTime]::UtcNow -lt $processDeadline)
              $processSnapshot = Get-SidProcessSnapshot -Sid $standardUserSid
              $newUnresolvedProcesses = @(
                Get-NewUnresolvedProcesses `
                  -Snapshot $processSnapshot `
                  -BaselineKeys $baselineUnresolvedProcessKeys
              )
              if ($newUnresolvedProcesses.Count -ne 0) {
                throw 'One or more new live process-owner queries remained unresolved after cleanup.'
              }
              if (@($processSnapshot.Owned).Count -ne 0) {
                throw 'A process owned by the temporary assurance SID survived cleanup.'
              }
              $processCleanupConfirmed = $true
            } catch {
              $cleanupFailures.Add("temporary process cleanup: $($_.Exception.Message)")
              $accountRemovalSafe = $false
            }
          }
          if ($null -ne $standardUserSid) {
            try {
              $ancestorAclCleanupFailures = [System.Collections.Generic.List[string]]::new()
              foreach ($traversePath in @($traverseAclRoots | Sort-Object Length -Descending)) {
                try {
                  & (Join-Path $env:SystemRoot 'System32/icacls.exe') $traversePath /remove:g "*$standardUserSid"
                  if ($LASTEXITCODE -ne 0) {
                    throw 'Could not revoke temporary lifecycle-root ancestor traversal.'
                  }
                  $remainingSidRules = @(
                    Get-ExactSidAclRules -Path $traversePath -Sid $standardUserSid
                  )
                  if ($remainingSidRules.Count -ne 0) {
                    throw 'Temporary lifecycle-root ancestor traversal survived ACL cleanup.'
                  }
                } catch {
                  $ancestorAclCleanupFailures.Add("$traversePath`: $($_.Exception.Message)")
                }
              }
              if ($ancestorAclCleanupFailures.Count -ne 0) {
                throw ($ancestorAclCleanupFailures -join ' | ')
              }
              $ancestorAclCleanupConfirmed = $true
            } catch {
              $cleanupFailures.Add("ancestor ACL cleanup: $($_.Exception.Message)")
              $accountRemovalSafe = $false
            }
          }
          if ($null -ne $standardUserSid) {
            try {
              $profiles = @(Get-CimInstance Win32_UserProfile -Filter "SID='$standardUserSid'" -ErrorAction Stop)
              if ($profiles.Count -gt 1) {
                throw 'Temporary assurance SID unexpectedly matched multiple profiles.'
              }
              foreach ($profile in $profiles) {
                if (($profile.SID -ne $standardUserSid) -or $profile.Special) {
                  throw 'Temporary assurance profile identity was invalid or unexpectedly special.'
                }
                $profilePath = [System.IO.Path]::GetFullPath([string] $profile.LocalPath)
                $usersRoot = [System.IO.Path]::GetFullPath((Join-Path $env:SystemDrive 'Users'))
                $usersPrefix = $usersRoot.TrimEnd('\') + '\'
                if (-not $profilePath.StartsWith($usersPrefix, [System.StringComparison]::OrdinalIgnoreCase)) {
                  throw 'Temporary assurance profile escaped the local Users directory.'
                }
                $profileDeadline = [DateTime]::UtcNow.AddSeconds(120)
                while ($profile.Loaded -and [DateTime]::UtcNow -lt $profileDeadline) {
                  Start-Sleep -Milliseconds 500
                  $profileMatches = @(
                    Get-CimInstance Win32_UserProfile -Filter "SID='$standardUserSid'" -ErrorAction Stop
                  )
                  if ($profileMatches.Count -eq 0) {
                    $profile = $null
                    break
                  }
                  if ($profileMatches.Count -ne 1) {
                    throw 'Temporary assurance SID unexpectedly matched multiple profiles.'
                  }
                  $profile = $profileMatches[0]
                  if (($profile.SID -ne $standardUserSid) -or $profile.Special) {
                    throw 'Refreshed temporary assurance profile identity was invalid or unexpectedly special.'
                  }
                  $refreshedProfilePath = [System.IO.Path]::GetFullPath([string] $profile.LocalPath)
                  if (-not $refreshedProfilePath.Equals(
                    $profilePath,
                    [System.StringComparison]::OrdinalIgnoreCase
                  )) {
                    throw 'Temporary assurance profile path changed during cleanup.'
                  }
                }
                if ($null -ne $profile -and $profile.Loaded) {
                  $profileRefCount = if ($null -eq $profile.RefCount) { 'unknown' } else { [string] $profile.RefCount }
                  $profileHivePresent = Test-Path -LiteralPath "Registry::HKEY_USERS\$standardUserSid"
                  $profileClassesHivePresent = Test-Path -LiteralPath "Registry::HKEY_USERS\${standardUserSid}_Classes"
                  throw (
                    "Temporary assurance profile remained loaded after its release deadline " +
                    "(ref_count=$profileRefCount, sid_hive=$profileHivePresent, classes_hive=$profileClassesHivePresent)."
                  )
                }
                if ($null -ne $profile) {
                  if (($profile.SID -ne $standardUserSid) -or $profile.Special) {
                    throw 'Final temporary assurance profile identity was invalid or unexpectedly special.'
                  }
                  $finalProfilePath = [System.IO.Path]::GetFullPath([string] $profile.LocalPath)
                  if (-not $finalProfilePath.Equals(
                    $profilePath,
                    [System.StringComparison]::OrdinalIgnoreCase
                  )) {
                    throw 'Temporary assurance profile path changed before provider cleanup.'
                  }
                  Remove-CimInstance -InputObject $profile -ErrorAction Stop
                }
                $profilePathDeadline = [DateTime]::UtcNow.AddSeconds(60)
                while ((Test-Path -LiteralPath $profilePath) -and [DateTime]::UtcNow -lt $profilePathDeadline) {
                  Start-Sleep -Milliseconds 500
                }
                if (Test-Path -LiteralPath $profilePath) {
                  throw 'Temporary assurance profile path survived provider cleanup.'
                }
              }
              if (Get-CimInstance Win32_UserProfile -Filter "SID='$standardUserSid'" -ErrorAction Stop) {
                throw 'Temporary assurance profile registration survived cleanup.'
              }
              if ((Test-Path -LiteralPath "Registry::HKEY_USERS\$standardUserSid") -or
                  (Test-Path -LiteralPath "Registry::HKEY_USERS\${standardUserSid}_Classes")) {
                throw 'Temporary assurance profile hive survived cleanup.'
              }
              $profileCleanupConfirmed = $true
            } catch {
              $cleanupFailures.Add("profile cleanup: $($_.Exception.Message)")
              $accountRemovalSafe = $false
            }
          }
          if ($userCreated) {
            if (-not $accountRemovalSafe) {
              $cleanupFailures.Add('account cleanup: skipped because exact-SID process or profile cleanup was not confirmed')
            } else {
              try {
                Remove-LocalUser -Name $userName -ErrorAction Stop
                $processCleanupConfirmed = $false
                $profileCleanupConfirmed = $false
                $finalProcessDeadline = [DateTime]::UtcNow.AddSeconds(30)
                do {
                  $finalProcessSnapshot = Get-SidProcessSnapshot -Sid $standardUserSid
                  foreach ($ownedProcess in @($finalProcessSnapshot.Owned)) {
                    Stop-Process -Id $ownedProcess.ProcessId -Force -ErrorAction SilentlyContinue
                  }
                  $newFinalUnresolvedProcesses = @(
                    Get-NewUnresolvedProcesses `
                      -Snapshot $finalProcessSnapshot `
                      -BaselineKeys $baselineUnresolvedProcessKeys
                  )
                  $pendingFinalProcessChecks = @($finalProcessSnapshot.Owned).Count +
                    $newFinalUnresolvedProcesses.Count
                  if ($pendingFinalProcessChecks -ne 0) {
                    Start-Sleep -Milliseconds 500
                  }
                } while (
                  $pendingFinalProcessChecks -ne 0 -and
                  [DateTime]::UtcNow -lt $finalProcessDeadline
                )
                $finalProcessSnapshot = Get-SidProcessSnapshot -Sid $standardUserSid
                $newFinalUnresolvedProcesses = @(
                  Get-NewUnresolvedProcesses `
                    -Snapshot $finalProcessSnapshot `
                    -BaselineKeys $baselineUnresolvedProcessKeys
                )
                if ($newFinalUnresolvedProcesses.Count -ne 0) {
                  throw 'A final new live process-owner query remained unresolved after account deletion.'
                }
                if (@($finalProcessSnapshot.Owned).Count -ne 0) {
                  throw 'A process owned by the deleted temporary assurance SID survived final cleanup.'
                }
                $processCleanupConfirmed = $true

                if (@(
                  Get-CimInstance Win32_UserProfile -Filter "SID='$standardUserSid'" -ErrorAction Stop
                ).Count -ne 0 -or
                    (Test-Path -LiteralPath "Registry::HKEY_USERS\$standardUserSid") -or
                    (Test-Path -LiteralPath "Registry::HKEY_USERS\${standardUserSid}_Classes")) {
                  throw 'Temporary assurance profile state reappeared before cleanup confirmation.'
                }
                $profileCleanupConfirmed = $true

                $remainingAccounts = @(
                  Get-LocalUser -ErrorAction Stop |
                    Where-Object {
                      $_.Name -eq $userName -or $_.SID.Value -eq $standardUserSid
                    }
                )
                if ($remainingAccounts.Count -ne 0) {
                  throw 'The isolated assurance account survived cleanup.'
                }
                $accountCleanupConfirmed = $true
              } catch {
                $cleanupFailures.Add("account cleanup: $($_.Exception.Message)")
              }
            }
          }
          if ($processCleanupConfirmed -and $ancestorAclCleanupConfirmed -and
              $profileCleanupConfirmed -and $accountCleanupConfirmed) {
            try {
              $confirmation = [ordered]@{
                schema_version = 1
                expected_commit = $env:EXPECTED_COMMIT
                standard_user_sid = $standardUserSid
                process_cleanup_confirmed = $true
                ancestor_acl_cleanup_confirmed = $true
                profile_cleanup_confirmed = $true
                account_cleanup_confirmed = $true
              }
              $temporaryConfirmation = "$cleanupConfirmation.$PID.tmp"
              if ((Test-Path -LiteralPath $cleanupConfirmation) -or
                  (Test-Path -LiteralPath $temporaryConfirmation)) {
                throw 'Lifecycle cleanup confirmation path already exists.'
              }
              [System.IO.File]::WriteAllText(
                $temporaryConfirmation,
                ($confirmation | ConvertTo-Json -Compress),
                [System.Text.UTF8Encoding]::new($false)
              )
              [System.IO.File]::Move($temporaryConfirmation, $cleanupConfirmation)
            } catch {
              $cleanupFailures.Add("cleanup confirmation: $($_.Exception.Message)")
            }
          }
          if ($null -ne $primaryFailure -or $cleanupFailures.Count -ne 0) {
            $failureMessages = @()
            if ($null -ne $primaryFailure) { $failureMessages += "execution: $primaryFailure" }
            if ($cleanupFailures.Count -ne 0) { $failureMessages += $cleanupFailures }
            throw ($failureMessages -join ' | ')
          }
          node scripts/standalone-unsigned-assurance.mjs --operation=platform-observations --target=windows-x64 --checks=host_target_verified,publisher_signature_absent,defender_scan_command_completed "--out=$(Join-Path $windowsScopeRoot 'windows-platform.json')"
      - name: Delete every workflow-owned unsigned Windows candidate path before recording evidence
        if: always()
        run: |
          $PSNativeCommandUseErrorActionPreference = $true
          $windowsScopeRoot = [System.IO.Path]::GetFullPath($env:WINDOWS_ASSURANCE_ROOT)
          $expectedScopeRoot = [System.IO.Path]::GetFullPath(
            (Join-Path $env:PUBLIC 'DuskStudioUnsignedAssurance')
          )
          if (-not $windowsScopeRoot.Equals(
            $expectedScopeRoot,
            [System.StringComparison]::OrdinalIgnoreCase
          )) {
            throw 'Windows cleanup scope is not the exact reviewed public-root path.'
          }
          $scopeItem = Get-Item -Force -LiteralPath $windowsScopeRoot
          if (-not $scopeItem.PSIsContainer -or
              ($scopeItem.Attributes -band [System.IO.FileAttributes]::ReparsePoint)) {
            throw 'Windows cleanup scope must be a regular directory.'
          }
          $paths = [ordered]@{
            standard_user_root = (Join-Path $windowsScopeRoot 'unsigned-windows-standard-user')
            runtime_archive = (Join-Path $windowsScopeRoot 'node-v24.18.0-win-x64.zip')
            bundle_1 = (Join-Path $windowsScopeRoot 'unsigned-windows-bundle-1')
            bundle_2 = (Join-Path $windowsScopeRoot 'unsigned-windows-bundle-2')
            release_1 = (Join-Path $windowsScopeRoot 'unsigned-windows-release-1')
            release_2 = (Join-Path $windowsScopeRoot 'unsigned-windows-release-2')
            sea_1 = (Join-Path $windowsScopeRoot 'unsigned-windows-sea-1')
            sea_2 = (Join-Path $windowsScopeRoot 'unsigned-windows-sea-2')
            package_stage = (Join-Path $windowsScopeRoot 'unsigned-windows-standard-user/package-stage')
            install_root = (Join-Path $windowsScopeRoot 'unsigned-windows-standard-user/installed-unsigned-windows')
            lifecycle_workspace = (Join-Path $windowsScopeRoot 'unsigned-windows-standard-user/unsigned-lifecycle-windows')
            candidate_zip = (Join-Path $windowsScopeRoot 'unsigned-windows-standard-user/unsigned-windows-engineering.zip')
          }
          $controlRoot = Join-Path $windowsScopeRoot 'control'
          $cleanupConfirmation = Join-Path $controlRoot 'shutdown-confirmed.json'
          $cleanupConfirmed = $false
          if (Test-Path -LiteralPath $cleanupConfirmation -PathType Leaf) {
            $confirmationFile = Get-Item -LiteralPath $cleanupConfirmation
            if ($confirmationFile.Length -gt 4096) {
              throw 'Lifecycle cleanup confirmation exceeded its size bound.'
            }
            $confirmation = Get-Content -Raw -LiteralPath $cleanupConfirmation | ConvertFrom-Json
            $actualProperties = @($confirmation.PSObject.Properties.Name | Sort-Object)
            $expectedProperties = @(
              'account_cleanup_confirmed',
              'ancestor_acl_cleanup_confirmed',
              'expected_commit',
              'process_cleanup_confirmed',
              'profile_cleanup_confirmed',
              'schema_version',
              'standard_user_sid'
            )
            if (Compare-Object -ReferenceObject $expectedProperties -DifferenceObject $actualProperties) {
              throw 'Lifecycle cleanup confirmation has an unexpected shape.'
            }
            if ($confirmation.schema_version -ne 1 -or
                $confirmation.expected_commit -ne $env:EXPECTED_COMMIT -or
                $confirmation.standard_user_sid -notmatch '^S-1-5-21-(?:[0-9]+-){3}[0-9]+$' -or
                $confirmation.process_cleanup_confirmed -ne $true -or
                $confirmation.ancestor_acl_cleanup_confirmed -ne $true -or
                $confirmation.profile_cleanup_confirmed -ne $true -or
                $confirmation.account_cleanup_confirmed -ne $true) {
              throw 'Lifecycle cleanup confirmation is invalid.'
            }
            $cleanupConfirmed = $true
          }
          foreach ($externalKey in @('runtime_archive', 'bundle_1', 'bundle_2', 'release_1', 'release_2', 'sea_1', 'sea_2')) {
            if (Test-Path -LiteralPath $paths[$externalKey]) {
              Remove-Item -LiteralPath $paths[$externalKey] -Recurse -Force -ErrorAction Stop
            }
          }
          if (-not $cleanupConfirmed) {
            if (Test-Path -LiteralPath $controlRoot) {
              Remove-Item -LiteralPath $controlRoot -Recurse -Force -ErrorAction SilentlyContinue
            }
            throw 'Standard-user shutdown and exact-SID cleanup were not confirmed; preserving its entire writable root for ephemeral-runner disposal.'
          }
          if (Test-Path -LiteralPath $paths.standard_user_root) {
            Remove-Item -LiteralPath $paths.standard_user_root -Recurse -Force -ErrorAction Stop
          }
          if (Test-Path -LiteralPath $controlRoot) {
            Remove-Item -LiteralPath $controlRoot -Recurse -Force -ErrorAction Stop
          }
          $records = $paths.GetEnumerator() | ForEach-Object { "$($_.Key)=$($_.Value)" }
          node scripts/standalone-unsigned-assurance.mjs --operation=cleanup --target=windows-x64 "--scope-root=$windowsScopeRoot" "--paths=$($records -join '|')" "--out=$(Join-Path $windowsScopeRoot 'windows-cleanup.json')"
          node scripts/standalone-unsigned-assurance.mjs --operation=target-evidence --target=windows-x64 "--lifecycle-report=$(Join-Path $windowsScopeRoot 'windows-lifecycle.json')" "--reproducibility-report=$(Join-Path $windowsScopeRoot 'windows-reproducibility.json')" "--platform-observations=$(Join-Path $windowsScopeRoot 'windows-platform.json')" "--cleanup-receipt=$(Join-Path $windowsScopeRoot 'windows-cleanup.json')" "--repository=$env:GITHUB_REPOSITORY" "--workflow-ref=$env:GITHUB_WORKFLOW_REF" "--run-id=$env:GITHUB_RUN_ID" "--run-attempt=$env:GITHUB_RUN_ATTEMPT" "--run-actor=github:$env:GITHUB_ACTOR" "--expected-commit=$env:EXPECTED_COMMIT" "--checks=$env:UNSIGNED_ASSURANCE_CHECKS" "--out=$(Join-Path $windowsScopeRoot 'windows-x64.json')"
          Remove-Item -LiteralPath $windowsScopeRoot -Recurse -Force -ErrorAction Stop
  linux:
    name: Unsigned engineering lifecycle (linux-x64)
    needs: preflight
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    defaults:
      run:
        shell: bash
        working-directory: .
    steps:
      - name: Check out the exact reviewed source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 1
          persist-credentials: "false"
          ref: ${{ env.EXPECTED_COMMIT }}
      - name: Prove native target and immutable checkout
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "$EXPECTED_COMMIT"
          test "$(uname -s)" = Linux
          test "$(uname -m)" = x86_64
          test -z "$(git status --short)"
      - name: Use the frozen Node.js line
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24.18.0
          package-manager-cache: "false"
      - name: Restore the exact dependency graph
        run: |
          set -euo pipefail
          corepack enable
          corepack install --global pnpm@$PNPM_VERSION
          pnpm install --frozen-lockfile
          node scripts/standalone-unsigned-assurance.mjs --operation=policy
      - name: Build two unsigned reproducibility attempts
        env:
          DUSK_STUDIO_ARTIFACT_CHANNEL: portable
          DUSK_STUDIO_RELEASE_COMMIT: ${{ env.EXPECTED_COMMIT }}
        run: |
          set -euo pipefail
          version="$(node -p "JSON.parse(require('fs').readFileSync('package.json')).version")"
          epoch="$(git show -s --format=%ct "$EXPECTED_COMMIT")"
          runtime="$RUNNER_TEMP/node-v24.18.0-linux-x64.tar.xz"
          curl --fail --silent --show-error --location --output "$runtime" https://nodejs.org/dist/v24.18.0/node-v24.18.0-linux-x64.tar.xz
          pnpm --filter @dusk/studio build
          for attempt in 1 2; do
            bundle="$RUNNER_TEMP/unsigned-linux-bundle-$attempt"
            release="$RUNNER_TEMP/unsigned-linux-release-$attempt"
            sea="$RUNNER_TEMP/unsigned-linux-sea-$attempt"
            node scripts/companion-bundle.mjs --out="$bundle"
            node scripts/companion-build.mjs --target=linux-x64 --out="$release" --launcher-bundle="$bundle" --runtime-archive="$runtime" --commit="$EXPECTED_COMMIT" --version="$version" --source-date-epoch="$epoch"
            node scripts/companion-verify.mjs --release="$release"
            node scripts/companion-sea-prototype.mjs --release="$release" --target=linux-x64 --out="$sea"
          done
          node scripts/standalone-unsigned-assurance.mjs --operation=reproducibility --target=linux-x64 --first-receipt="$RUNNER_TEMP/unsigned-linux-sea-1/prototype-receipt.json" --second-receipt="$RUNNER_TEMP/unsigned-linux-sea-2/prototype-receipt.json" --out="$RUNNER_TEMP/linux-reproducibility.json"
      - name: Package, extract, inspect, and exercise both Linux launchers
        run: |
          set -euo pipefail
          sea="$RUNNER_TEMP/unsigned-linux-sea-1"
          receipt_source="$sea/prototype-receipt.json"
          stage="$RUNNER_TEMP/unsigned-linux-stage"
          mkdir -p "$stage/launchers" "$stage/evidence"
          safe_name="$(node -p "JSON.parse(require('fs').readFileSync('$receipt_source')).launchers.safe.name")"
          actions_name="$(node -p "JSON.parse(require('fs').readFileSync('$receipt_source')).launchers.local_actions.name")"
          cp "$sea/$safe_name" "$sea/$actions_name" "$stage/launchers/"
          cp "$receipt_source" "$stage/evidence/prototype-receipt.json"
          node scripts/standalone-unsigned-assurance.mjs --operation=index --target=linux-x64 --safe-launcher="$sea/$safe_name" --local-actions-launcher="$sea/$actions_name" --safe-name="launchers/$safe_name" --local-actions-name="launchers/$actions_name" --build-receipt="$stage/evidence/prototype-receipt.json" --out="$stage/unsigned-launcher-index.json"
          node scripts/standalone-unsigned-assurance.mjs --operation=manifest --root="$stage" --target=linux-x64 --build-receipt="$stage/evidence/prototype-receipt.json" --launcher-index="$stage/unsigned-launcher-index.json" --out="$stage/unsigned-candidate-manifest.json"
          package="$RUNNER_TEMP/unsigned-linux-engineering.zip"
          node scripts/standalone-safe-zip-extract.mjs --create --root="$stage" --target=linux-x64 --ephemeral-root="$RUNNER_TEMP" --out="$package" --profile=unsigned-engineering
          install="$RUNNER_TEMP/installed-unsigned-linux"
          node scripts/standalone-safe-zip-extract.mjs --archive="$package" --target=linux-x64 --ephemeral-root="$RUNNER_TEMP" --out="$install" --profile=unsigned-engineering
          safe="$install/launchers/$safe_name"
          actions="$install/launchers/$actions_name"
          for candidate in "$safe" "$actions"; do
            test -x "$candidate"
            file "$candidate" | grep -Eq 'ELF 64-bit LSB (pie )?executable, x86-64'
            readelf -h "$candidate" | grep -Eq 'Machine:[[:space:]]+Advanced Micro Devices X86-64'
            stack_flags="$(readelf -W -l "$candidate" | awk '$1 == "GNU_STACK" {print $7}')"
            test -n "$stack_flags"
            case "$stack_flags" in *E*) echo 'Executable GNU_STACK is forbidden.' >&2; exit 1 ;; esac
            mode="$(stat -c '%a' "$candidate")"
            test $((8#$mode & 06000)) -eq 0
          done
          if find "$install" -type f \( -iname '*.sig' -o -iname '*.pem' -o -iname '*.crt' -o -iname '*.cert' -o -iname '*.p7s' -o -iname '*.minisig' -o -iname '*.bundle' \) -print -quit | grep -q .; then
            echo 'Unsigned engineering package unexpectedly contains a detached trust artifact.' >&2
            exit 1
          fi
          before_elevated_probe="$(find /tmp -maxdepth 1 -type d -name 'dusk-studio-sea-*' -print | LC_ALL=C sort)"
          set +e
          elevated_output="$(sudo -n -- /usr/bin/env TMPDIR=/tmp TEMP=/tmp TMP=/tmp "$safe" --signed-rc-self-test 2>&1)"
          elevated_status=$?
          set -e
          test "$elevated_status" -ne 0
          printf '%s\n' "$elevated_output" | grep -F 'Dusk Developer Studio refuses elevated or root execution.'
          after_elevated_probe="$(find /tmp -maxdepth 1 -type d -name 'dusk-studio-sea-*' -print | LC_ALL=C sort)"
          test "$before_elevated_probe" = "$after_elevated_probe"
          node scripts/companion-standalone-unsigned-self-test.mjs --target=linux-x64 --candidate-package="$package" --install-root="$install" --ephemeral-root="$RUNNER_TEMP" --workspace="$RUNNER_TEMP/unsigned-lifecycle-linux" --out="$RUNNER_TEMP/linux-lifecycle.json"
          node scripts/standalone-unsigned-assurance.mjs --operation=platform-observations --target=linux-x64 --checks=host_target_verified,detached_trust_artifacts_absent,elf_x64_verified,nx_stack_verified,special_mode_absent --out="$RUNNER_TEMP/linux-platform.json"
      - name: Delete every workflow-owned unsigned Linux candidate path before recording evidence
        if: always()
        run: |
          set -euo pipefail
          cleanup_records=(
            "runtime_archive=$RUNNER_TEMP/node-v24.18.0-linux-x64.tar.xz"
            "bundle_1=$RUNNER_TEMP/unsigned-linux-bundle-1"
            "bundle_2=$RUNNER_TEMP/unsigned-linux-bundle-2"
            "release_1=$RUNNER_TEMP/unsigned-linux-release-1"
            "release_2=$RUNNER_TEMP/unsigned-linux-release-2"
            "sea_1=$RUNNER_TEMP/unsigned-linux-sea-1"
            "sea_2=$RUNNER_TEMP/unsigned-linux-sea-2"
            "package_stage=$RUNNER_TEMP/unsigned-linux-stage"
            "install_root=$RUNNER_TEMP/installed-unsigned-linux"
            "lifecycle_workspace=$RUNNER_TEMP/unsigned-lifecycle-linux"
            "candidate_zip=$RUNNER_TEMP/unsigned-linux-engineering.zip"
          )
          for record in "${cleanup_records[@]}"; do
            case "${record%%=*}" in
              install_root|lifecycle_workspace) ;;
              *) rm -rf -- "${record#*=}" ;;
            esac
          done
          joined="$(IFS='|'; echo "${cleanup_records[*]}")"
          node scripts/standalone-unsigned-assurance.mjs --operation=cleanup --target=linux-x64 --scope-root="$RUNNER_TEMP" --paths="$joined" --out="$RUNNER_TEMP/linux-cleanup.json"
          node scripts/standalone-unsigned-assurance.mjs --operation=target-evidence --target=linux-x64 --lifecycle-report="$RUNNER_TEMP/linux-lifecycle.json" --reproducibility-report="$RUNNER_TEMP/linux-reproducibility.json" --platform-observations="$RUNNER_TEMP/linux-platform.json" --cleanup-receipt="$RUNNER_TEMP/linux-cleanup.json" --repository="$GITHUB_REPOSITORY" --workflow-ref="$GITHUB_WORKFLOW_REF" --run-id="$GITHUB_RUN_ID" --run-attempt="$GITHUB_RUN_ATTEMPT" --run-actor="github:$GITHUB_ACTOR" --expected-commit="$EXPECTED_COMMIT" --checks="$UNSIGNED_ASSURANCE_CHECKS" --out="$RUNNER_TEMP/linux-x64.json"
  macos:
    name: Unsigned engineering lifecycle (darwin-arm64)
    needs: preflight
    runs-on: macos-15
    timeout-minutes: 50
    defaults:
      run:
        shell: bash
        working-directory: .
    steps:
      - name: Check out the exact reviewed source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 1
          persist-credentials: "false"
          ref: ${{ env.EXPECTED_COMMIT }}
      - name: Prove native target and immutable checkout
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "$EXPECTED_COMMIT"
          test "$(uname -s)" = Darwin
          test "$(uname -m)" = arm64
          test -z "$(git status --short)"
      - name: Use the frozen Node.js line
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24.18.0
          package-manager-cache: "false"
      - name: Restore the exact dependency graph
        run: |
          set -euo pipefail
          test "$(node -p 'process.arch')" = arm64
          corepack enable
          corepack install --global pnpm@$PNPM_VERSION
          pnpm install --frozen-lockfile
          node scripts/standalone-unsigned-assurance.mjs --operation=policy
      - name: Build two unsigned reproducibility attempts
        env:
          DUSK_STUDIO_ARTIFACT_CHANNEL: portable
          DUSK_STUDIO_RELEASE_COMMIT: ${{ env.EXPECTED_COMMIT }}
        run: |
          set -euo pipefail
          version="$(node -p "JSON.parse(require('fs').readFileSync('package.json')).version")"
          epoch="$(git show -s --format=%ct "$EXPECTED_COMMIT")"
          runtime="$RUNNER_TEMP/node-v24.18.0-darwin-arm64.tar.xz"
          curl --fail --silent --show-error --location --output "$runtime" https://nodejs.org/dist/v24.18.0/node-v24.18.0-darwin-arm64.tar.xz
          pnpm --filter @dusk/studio build
          for attempt in 1 2; do
            bundle="$RUNNER_TEMP/unsigned-macos-bundle-$attempt"
            release="$RUNNER_TEMP/unsigned-macos-release-$attempt"
            sea="$RUNNER_TEMP/unsigned-macos-sea-$attempt"
            node scripts/companion-bundle.mjs --out="$bundle"
            node scripts/companion-build.mjs --target=darwin-arm64 --out="$release" --launcher-bundle="$bundle" --runtime-archive="$runtime" --commit="$EXPECTED_COMMIT" --version="$version" --source-date-epoch="$epoch"
            node scripts/companion-verify.mjs --release="$release"
            node scripts/companion-sea-prototype.mjs --release="$release" --target=darwin-arm64 --out="$sea"
          done
          node scripts/standalone-unsigned-assurance.mjs --operation=reproducibility --target=darwin-arm64 --first-receipt="$RUNNER_TEMP/unsigned-macos-sea-1/prototype-receipt.json" --second-receipt="$RUNNER_TEMP/unsigned-macos-sea-2/prototype-receipt.json" --out="$RUNNER_TEMP/macos-reproducibility.json"
      - name: Package, extract, inspect, and exercise both macOS launchers
        run: |
          set -euo pipefail
          sea="$RUNNER_TEMP/unsigned-macos-sea-1"
          receipt_source="$sea/prototype-receipt.json"
          safe_name="$(node -p "JSON.parse(require('fs').readFileSync('$receipt_source')).launchers.safe.name")"
          actions_name="$(node -p "JSON.parse(require('fs').readFileSync('$receipt_source')).launchers.local_actions.name")"
          app_root="$RUNNER_TEMP/unsigned-macos-apps"
          node scripts/standalone-macos-app.mjs --safe-executable="$sea/$safe_name" --local-actions-executable="$sea/$actions_name" --build-receipt="$receipt_source" --out="$app_root"
          stage="$RUNNER_TEMP/unsigned-macos-stage"
          mkdir -p "$stage/evidence"
          ditto "$app_root/Dusk Developer Studio.app" "$stage/Dusk Developer Studio.app"
          ditto "$app_root/Dusk Developer Studio Local Actions.app" "$stage/Dusk Developer Studio Local Actions.app"
          cp "$receipt_source" "$stage/evidence/prototype-receipt.json"
          cp "$app_root/macos-app-receipt.json" "$stage/evidence/macos-app-receipt.json"
          safe_path="$stage/Dusk Developer Studio.app/Contents/MacOS/dusk-studio"
          actions_path="$stage/Dusk Developer Studio Local Actions.app/Contents/MacOS/dusk-studio-local-actions"
          node scripts/standalone-unsigned-assurance.mjs --operation=index --target=darwin-arm64 --safe-launcher="$safe_path" --local-actions-launcher="$actions_path" --safe-name="Dusk Developer Studio.app/Contents/MacOS/dusk-studio" --local-actions-name="Dusk Developer Studio Local Actions.app/Contents/MacOS/dusk-studio-local-actions" --build-receipt="$stage/evidence/prototype-receipt.json" --macos-app-receipt="$stage/evidence/macos-app-receipt.json" --out="$stage/unsigned-launcher-index.json"
          node scripts/standalone-unsigned-assurance.mjs --operation=manifest --root="$stage" --target=darwin-arm64 --build-receipt="$stage/evidence/prototype-receipt.json" --launcher-index="$stage/unsigned-launcher-index.json" --out="$stage/unsigned-candidate-manifest.json"
          package="$RUNNER_TEMP/unsigned-macos-engineering.zip"
          node scripts/standalone-safe-zip-extract.mjs --create --root="$stage" --target=darwin-arm64 --ephemeral-root="$RUNNER_TEMP" --out="$package" --profile=unsigned-engineering
          install="$RUNNER_TEMP/installed-unsigned-macos"
          node scripts/standalone-safe-zip-extract.mjs --archive="$package" --target=darwin-arm64 --ephemeral-root="$RUNNER_TEMP" --out="$install" --profile=unsigned-engineering
          safe_app="$install/Dusk Developer Studio.app"
          actions_app="$install/Dusk Developer Studio Local Actions.app"
          for record in "$safe_app|$sea/$safe_name" "$actions_app|$sea/$actions_name"; do
            app="${record%%|*}"
            source_executable="${record#*|}"
            executable="$app/Contents/MacOS/$(/usr/libexec/PlistBuddy -c 'Print :CFBundleExecutable' "$app/Contents/Info.plist")"
            cmp -s "$source_executable" "$executable"
            file "$executable" | grep -F 'Mach-O 64-bit executable arm64'
            codesign --verify --strict --verbose=4 "$source_executable"
            codesign -d --verbose=4 "$source_executable" 2>&1 | grep -F 'Signature=adhoc'
            xattr -w com.apple.quarantine "0081;$(printf '%x' "$(date +%s)");GitHubActions;" "$app"
            set +e
            gatekeeper_output="$(spctl --assess --type execute --verbose=4 "$app" 2>&1)"
            gatekeeper_status=$?
            set -e
            printf '%s\n' "$gatekeeper_output"
            test "$gatekeeper_status" -ne 0
            printf '%s\n' "$gatekeeper_output" | grep -Eiq '(^|: )[[:space:]]*rejected([[:space:]]|$)|code has no resources but signature indicates they must be present'
            xattr -dr com.apple.quarantine "$app"
          done
          safe="$safe_app/Contents/MacOS/dusk-studio"
          before_elevated_probe="$(find /tmp -maxdepth 1 -type d -name 'dusk-studio-sea-*' -print | LC_ALL=C sort)"
          set +e
          elevated_output="$(sudo -n -- /usr/bin/env TMPDIR=/tmp TEMP=/tmp TMP=/tmp "$safe" --signed-rc-self-test 2>&1)"
          elevated_status=$?
          set -e
          test "$elevated_status" -ne 0
          printf '%s\n' "$elevated_output" | grep -F 'Dusk Developer Studio refuses elevated or root execution.'
          after_elevated_probe="$(find /tmp -maxdepth 1 -type d -name 'dusk-studio-sea-*' -print | LC_ALL=C sort)"
          test "$before_elevated_probe" = "$after_elevated_probe"
          node scripts/companion-standalone-unsigned-self-test.mjs --target=darwin-arm64 --candidate-package="$package" --install-root="$install" --ephemeral-root="$RUNNER_TEMP" --workspace="$RUNNER_TEMP/unsigned-lifecycle-macos" --out="$RUNNER_TEMP/macos-lifecycle.json"
          node scripts/standalone-unsigned-assurance.mjs --operation=platform-observations --target=darwin-arm64 --checks=host_target_verified,adhoc_integrity_verified,gatekeeper_rejected_unsigned --out="$RUNNER_TEMP/macos-platform.json"
      - name: Delete every workflow-owned unsigned macOS candidate path before recording evidence
        if: always()
        run: |
          set -euo pipefail
          cleanup_records=(
            "runtime_archive=$RUNNER_TEMP/node-v24.18.0-darwin-arm64.tar.xz"
            "bundle_1=$RUNNER_TEMP/unsigned-macos-bundle-1"
            "bundle_2=$RUNNER_TEMP/unsigned-macos-bundle-2"
            "release_1=$RUNNER_TEMP/unsigned-macos-release-1"
            "release_2=$RUNNER_TEMP/unsigned-macos-release-2"
            "sea_1=$RUNNER_TEMP/unsigned-macos-sea-1"
            "sea_2=$RUNNER_TEMP/unsigned-macos-sea-2"
            "app_bundle_root=$RUNNER_TEMP/unsigned-macos-apps"
            "package_stage=$RUNNER_TEMP/unsigned-macos-stage"
            "install_root=$RUNNER_TEMP/installed-unsigned-macos"
            "lifecycle_workspace=$RUNNER_TEMP/unsigned-lifecycle-macos"
            "candidate_zip=$RUNNER_TEMP/unsigned-macos-engineering.zip"
          )
          for record in "${cleanup_records[@]}"; do
            case "${record%%=*}" in
              install_root|lifecycle_workspace) ;;
              *) rm -rf -- "${record#*=}" ;;
            esac
          done
          joined="$(IFS='|'; echo "${cleanup_records[*]}")"
          node scripts/standalone-unsigned-assurance.mjs --operation=cleanup --target=darwin-arm64 --scope-root="$RUNNER_TEMP" --paths="$joined" --out="$RUNNER_TEMP/macos-cleanup.json"
          node scripts/standalone-unsigned-assurance.mjs --operation=target-evidence --target=darwin-arm64 --lifecycle-report="$RUNNER_TEMP/macos-lifecycle.json" --reproducibility-report="$RUNNER_TEMP/macos-reproducibility.json" --platform-observations="$RUNNER_TEMP/macos-platform.json" --cleanup-receipt="$RUNNER_TEMP/macos-cleanup.json" --repository="$GITHUB_REPOSITORY" --workflow-ref="$GITHUB_WORKFLOW_REF" --run-id="$GITHUB_RUN_ID" --run-attempt="$GITHUB_RUN_ATTEMPT" --run-actor="github:$GITHUB_ACTOR" --expected-commit="$EXPECTED_COMMIT" --checks="$UNSIGNED_ASSURANCE_CHECKS" --out="$RUNNER_TEMP/darwin-arm64.json"
  result:
    name: Unsigned companion engineering assurance
    needs: [preflight, windows, linux, macos]
    if: always()
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    defaults:
      run:
        shell: bash
        working-directory: .
    steps:
      - name: Require every native job
        env:
          PREFLIGHT_RESULT: ${{ needs.preflight.result }}
          WINDOWS_RESULT: ${{ needs.windows.result }}
          LINUX_RESULT: ${{ needs.linux.result }}
          MACOS_RESULT: ${{ needs.macos.result }}
        run: |
          set -euo pipefail
          test "$PREFLIGHT_RESULT" = success
          test "$WINDOWS_RESULT" = success
          test "$LINUX_RESULT" = success
          test "$MACOS_RESULT" = success
      - name: Report bounded result
        run: |
          {
            echo "### Unsigned companion engineering assurance"
            echo "- Native target lifecycles: passed"
            echo "- Reproducible dual-launcher builds: passed"
            echo "- Exact workflow-owned candidate paths: absent at the cleanup check"
            echo "- Retained workflow artifacts: none"
            echo "- Platform trust or publication eligibility: not established"
          } >> "$GITHUB_STEP_SUMMARY"
