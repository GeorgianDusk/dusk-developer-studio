name: DuskDS native production smoke

"on":
  pull_request:
    branches: [main]
  push:
    branches: [main]
    paths:
      - .github/workflows/duskds-native-smoke.yml
      - config/duskds-toolchain-policy.json
      - apps/studio/**
      - config/phase5-policy.json
      - packages/**
      - scripts/staging-smoke.mjs
  workflow_dispatch:
    inputs:
      candidate_artifact_fingerprint_sha256:
        description: Exact Phase 5 Studio artifact fingerprint; required for a launch-evidence dispatch
        required: false
        type: string

permissions:
  contents: read

concurrency:
  group: duskds-native-production-smoke-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  native-smoke:
    name: Exact DuskDS scaffold, build, VM test, and inspection
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    env:
      CI: "true"
      CARGO_TERM_COLOR: never
      EXPECTED_COMMIT: ${{ github.event.pull_request.head.sha || github.sha }}
      CANDIDATE_ARTIFACT_FINGERPRINT_SHA256: ${{ inputs.candidate_artifact_fingerprint_sha256 || '' }}
      EVENT_NAME: ${{ github.event_name }}
    defaults:
      run:
        shell: bash
        working-directory: .
    steps:
      - name: Check out the exact reviewed source
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0
          persist-credentials: "false"
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
      - name: Bind the run to the checked-out commit
        run: |
          test "$(git rev-parse HEAD)" = "$EXPECTED_COMMIT"
          test -z "$(git status --short)"
      - name: Classify DuskDS native-smoke scope
        id: scope
        env:
          EVENT_NAME: ${{ github.event_name }}
          BASE_SHA: ${{ github.event.pull_request.base.sha || '' }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
        run: |
          set -euo pipefail
          if [[ "$EVENT_NAME" != "pull_request" ]]; then
            echo "relevant=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          test -n "$BASE_SHA"
          test -n "$HEAD_SHA"
          git cat-file -e "$BASE_SHA^{commit}"
          git cat-file -e "$HEAD_SHA^{commit}"
          changed_paths="$RUNNER_TEMP/duskds-native-smoke-changed-paths"
          git diff --no-renames --name-only -z "$BASE_SHA...$HEAD_SHA" > "$changed_paths"
          relevant=false
          while IFS= read -r -d '' changed; do
            case "$changed" in
              .github/workflows/duskds-native-smoke.yml|apps/studio/*|config/duskds-toolchain-policy.json|config/phase5-policy.json|packages/*|scripts/staging-smoke.mjs)
                relevant=true
                break
                ;;
            esac
          done < "$changed_paths"
          echo "relevant=$relevant" >> "$GITHUB_OUTPUT"
      - name: Use the verified Node.js line
        if: steps.scope.outputs.relevant == 'true'
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24.18.0
          package-manager-cache: "false"
      - name: Load the reviewed DuskDS toolchain policy
        if: steps.scope.outputs.relevant == 'true'
        run: |
          node --input-type=module <<'NODE'
          import fs from "node:fs";
          const policy = JSON.parse(fs.readFileSync("config/duskds-toolchain-policy.json", "utf8"));
          const fortyHex = /^[0-9a-f]{40}$/;
          if (
            policy.schema_version !== 1
            || !/^\d+\.\d+\.\d+$/.test(policy.rust_toolchain)
            || policy.dusk_forge?.repository !== "https://github.com/dusk-network/forge"
            || policy.dusk_forge?.package !== "dusk-forge-cli"
            || !fortyHex.test(policy.dusk_forge?.revision ?? "")
            || policy.dusk_forge?.reviewed_template?.id !== "duskds-counter-forge"
            || !/^[0-9a-f]{64}$/.test(policy.dusk_forge?.reviewed_template?.generated_lock_sha256 ?? "")
            || !/^[0-9a-f]{64}$/.test(policy.dusk_forge?.reviewed_template?.template_lock_sha256 ?? "")
            || !/^dusk-core-\d+\.\d+\.\d+$/.test(policy.rusk?.tag ?? "")
            || !fortyHex.test(policy.rusk?.revision ?? "")
          ) {
            throw new Error("DuskDS toolchain policy is invalid.");
          }
          fs.appendFileSync(process.env.GITHUB_ENV, [
            `RUST_TOOLCHAIN=${policy.rust_toolchain}`,
            `FORGE_COMMIT=${policy.dusk_forge.revision}`,
            `DUSKDS_TEMPLATE_ID=${policy.dusk_forge.reviewed_template.id}`,
            `DUSKDS_GENERATED_LOCK_SHA256=${policy.dusk_forge.reviewed_template.generated_lock_sha256}`,
            `DUSKDS_TEMPLATE_LOCK_SHA256=${policy.dusk_forge.reviewed_template.template_lock_sha256}`,
            `RUSK_TAG=${policy.rusk.tag}`,
            `RUSK_COMMIT=${policy.rusk.revision}`,
            ""
          ].join("\n"));
          NODE
      - name: Read the official DuskDS Testnet node
        if: steps.scope.outputs.relevant == 'true'
        run: |
          node --input-type=module <<'NODE'
          import fs from "node:fs";
          import { checkDuskDsNodeRead } from "./scripts/staging-smoke.mjs";
          const policy = JSON.parse(fs.readFileSync("config/phase5-policy.json", "utf8"));
          const evidence = await checkDuskDsNodeRead(policy.duskds_testnet_graphql_url);
          fs.appendFileSync(process.env.GITHUB_STEP_SUMMARY, [
            "### DuskDS official node read",
            `- Observed at: \`${evidence.observed_at}\``,
            `- Height: \`${evidence.height}\``,
            `- Hash: \`${evidence.hash}\``,
            ""
          ].join("\n"));
          NODE
      - name: Enable repository-pinned pnpm
        if: steps.scope.outputs.relevant == 'true'
        run: |
          corepack enable
          corepack install --global pnpm@11.7.0
      - name: Restore frozen dependencies
        if: steps.scope.outputs.relevant == 'true'
        run: pnpm install --frozen-lockfile
      - name: Build and verify the Studio npm package
        if: steps.scope.outputs.relevant == 'true'
        run: |
          pnpm build:npm
          pnpm test:npm
          PRIMARY="output/npm/package/bin/dusk-developer-studio.mjs"
          TEMPLATE="output/npm/package/templates/$DUSKDS_TEMPLATE_ID"
          test -f "$PRIMARY"
          test -f "$TEMPLATE/PROVENANCE.md"
          test -f "$TEMPLATE/LICENSE-MPL-2.0.txt"
          test "$(sha256sum "$TEMPLATE/Cargo.lock" | awk '{print $1}')" = "$DUSKDS_TEMPLATE_LOCK_SHA256"
          grep -Fq "$DUSKDS_GENERATED_LOCK_SHA256" "$TEMPLATE/PROVENANCE.md"
          grep -Fq "$FORGE_COMMIT" "$TEMPLATE/PROVENANCE.md"
      - name: Install the pinned Rust and Dusk Forge toolchain
        if: steps.scope.outputs.relevant == 'true'
        run: |
          rustup toolchain install "$RUST_TOOLCHAIN" --profile minimal
          rustup target add --toolchain "$RUST_TOOLCHAIN" wasm32-unknown-unknown
          rustup component add --toolchain "$RUST_TOOLCHAIN" rust-src
          cargo +"$RUST_TOOLCHAIN" install --locked \
            --root "$RUNNER_TEMP/dusk-forge" \
            --git https://github.com/dusk-network/forge \
            --rev "$FORGE_COMMIT" \
            dusk-forge-cli
          echo "$RUNNER_TEMP/dusk-forge/bin" >> "$GITHUB_PATH"
      - name: Verify required native tools
        if: steps.scope.outputs.relevant == 'true'
        run: |
          test "$(rustc +"$RUST_TOOLCHAIN" --version | awk '{print $2}')" = "$RUST_TOOLCHAIN"
          cargo +"$RUST_TOOLCHAIN" --version
          grep -Fq "$FORGE_COMMIT" "$RUNNER_TEMP/dusk-forge/.crates2.json"
          dusk-forge --version
          git --version
          make --version | head -n 1
      - name: Scaffold through the reviewed Studio package
        if: steps.scope.outputs.relevant == 'true'
        run: |
          ROOT="$RUNNER_TEMP/duskds-native-smoke"
          PROJECT="$ROOT/duskds-phase5-smoke"
          mkdir -p "$ROOT"
          cd "$ROOT"
          node "$GITHUB_WORKSPACE/output/npm/package/bin/dusk-developer-studio.mjs" create-duskds duskds-phase5-smoke
          grep -Fq 'channel = "1.94.0"' "$PROJECT/rust-toolchain.toml"
          grep -Fq "git+https://github.com/dusk-network/rusk?tag=$RUSK_TAG#$RUSK_COMMIT" "$PROJECT/Cargo.lock"
          grep -Fq "$DUSKDS_GENERATED_LOCK_SHA256" "$PROJECT/PROVENANCE.md"
          grep -Fq "$FORGE_COMMIT" "$PROJECT/PROVENANCE.md"
          test -f "$PROJECT/LICENSE-MPL-2.0.txt"
          test -f "$PROJECT/Cargo.toml"
          test -f "$PROJECT/src/lib.rs"
          test -f "$PROJECT/tests/contract.rs"
          echo "DUSKDS_SMOKE_PROJECT=$PROJECT" >> "$GITHUB_ENV"
      - name: Check, build both artifacts, and run the Linux VM test
        if: steps.scope.outputs.relevant == 'true'
        run: |
          cd "$DUSKDS_SMOKE_PROJECT"
          dusk-forge check
          dusk-forge build all
          dusk-forge test
      - name: Inspect and record bounded artifact evidence
        if: steps.scope.outputs.relevant == 'true'
        run: |
          cd "$DUSKDS_SMOKE_PROJECT"
          VERIFY_OUTPUT="$(dusk-forge verify --skip-build)"
          printf '%s\n' "$VERIFY_OUTPUT"
          CONTRACT="target/contract/wasm32-unknown-unknown/release/duskds_phase5_smoke.wasm"
          DRIVER="target/data-driver/wasm32-unknown-unknown/release/duskds_phase5_smoke.wasm"
          test -s "$CONTRACT"
          test -s "$DRIVER"
          CONTRACT_HASH="$(sha256sum "$CONTRACT" | awk '{print $1}')"
          DRIVER_HASH="$(sha256sum "$DRIVER" | awk '{print $1}')"
          CONTRACT_BYTES="$(stat -c %s "$CONTRACT")"
          DRIVER_BYTES="$(stat -c %s "$DRIVER")"
          CONTRACT_BLAKE3="$(printf '%s\n' "$VERIFY_OUTPUT" | sed -n 's/^contract_blake3: //p')"
          SCHEMA_FUNCTIONS="$(printf '%s\n' "$VERIFY_OUTPUT" | sed -n 's/^schema_functions: //p')"
          test "${#CONTRACT_BLAKE3}" = 64
          test "$SCHEMA_FUNCTIONS" -gt 0
          echo "CONTRACT_SHA256=$CONTRACT_HASH" >> "$GITHUB_ENV"
          echo "DATA_DRIVER_SHA256=$DRIVER_HASH" >> "$GITHUB_ENV"
          {
            echo "### DuskDS native smoke evidence"
            echo "- Studio commit: \`$EXPECTED_COMMIT\`"
            echo "- Rust: \`$RUST_TOOLCHAIN\`"
            echo "- Dusk Forge commit: \`$FORGE_COMMIT\`"
            echo "- Rusk commit: \`$RUSK_COMMIT\`"
            echo "- Contract WASM: \`$CONTRACT_BYTES bytes\`, SHA-256 \`$CONTRACT_HASH\`"
            echo "- Data-driver WASM: \`$DRIVER_BYTES bytes\`, SHA-256 \`$DRIVER_HASH\`"
            echo "- Contract BLAKE3: \`$CONTRACT_BLAKE3\`"
            echo "- Schema functions: \`$SCHEMA_FUNCTIONS\`"
            echo "- VM test: \`passed on ubuntu-24.04\`"
          } >> "$GITHUB_STEP_SUMMARY"
      - name: Write the bounded native-smoke receipt
        if: steps.scope.outputs.relevant == 'true'
        run: |
          mkdir -p output
          node --input-type=module <<'NODE'
          import fs from "node:fs";
          const candidateFingerprint = process.env.CANDIDATE_ARTIFACT_FINGERPRINT_SHA256;
          if (process.env.EVENT_NAME === "workflow_dispatch" && !/^[a-f0-9]{64}$/.test(candidateFingerprint ?? "")) {
            throw new Error("Phase 5 native-smoke dispatch requires the exact candidate artifact fingerprint.");
          }
          const receipt = {
            schema_version: 1,
            status: "passed",
            candidate_commit: process.env.EXPECTED_COMMIT,
            candidate_artifact_fingerprint_sha256: candidateFingerprint || "not-phase5-dispatch",
            workflow_path: ".github/workflows/duskds-native-smoke.yml",
            observed_at: new Date().toISOString(),
            contract_sha256: process.env.CONTRACT_SHA256,
            data_driver_sha256: process.env.DATA_DRIVER_SHA256,
            native_steps: {
              preflight: "passed",
              node_read: "passed",
              scaffold: "passed",
              build_artifacts: "passed",
              vm_test: "passed",
              inspect: "passed"
            }
          };
          fs.writeFileSync(`output/duskds-native-smoke-receipt-${process.env.GITHUB_RUN_ID}.json`, `${JSON.stringify(receipt, null, 2)}\n`, { encoding: "utf8", mode: 0o600 });
          NODE
      - name: Upload the bounded native-smoke receipt
        if: steps.scope.outputs.relevant == 'true'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          path: output/duskds-native-smoke-receipt-${{ github.run_id }}.json
          archive: false
          if-no-files-found: error
          retention-days: 30
      - name: Report scope-only success
        if: steps.scope.outputs.relevant == 'false'
        run: |
          {
            echo "### DuskDS native smoke"
            echo "No DuskDS native-smoke inputs changed. The stable required-check context passed without installing the native toolchain."
          } >> "$GITHUB_STEP_SUMMARY"
