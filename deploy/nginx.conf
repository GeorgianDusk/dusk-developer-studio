server {
  listen 8080;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self'; img-src 'self' data:; font-src 'self'; connect-src 'self' https://rpc.testnet.evm.dusk.network https://rpc.evm.dusk.network https://testnet.nodes.dusk.network https://nodes.dusk.network; frame-ancestors 'none'; base-uri 'self'; form-action 'none'" always;
  add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-Frame-Options "DENY" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), usb=(), serial=(), hid=(), bluetooth=()" always;

  location = /healthz {
    access_log off;
    default_type text/plain;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self'; img-src 'self' data:; font-src 'self'; connect-src 'self' https://rpc.testnet.evm.dusk.network https://rpc.evm.dusk.network https://testnet.nodes.dusk.network https://nodes.dusk.network; frame-ancestors 'none'; base-uri 'self'; form-action 'none'" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), usb=(), serial=(), hid=(), bluetooth=()" always;
    add_header Cache-Control "no-store" always;
    return 200 "ok\n";
  }

  location ~ ^/(release-manifest|assurance-receipt)\.json$ {
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self'; img-src 'self' data:; font-src 'self'; connect-src 'self' https://rpc.testnet.evm.dusk.network https://rpc.evm.dusk.network https://testnet.nodes.dusk.network https://nodes.dusk.network; frame-ancestors 'none'; base-uri 'self'; form-action 'none'" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), usb=(), serial=(), hid=(), bluetooth=()" always;
    add_header Cache-Control "no-store" always;
    try_files $uri =404;
  }

  location = /index.html {
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self'; img-src 'self' data:; font-src 'self'; connect-src 'self' https://rpc.testnet.evm.dusk.network https://rpc.evm.dusk.network https://testnet.nodes.dusk.network https://nodes.dusk.network; frame-ancestors 'none'; base-uri 'self'; form-action 'none'" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), usb=(), serial=(), hid=(), bluetooth=()" always;
    add_header Cache-Control "no-cache" always;
    try_files /index.html =404;
  }

  location /assets/ {
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self'; img-src 'self' data:; font-src 'self'; connect-src 'self' https://rpc.testnet.evm.dusk.network https://rpc.evm.dusk.network https://testnet.nodes.dusk.network https://nodes.dusk.network; frame-ancestors 'none'; base-uri 'self'; form-action 'none'" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), usb=(), serial=(), hid=(), bluetooth=()" always;
    add_header Cache-Control "public, max-age=31536000, immutable" always;
    try_files $uri =404;
  }

  location / {
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self'; img-src 'self' data:; font-src 'self'; connect-src 'self' https://rpc.testnet.evm.dusk.network https://rpc.evm.dusk.network https://testnet.nodes.dusk.network https://nodes.dusk.network; frame-ancestors 'none'; base-uri 'self'; form-action 'none'" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), usb=(), serial=(), hid=(), bluetooth=()" always;
    add_header Cache-Control "no-cache" always;
    try_files $uri $uri/ /index.html;
  }
}
